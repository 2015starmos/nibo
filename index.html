<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓咪醫療病歷系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        body {
            background-color: #F9F7F3;
            padding: 20px;
            color: #444444;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
            padding: 36px;
            overflow: hidden;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            color: #2D2D2D;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 22px;
            border: none;
            border-radius: 16px;
            background: #F3F1EE;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #666;
        }

        .tab-btn.active {
            background: #A1C3A3;
            color: #fff;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: #ffffff;
            border: 1px solid #EAEAEA;
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 16px;
            transition: 0.25s;
            cursor: pointer;
        }

        .card:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.04);
            border-color: #DCDCDC;
        }

        .card h3 {
            font-size: 19px;
            color: #2D2D2D;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .card p {
            font-size: 14px;
            color: #777;
            margin: 4px 0;
        }

        .search {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid #E2E2E2;
            border-radius: 16px;
            font-size: 15px;
            margin-bottom: 20px;
            outline: none;
            background: #FDFCFB;
        }

        .search:focus {
            border-color: #A1C3A3;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 24px;
        }

        input, textarea {
            width: 100%;
            padding: 16px;
            border: 1px solid #E2E2E2;
            border-radius: 16px;
            font-size: 15px;
            outline: none;
            transition: 0.25s;
            resize: vertical;
            background: #FDFCFB;
        }

        input:focus, textarea:focus {
            border-color: #A1C3A3;
            box-shadow: 0 0 0 3px rgba(161,195,163,0.15);
        }

        .tip {
            font-size: 13px;
            color: #999;
            margin-top: -8px;
            margin-bottom: 6px;
        }

        .btn {
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: 0.25s;
            text-align: center;
            margin: 6px 0;
        }

        .btn-primary {
            background: #A1C3A3;
            color: white;
        }

        .btn-warning {
            background: #D9B382;
            color: white;
        }

        .btn-danger {
            background: #D6A5A5;
            color: white;
        }

        .btn-sm {
            padding: 9px 14px;
            font-size: 13px;
            margin: 0 4px;
            border-radius: 12px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .section {
            margin-top: 36px;
            padding-top: 26px;
            border-top: 1px solid #F0F0F0;
        }

        .section h3 {
            font-size: 19px;
            color: #2D2D2D;
            margin-bottom: 18px;
            font-weight: 600;
        }

        .reminder {
            background: #FCFAF5;
            border: 1px solid #F0EBDF;
            border-radius: 16px;
            padding: 18px;
            margin: 18px 0;
        }

        .reminder p {
            font-weight: 500;
            margin-bottom: 10px;
            color: #555;
        }

        .reminder label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 16px;
            font-size: 14px;
            color: #666;
        }

        .photo-preview {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 16px 0;
        }

        .photo-preview img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid #EAEAEA;
        }

        .history-item {
            padding: 16px;
            border: 1px solid #EAEAEA;
            border-radius: 16px;
            margin-bottom: 12px;
            background: #FDFCFB;
        }

        .history-item .btn-area {
            margin-top:10px;
        }

        .hide {
            display:none;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>

<body>
<div class="container">
    <div class="title">🐱 貓咪醫療病歷系統</div>

    <div class="tab">
        <button class="tab-btn active" onclick="openPage('cat-list')">貓咪列表</button>
        <button class="tab-btn" onclick="openPage('add-cat')">新增／編輯病歷</button>
        <button class="tab-btn" onclick="openPage('backup')">備份／還原</button>
    </div>

    <!-- 貓咪列表 -->
    <div id="cat-list" class="page active">
        <input class="search" placeholder="🔍 搜尋貓咪名字..." oninput="searchCat()">
        <div id="cat-list-content"></div>
    </div>

    <!-- 新增貓咪 & 病歷 -->
    <div id="add-cat" class="page">
        <div class="form-group">
            <input id="cat-name" placeholder="貓咪名字">
            <input id="cat-chip" placeholder="晶片號碼">
            <input id="cat-breed" placeholder="品種">
            
            <input id="cat-birth" type="date" placeholder="生日">
            <div class="tip">請點擊輸入生日日期</div>

            <input id="cat-weight" placeholder="體重 (kg)">
        </div>
        <button class="btn btn-primary" onclick="saveCat()">儲存貓咪基本資料</button>

        <!-- 歷史病歷 -->
        <div id="history-section" class="section hide">
            <h3>📜 歷史就診病歷</h3>
            <div id="history-list"></div>
        </div>

        <!-- 病歷表單 -->
        <div id="medical-section" class="section hide">
            <h3>📋 就診紀錄 & 術後追蹤</h3>
            <input type="hidden" id="editRecordId">
            <input type="date" id="treat-date">
            <textarea id="treat-symptom" rows="2" placeholder="症狀"></textarea>
            <textarea id="treat-diagnosis" rows="2" placeholder="診斷結果"></textarea>
            <textarea id="treat-postop" rows="2" placeholder="術後追蹤"></textarea>
            <input type="date" id="next-visit" placeholder="下次回診日期">

            <div class="reminder">
                <p>回診提醒設定</p>
                <label><input type="checkbox" id="remind-3day"> 回診前 3 天提醒</label>
                <label><input type="checkbox" id="remind-today"> 回診當天提醒</label>
            </div>

            <input type="file" id="file-upload" multiple accept="image/*,application/pdf">
            <div class="photo-preview" id="photo-preview"></div>

            <button class="btn btn-primary" onclick="saveMedicalRecord()">儲存病歷</button>
            <button class="btn btn-warning" onclick="exportPDF()">匯出病歷 PDF</button>
            <button class="btn btn-danger" onclick="cancelEdit()">取消編輯</button>
        </div>
    </div>

    <!-- 備份 -->
    <div id="backup" class="page">
        <button class="btn btn-primary" onclick="exportBackup()">匯出備份檔 (JSON)</button>
        <input type="file" id="restore-file" accept=".json" onchange="restoreBackup()" style="margin:10px 0;">
        <button class="btn btn-danger" onclick="clearAllData()">清空所有資料</button>
    </div>
</div>

<script>
// ==================== Firebase ====================
const firebaseConfig = {
    apiKey: "AIzaSyD4iT2_YhVoBvOSVWz_-ZNJcR9BjEqHhaE",
    authDomain: "naibo-health.firebaseapp.com",
    projectId: "naibo-health",
    storageBucket: "naibo-health.firebasestorage.app",
    messagingSenderId: "1008746304734",
    appId: "1:1008746304734:web:33b87646673ee83b975e4f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let currentCatId = "";
let uploadedFiles = [];

// ==================== 分頁 ====================
function openPage(pageName) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(pageName).classList.add('active');
    if(event && event.target) event.target.classList.add('active');
    if (pageName === 'cat-list') loadCatList();
}

// ==================== 貓咪 ====================
async function saveCat() {
    const name = document.getElementById('cat-name').value.trim();
    if (!name) { alert("請輸入貓咪名字"); return; }

    const data = {
        name: name,
        chip: document.getElementById('cat-chip').value,
        breed: document.getElementById('cat-breed').value,
        birth: document.getElementById('cat-birth').value,
        weight: document.getElementById('cat-weight').value,
        createdAt: new Date()
    };

    const doc = await db.collection('cats').add(data);
    currentCatId = doc.id;
    alert("✅ 貓咪資料儲存成功");
    document.getElementById('medical-section').classList.remove('hide');
    document.getElementById('history-section').classList.remove('hide');
    loadCatMedicalHistory();
}

async function loadCatList() {
    const content = document.getElementById('cat-list-content');
    content.innerHTML = "載入中...";
    const snap = await db.collection('cats').orderBy('createdAt', 'desc').get();
    content.innerHTML = "";

    snap.forEach(doc => {
        const cat = doc.data();
        content.innerHTML += `
        <div class="card" onclick="selectCat('${doc.id}')">
            <h3>${cat.name}</h3>
            <p>晶片：${cat.chip || '未填'}</p>
            <p>品種：${cat.breed || '未填'}</p>
            <p>生日：${cat.birth || '未填'}</p>
            <p>體重：${cat.weight || '未填'} kg</p>
            <p style="color:#A1C3A3; margin-top:8px;">點擊進入查看/新增病歷</p>
        </div>`;
    });
}

function searchCat() {
    const kw = document.querySelector('.search').value.toLowerCase();
    document.querySelectorAll('.card').forEach(card => {
        const name = card.querySelector('h3').textContent.toLowerCase();
        card.style.display = name.includes(kw) ? "block" : "none";
    });
}

async function selectCat(catId) {
    currentCatId = catId;
    openPage('add-cat');
    const doc = await db.collection('cats').doc(catId).get();
    const cat = doc.data();
    
    document.getElementById('cat-name').value = cat.name || '';
    document.getElementById('cat-chip').value = cat.chip || '';
    document.getElementById('cat-breed').value = cat.breed || '';
    document.getElementById('cat-birth').value = cat.birth || '';
    document.getElementById('cat-weight').value = cat.weight || '';

    document.getElementById('medical-section').classList.remove('hide');
    document.getElementById('history-section').classList.remove('hide');
    loadCatMedicalHistory();
}

// ==================== 病歷 ====================
async function loadCatMedicalHistory() {
    const historyList = document.getElementById('history-list');
    historyList.innerHTML = "載入病歷中...";
    const snap = await db.collection('treatments')
        .where('catId','==',currentCatId)
        .orderBy('date','desc')
        .get();

    historyList.innerHTML = "";
    if(snap.empty){
        historyList.innerHTML = "<p>尚無歷史就診病歷</p>";
        return;
    }

    snap.forEach(doc => {
        const d = doc.data();
        historyList.innerHTML += `
        <div class="history-item">
            <div><strong>就診日期：</strong>${d.date || ''}</div>
            <div><strong>症狀：</strong>${d.symptom?.substring(0,30) || ''}</div>
            <div><strong>回診日：</strong>${d.nextVisit || '無'}</div>
            <div class="btn-area">
                <button class="btn btn-sm btn-primary" onclick="viewRecord('${doc.id}')">查看</button>
                <button class="btn btn-sm btn-warning" onclick="editRecord('${doc.id}')">編輯</button>
                <button class="btn btn-sm btn-danger" onclick="delRecord('${doc.id}')">刪除</button>
            </div>
        </div>
        `;
    });
}

async function viewRecord(rid){
    const doc = await db.collection('treatments').doc(rid).get();
    const d = doc.data();
    let txt = `
就診日期：${d.date||''}
症狀：${d.symptom||''}
診斷結果：${d.diagnosis||''}
術後追蹤：${d.postop||''}
下次回診：${d.nextVisit||'無'}
前3天提醒：${d.remind3day ? '是':'否'}
當天提醒：${d.remindToday ? '是':'否'}
    `;
    alert(txt);
}

async function editRecord(rid){
    const doc = await db.collection('treatments').doc(rid).get();
    const d = doc.data();
    document.getElementById('editRecordId').value = rid;

    document.getElementById('treat-date').value = d.date || '';
    document.getElementById('treat-symptom').value = d.symptom || '';
    document.getElementById('treat-diagnosis').value = d.diagnosis || '';
    document.getElementById('treat-postop').value = d.postop || '';
    document.getElementById('next-visit').value = d.nextVisit || '';
    document.getElementById('remind-3day').checked = !!d.remind3day;
    document.getElementById('remind-today').checked = !!d.remindToday;

    uploadedFiles = d.files || [];
    renderFilePreview();
    alert("已載入舊病歷，可直接編輯");
}

function cancelEdit(){
    document.getElementById('editRecordId').value = '';
    document.getElementById('treat-date').value = '';
    document.getElementById('treat-symptom').value = '';
    document.getElementById('treat-diagnosis').value = '';
    document.getElementById('treat-postop').value = '';
    document.getElementById('next-visit').value = '';
    document.getElementById('remind-3day').checked = false;
    document.getElementById('remind-today').checked = false;
    uploadedFiles = [];
    renderFilePreview();
}

async function delRecord(rid){
    if(!confirm("確定刪除此筆病歷？無法復原")) return;
    await db.collection('treatments').doc(rid).delete();
    alert("已刪除");
    loadCatMedicalHistory();
}

function renderFilePreview(){
    const preview = document.getElementById('photo-preview');
    preview.innerHTML = "";
    uploadedFiles.forEach(url=>{
        if(url.includes('.pdf')){
            preview.innerHTML += `<img src="https://i.imgur.com/8zUoR1H.png" style="background:#f8f8f8">`;
        }else{
            preview.innerHTML += `<img src="${url}">`;
        }
    });
}

// ==================== 上傳 & 儲存 ====================
document.getElementById('file-upload').addEventListener('change', async (e) => {
    if(!currentCatId) return;
    const files = e.target.files;
    for (let file of files) {
        const ref = storage.ref(`medical/${currentCatId}/${Date.now()}-${file.name}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        uploadedFiles.push(url);
    }
    renderFilePreview();
    alert("✅ 檔案上傳完成");
});

async function saveMedicalRecord() {
    if (!currentCatId) { alert("請先選擇貓咪"); return; }

    const record = {
        catId: currentCatId,
        date: document.getElementById('treat-date').value,
        symptom: document.getElementById('treat-symptom').value,
        diagnosis: document.getElementById('treat-diagnosis').value,
        postop: document.getElementById('treat-postop').value,
        nextVisit: document.getElementById('next-visit').value,
        remind3day: document.getElementById('remind-3day').checked,
        remindToday: document.getElementById('remind-today').checked,
        files: uploadedFiles,
        createdAt: new Date()
    };

    const editId = document.getElementById('editRecordId').value;
    if(editId){
        await db.collection('treatments').doc(editId).update(record);
        alert("✅ 病歷編輯更新成功");
    }else{
        await db.collection('treatments').add(record);
        alert("✅ 新病歷儲存成功");
    }

    if (record.nextVisit && confirm("是否加入手機行事曆提醒？")) {
        addToCalendar(record);
    }

    cancelEdit();
    loadCatMedicalHistory();
}

// ==================== 行事曆 ====================
function addToCalendar(record) {
    const date = record.nextVisit.replace(/-/g, '');
    const title = `貓咪回診 - ${document.getElementById('cat-name').value}`;
    const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${date}/${date}`;
    window.open(url);
}

// ==================== PDF ====================
async function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const name = document.getElementById('cat-name').value || "未命名";

    doc.text(`貓咪病歷 - ${name}`, 10, 10);
    doc.text(`晶片：${document.getElementById('cat-chip').value}`,10,18);
    doc.text(`就診日期：${document.getElementById('treat-date').value}`, 10, 26);
    doc.text(`症狀：${document.getElementById('treat-symptom').value}`, 10, 34);
    doc.text(`診斷：${document.getElementById('treat-diagnosis').value}`, 10, 42);
    doc.text(`術後追蹤：${document.getElementById('treat-postop').value}`, 10, 50);
    doc.text(`下次回診：${document.getElementById('next-visit').value}`, 10, 58);

    let y = 70;
    for (let url of uploadedFiles) {
        if (y > 270) { doc.addPage(); y = 10; }
        try {
            doc.addImage(url, 'JPEG', 10, y, 80, 80);
            y += 90;
        } catch (e) {}
    }

    doc.save(`貓咪病歷_${name}_${Date.now()}.pdf`);
}

// ==================== 備份 ====================
async function exportBackup() {
    const cats = await db.collection('cats').get();
    const treats = await db.collection('treatments').get();
    const data = {
        cats: cats.docs.map(d => ({ id: d.id, ...d.data() })),
        treatments: treats.docs.map(d => ({ id: d.id, ...d.data() }))
    };
    const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `貓咪病歷備份_${Date.now()}.json`;
    a.click();
}

async function restoreBackup(e) {
    const file = e.target.files[0];
    const data = JSON.parse(await file.text());
    for (let cat of data.cats) await db.collection('cats').doc(cat.id).set(cat);
    for (let t of data.treatments) await db.collection('treatments').doc(t.id).set(t);
    alert("✅ 還原成功");
    loadCatList();
}

async function clearAllData() {
    if (!confirm("⚠️ 確定要清空所有資料？無法復原")) return;
    const cats = await db.collection('cats').get();
    const treats = await db.collection('treatments').get();
    cats.forEach(d => d.ref.delete());
    treats.forEach(d => d.ref.delete());
    alert("✅ 已清空所有資料");
    loadCatList();
}

// 初始化
loadCatList();
</script>
</body>
</html>
