<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓咪醫療病歷系統</title>
    <!-- 樣式 -->
    <style>
        *{box-sizing:border-box;font-family:Arial;margin:0;padding:0}
        body{padding:20px;background:#f5f5f5}
        .container{max-width:1200px;margin:0 auto;background:white;padding:20px;border-radius:10px}
        .tab{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
        .tab button{padding:10px 20px;border:none;background:#e0e0e0;border-radius:5px;cursor:pointer}
        .tab button.active{background:#4CAF50;color:white}
        .page{display:none}
        .page.active{display:block}
        .form-group{margin:10px 0}
        input,textarea,select,button{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:5px}
        .card{border:1px solid #ddd;padding:15px;margin:10px 0;border-radius:8px}
        .photo-preview{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
        .photo-preview img{width:100px;height:100px;object-fit:cover;border-radius:5px}
        .btn{background:#4CAF50;color:white;border:none;padding:10px;cursor:pointer;margin:5px 0}
        .btn-danger{background:#f44336}
        .btn-warning{background:#ff9800}
        .reminder{margin:10px 0;padding:10px;background:#fff3e0;border-radius:5px}
        .search{margin-bottom:20px}
    </style>
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>
    <!-- PDF工具 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="container">
    <h1>🐱 貓咪醫療病歷系統</h1>

    <!-- 分頁 -->
    <div class="tab">
        <button onclick="openPage('cat-list')" class="active">貓咪列表</button>
        <button onclick="openPage('add-cat')">新增貓咪</button>
        <button onclick="openPage('backup')">備份/還原</button>
    </div>

    <!-- 1. 貓咪列表 -->
    <div id="cat-list" class="page active">
        <input type="text" class="search" placeholder="搜尋貓咪名字..." oninput="searchCat()">
        <div id="cat-list-content"></div>
    </div>

    <!-- 2. 新增貓咪 -->
    <div id="add-cat" class="page">
        <div class="form-group">
            <input id="cat-name" placeholder="貓咪名字" required>
            <input id="cat-breed" placeholder="品種">
            <input id="cat-birth" type="date" placeholder="生日">
            <input id="cat-weight" placeholder="體重(kg)">
        </div>
        <button class="btn" onclick="saveCat()">儲存貓咪基本資料</button>

        <div id="medical-section" style="display:none;margin-top:30px">
            <h3>就診紀錄 & 術後追蹤</h3>
            <input type="date" id="treat-date" required>
            <textarea id="treat-symptom" placeholder="症狀" rows="2"></textarea>
            <textarea id="treat-diagnosis" placeholder="診斷結果" rows="2"></textarea>
            <textarea id="treat-postop" placeholder="術後追蹤" rows="2"></textarea>
            <input type="date" id="next-visit" placeholder="下次回診日期">
            
            <div class="reminder">
                <p>回診提醒：</p>
                <label><input type="checkbox" id="remind-3day"> 回診前3天提醒</label>
                <label><input type="checkbox" id="remind-today"> 回診當天提醒</label>
            </div>

            <input type="file" id="file-upload" multiple accept="image/*,application/pdf">
            <div class="photo-preview" id="photo-preview"></div>

            <button class="btn" onclick="saveMedicalRecord()">儲存病歷</button>
            <button class="btn btn-warning" onclick="exportPDF()">匯出病歷PDF</button>
        </div>
    </div>

    <!-- 3. 備份/還原 -->
    <div id="backup" class="page">
        <button class="btn" onclick="exportBackup()">匯出備份檔</button>
        <input type="file" id="restore-file" accept=".json" onchange="restoreBackup()">
        <button class="btn btn-danger" onclick="clearAllData()">清空所有資料</button>
    </div>
</div>

<script>
// ==================== Firebase 初始化 (你的金鑰) ====================
const firebaseConfig = {
    apiKey: "AIzaSyD4iT2_YhVoBvOSVWz_-ZNJcR9BjEqHhaE",
    authDomain: "naibo-health.firebaseapp.com",
    projectId: "naibo-health",
    storageBucket: "naibo-health.firebasestorage.app",
    messagingSenderId: "1008746304734",
    appId: "1:1008746304734:web:33b87646673ee83b975e4f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// 全域變數
let currentCatId = "";
let uploadedFiles = [];

// ==================== 分頁切換 ====================
function openPage(pageName) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab button').forEach(b => b.classList.remove('active'));
    document.getElementById(pageName).classList.add('active');
    event.target.classList.add('active');
    if(pageName === 'cat-list') loadCatList();
}

// ==================== 貓咪管理 ====================
// 儲存貓咪基本資料
async function saveCat() {
    const name = document.getElementById('cat-name').value;
    const breed = document.getElementById('cat-breed').value;
    const birth = document.getElementById('cat-birth').value;
    const weight = document.getElementById('cat-weight').value;
    
    if(!name) {alert("請輸入貓咪名字");return;}
    
    const doc = await db.collection('cats').add({
        name, breed, birth, weight, createdAt: new Date()
    });
    currentCatId = doc.id;
    alert("貓咪資料儲存成功！");
    document.getElementById('medical-section').style.display = "block";
}

// 載入貓咪列表
async function loadCatList() {
    const content = document.getElementById('cat-list-content');
    content.innerHTML = "載入中...";
    const snap = await db.collection('cats').orderBy('createdAt','desc').get();
    content.innerHTML = "";
    
    snap.forEach(doc => {
        const cat = doc.data();
        content.innerHTML += `
        <div class="card" onclick="selectCat('${doc.id}')">
            <h3>${cat.name}</h3>
            <p>品種：${cat.breed || '未填'}</p>
            <p>生日：${cat.birth || '未填'}</p>
            <p>體重：${cat.weight || '未填'}kg</p>
        </div>`;
    });
}

// 搜尋貓咪
function searchCat() {
    const keyword = document.querySelector('.search').value.toLowerCase();
    document.querySelectorAll('.card').forEach(card => {
        const name = card.querySelector('h3').textContent.toLowerCase();
        card.style.display = name.includes(keyword) ? "block" : "none";
    });
}

// 選擇貓咪
function selectCat(catId) {
    currentCatId = catId;
    openPage('add-cat');
    alert("已選取貓咪，可編輯病歷");
}

// ==================== 病歷 & 檔案上傳 ====================
// 檔案上傳 + PDF轉圖片
document.getElementById('file-upload').addEventListener('change', async (e) => {
    const files = e.target.files;
    const preview = document.getElementById('photo-preview');
    preview.innerHTML = "";
    
    for(let file of files) {
        // 上傳Firebase Storage
        const ref = storage.ref(`medical/${currentCatId}/${Date.now()}-${file.name}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        uploadedFiles.push(url);
        
        // 預覽
        if(file.type.includes('image')) {
            preview.innerHTML += `<img src="${url}">`;
        } else if(file.type === 'application/pdf') {
            preview.innerHTML += `<img src="https://i.imgur.com/8zUoR1H.png" alt="PDF">`;
        }
    }
    alert("檔案上傳完成");
});

// 儲存病歷
async function saveMedicalRecord() {
    if(!currentCatId) {alert("請先建立/選擇貓咪");return;}
    
    const record = {
        catId: currentCatId,
        date: document.getElementById('treat-date').value,
        symptom: document.getElementById('treat-symptom').value,
        diagnosis: document.getElementById('treat-diagnosis').value,
        postop: document.getElementById('treat-postop').value,
        nextVisit: document.getElementById('next-visit').value,
        remind3day: document.getElementById('remind-3day').checked,
        remindToday: document.getElementById('remind-today').checked,
        files: uploadedFiles,
        createdAt: new Date()
    };
    
    await db.collection('treatments').add(record);
    alert("病歷儲存成功！");
    
    // 詢問加入行事曆
    if(record.nextVisit && confirm("是否將回診日期加入手機行事曆？")) {
        addToCalendar(record);
    }
}

// ==================== 行事曆提醒 ====================
function addToCalendar(record) {
    const date = record.nextVisit.replace(/-/g,'');
    const title = `貓咪回診 - ${document.getElementById('cat-name').value}`;
    const url = `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${date}/${date}&details=病歷回診`;
    window.open(url);
}

// ==================== PDF匯出 ====================
async function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const catName = document.getElementById('cat-name').value;
    
    doc.text(`貓咪病歷 - ${catName}`, 10, 10);
    doc.text(`就診日期：${document.getElementById('treat-date').value}`, 10, 20);
    doc.text(`症狀：${document.getElementById('treat-symptom').value}`, 10, 30);
    doc.text(`診斷：${document.getElementById('treat-diagnosis').value}`, 10, 40);
    doc.text(`術後追蹤：${document.getElementById('treat-postop').value}`, 10, 50);
    doc.text(`下次回診：${document.getElementById('next-visit').value}`, 10, 60);
    
    // 加入圖片
    let y = 70;
    for(let url of uploadedFiles) {
        if(y > 270) {doc.addPage(); y=10;}
        try {
            doc.addImage(url, 'JPEG', 10, y, 80, 80);
            y += 90;
        }catch(e){}
    }
    
    doc.save(`貓咪病歷_${catName}_${new Date().getTime()}.pdf`);
}

// ==================== 備份 & 還原 ====================
async function exportBackup() {
    const cats = await db.collection('cats').get();
    const treatments = await db.collection('treatments').get();
    const data = {
        cats: cats.docs.map(d => ({id:d.id, ...d.data()})),
        treatments: treatments.docs.map(d => ({id:d.id, ...d.data()}))
    };
    const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `貓咪病歷備份_${new Date().getTime()}.json`;
    a.click();
}

async function restoreBackup(e) {
    const file = e.target.files[0];
    const text = await file.text();
    const data = JSON.parse(text);
    
    // 寫回資料庫
    for(let cat of data.cats) {
        await db.collection('cats').doc(cat.id).set(cat);
    }
    for(let treat of data.treatments) {
        await db.collection('treatments').doc(treat.id).set(treat);
    }
    alert("還原成功！");
    loadCatList();
}

async function clearAllData() {
    if(!confirm("確定要清空所有資料？此操作無法復原！")) return;
    const cats = await db.collection('cats').get();
    cats.forEach(async d => await d.ref.delete());
    const treats = await db.collection('treatments').get();
    treats.forEach(async d => await d.ref.delete());
    alert("已清空所有資料");
    loadCatList();
}

// 初始化載入
loadCatList();
</script>
</body>
</html>
