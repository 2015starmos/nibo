<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寵物醫療病歷管理系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", sans-serif;
            font-size:14px;
        }
        body {
            background: #f5f5f5;
            padding:10px;
        }
        .container {
            max-width:1100px;
            margin:0 auto;
            background:white;
            border:1px solid #ddd;
            border-radius:5px;
            overflow:hidden;
        }
        .header {
            background:#003366;
            color:white;
            padding:12px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .header h1 {
            font-size:18px;
        }
        .btn {
            padding:6px 12px;
            border:none;
            border-radius:3px;
            cursor:pointer;
        }
        .btn-primary { background:#0066cc; color:white; }
        .btn-success { background:#28a745; color:white; }
        .btn-warning { background:#ffc107; color:#333; }
        .btn-danger { background:#dc3545; color:white; }
        .btn-sm { padding:4px 8px; font-size:12px; }

        .tabs {
            display:flex;
            background:#e9ecef;
        }
        .tab-item {
            padding:10px 20px;
            cursor:pointer;
            border-right:1px solid #ddd;
        }
        .tab-item.active {
            background:white;
            border-top:2px solid #0066cc;
        }
        .search-bar {
            padding:10px 20px;
            background:#f8f9fa;
            border-bottom:1px solid #ddd;
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }
        .search-bar input, .search-bar select {
            padding:6px;
            border:1px solid #ddd;
            width:180px;
        }
        .data-table {
            width:100%;
            border-collapse:collapse;
            margin:10px 0;
        }
        .data-table th, .data-table td {
            border:1px solid #ddd;
            padding:8px;
            text-align:left;
        }
        .data-table th {
            background:#e9ecef;
        }
        .form-section {
            padding:20px;
            display:none;
        }
        .form-section.active {
            display:block;
        }
        .form-grid {
            display:grid;
            grid-template-columns: repeat(3, 1fr);
            gap:15px;
            margin-bottom:20px;
        }
        .form-group {
            display:flex;
            flex-direction:column;
            gap:5px;
        }
        .form-group input, .form-group select, .form-group textarea {
            padding:8px;
            border:1px solid #ddd;
            border-radius:3px;
        }
        .full-width {
            grid-column: span 3;
        }
        .upload-area {
            border:2px dashed #ccc;
            padding:20px;
            text-align:center;
            cursor:pointer;
            margin:10px 0;
        }
        .file-preview {
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            margin:10px 0;
        }
        .preview-item {
            width:120px;
            border:1px solid #ddd;
            position:relative;
        }
        .preview-item img {
            width:100%;
            height:100px;
            object-fit:cover;
        }
        .delete-file {
            position:absolute;
            top:5px;
            right:5px;
            background:red;
            color:white;
            border:none;
            border-radius:50%;
            width:20px;
            height:20px;
            cursor:pointer;
        }
        .modal {
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.5);
            justify-content:center;
            align-items:center;
            z-index:999;
        }
        .modal-content {
            background:white;
            padding:20px;
            width:500px;
            border-radius:5px;
        }
        .loading {
            text-align:center;
            padding:10px;
            color:#0066cc;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🐾 寵物醫療病歷管理系統</h1>
    </div>

    <div class="tabs">
        <div class="tab-item active" onclick="goto('pet-list')">寵物資料</div>
        <div class="tab-item" onclick="goto('medical-record')">病歷紀錄</div>
        <div class="tab-item" onclick="goto('hospital-query')">院所管理</div>
        <div class="tab-item" onclick="goto('system-setting')">系統設定</div>
    </div>

    <div class="search-bar">
        <select id="search-key">
            <option value="name">寵物名</option>
            <option value="chip">晶片號</option>
            <option value="hospital">院所</option>
        </select>
        <input type="text" id="search-txt" placeholder="搜尋">
        <button class="btn btn-primary" onclick="doSearch()">搜尋</button>
    </div>

    <!-- 寵物列表 -->
    <div id="pet-list" class="form-section active">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
            <h2>寵物資料管理</h2>
            <button class="btn btn-primary" onclick="addPet()">新增寵物</button>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>寵物姓名</th>
                    <th>飼主</th>
                    <th>電話</th>
                    <th>晶片</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="pet-list-body">
                <tr><td colspan="5" class="loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 病歷 -->
    <div id="medical-record" class="form-section">
        <h2>病歷紀錄</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>寵物</label>
                <select id="pet-select"></select>
            </div>
            <div class="form-group">
                <label>院所</label>
                <select id="hospital-select"></select>
            </div>
            <div class="form-group">
                <label>日期</label>
                <input type="date" id="record-date">
            </div>
            <div class="form-group full-width">
                <label>就診原因</label>
                <textarea id="record-reason"></textarea>
            </div>
            <div class="form-group full-width">
                <label>診斷</label>
                <textarea id="record-diagnosis"></textarea>
            </div>
            <div class="form-group full-width">
                <label>藥物</label>
                <textarea id="record-medicine"></textarea>
            </div>
        </div>
        <div class="upload-area" onclick="document.getElementById('file-up').click()">
            點擊上傳照片 / PDF
            <input type="file" id="file-up" multiple accept="image/*,.pdf" style="display:none">
        </div>
        <div id="preview-area" class="file-preview"></div>
        <button class="btn btn-success" onclick="saveRecord()">儲存病歷</button>

        <h3 style="margin:20px 0 10px 0">歷史紀錄</h3>
        <table class="data-table">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>院所</th>
                    <th>原因</th>
                    <th>診斷</th>
                    <th>附件</th>
                </tr>
            </thead>
            <tbody id="record-body">
                <tr><td colspan="5" class="loading">載入中...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 院所 -->
    <div id="hospital-query" class="form-section">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
            <h2>院所管理</h2>
            <button class="btn btn-primary" onclick="addHospital()">新增院所</button>
        </div>
        <table class="data-table">
            <thead>
                <tr>
                    <th>院所名稱</th>
                    <th>地址</th>
                    <th>電話</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="hospital-body"></tbody>
        </table>
    </div>

    <!-- 系統 -->
    <div id="system-setting" class="form-section">
        <h2>系統設定</h2><br>
        <div class="form-group">
            <label>系統名稱</label>
            <input type="text" id="sys-name" style="width:300px">
        </div>
        <button class="btn btn-primary" onclick="saveSys()" style="margin-top:10px">儲存設定</button>
    </div>
</div>

<!-- 寵物彈窗 -->
<div id="pet-modal" class="modal">
    <div class="modal-content">
        <h3 id="pet-title">新增寵物</h3>
        <input type="hidden" id="pet-id">
        <div class="form-group">
            <label>寵物姓名</label>
            <input id="pet-name" style="width:100%;padding:8px;margin:5px 0">
        </div>
        <div class="form-group">
            <label>飼主</label>
            <input id="owner-name" style="width:100%;padding:8px;margin:5px 0">
        </div>
        <div class="form-group">
            <label>電話</label>
            <input id="owner-phone" style="width:100%;padding:8px;margin:5px 0">
        </div>
        <div class="form-group">
            <label>晶片號碼</label>
            <input id="pet-chip" style="width:100%;padding:8px;margin:5px 0">
        </div>
        <button class="btn btn-success" onclick="savePetData()">儲存</button>
        <button class="btn btn-danger" onclick="closePet()" style="margin-left:5px">取消</button>
    </div>
</div>

<!-- 院所彈窗 -->
<div id="hospital-modal" class="modal">
    <div class="modal-content">
        <h3 id="hos-title">新增院所</h3>
        <input type="hidden" id="hos-id">
        <div class="form-group">
            <label>院所名稱</label>
            <input id="hos-name" style="width:100%;padding:8px;margin:5px 0">
        </div>
        <div class="form-group">
            <label>地址</label>
            <input id="hos-address" style="width:100%;padding:8px;margin:5px 0">
        </div>
        <div class="form-group">
            <label>電話</label>
            <input id="hos-phone" style="width:100%;padding:8px;margin:5px 0">
        </div>
        <button class="btn btn-success" onclick="saveHospitalData()">儲存</button>
        <button class="btn btn-danger" onclick="closeHospital()" style="margin-left:5px">取消</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script>
// ====================== 你的新 Firebase 金鑰 ======================
const firebaseConfig = {
  apiKey: "AIzaSyB2yEi76WZfALxNkInhG5oG_0LMlNqDgH0",
  authDomain: "nibo-medical.firebaseapp.com",
  projectId: "nibo-medical",
  storageBucket: "nibo-medical.firebasestorage.app",
  messagingSenderId: "832769973754",
  appId: "1:832769973754:web:9e7782b36bfc89d02a5843"
};

// 初始化
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

let pets = [];
let records = [];
let hospitals = [];
let files = [];

// 啟動
window.onload = async () => {
  await loadAll();
  renderAll();
};

// 讀取所有資料
async function loadAll() {
  try {
    // 寵物
    const petSnap = await db.collection('pets').get();
    pets = petSnap.docs.map(d => ({ id:d.id, ...d.data() }));

    // 病歷
    const recSnap = await db.collection('records').orderBy('date','desc').get();
    records = recSnap.docs.map(d => ({ id:d.id, ...d.data() }));

    // 院所
    const hosSnap = await db.collection('hospitals').get();
    hospitals = hosSnap.docs.map(d => ({ id:d.id, ...d.data() }));

    if (hospitals.length === 0) {
      await initHospital();
    }
  } catch(e) {
    console.error("錯誤",e);
    alert("載入失敗：請確認 Firebase 規則已開放");
  }
}

// 預設院所
async function initHospital() {
  const data = [
    { name:"寵物醫院", address:"台北市", phone:"02-00000000" },
    { name:"動物診所", address:"台中市", phone:"04-00000000" }
  ];
  for(let i=0;i<data.length;i++){
    await db.collection('hospitals').add(data[i]);
  }
  const snap = await db.collection('hospitals').get();
  hospitals = snap.docs.map(d => ({ id:d.id, ...d.data() }));
}

// 切換頁面
function goto(id) {
  document.querySelectorAll('.form-section').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(el=>el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

// 寵物
function addPet(){
  document.getElementById('pet-title').innerText = "新增寵物";
  document.getElementById('pet-id').value = "";
  document.getElementById('pet-name').value = "";
  document.getElementById('owner-name').value = "";
  document.getElementById('owner-phone').value = "";
  document.getElementById('pet-chip').value = "";
  document.getElementById('pet-modal').style.display = "flex";
}
function closePet(){
  document.getElementById('pet-modal').style.display = "none";
}
async function savePetData(){
  const id = document.getElementById('pet-id').value;
  const data = {
    name: document.getElementById('pet-name').value,
    owner: document.getElementById('owner-name').value,
    phone: document.getElementById('owner-phone').value,
    chip: document.getElementById('pet-chip').value
  };
  if(id){
    await db.collection('pets').doc(id).update(data);
  }else{
    await db.collection('pets').add(data);
  }
  await loadAll();
  renderAll();
  closePet();
}

// 院所
function addHospital(){
  document.getElementById('hos-title').innerText = "新增院所";
  document.getElementById('hos-id').value = "";
  document.getElementById('hos-name').value = "";
  document.getElementById('hos-address').value = "";
  document.getElementById('hos-phone').value = "";
  document.getElementById('hospital-modal').style.display = "flex";
}
function closeHospital(){
  document.getElementById('hospital-modal').style.display = "none";
}
async function saveHospitalData(){
  const id = document.getElementById('hos-id').value;
  const data = {
    name: document.getElementById('hos-name').value,
    address: document.getElementById('hos-address').value,
    phone: document.getElementById('hos-phone').value
  };
  if(id){
    await db.collection('hospitals').doc(id).update(data);
  }else{
    await db.collection('hospitals').add(data);
  }
  await loadAll();
  renderAll();
  closeHospital();
}

// 上傳
document.getElementById('file-up').onchange = (e)=>{
  files = [...files, ...e.target.files];
  showPreview();
};
function showPreview(){
  const area = document.getElementById('preview-area');
  area.innerHTML = "";
  files.forEach((f,i)=>{
    const div = document.createElement('div');
    div.className = "preview-item";
    if(f.type.includes('image')){
      const url = URL.createObjectURL(f);
      div.innerHTML = `<img src="${url}"><button class="delete-file" onclick="delFile(${i})">×</button>`;
    }else{
      div.innerHTML = `<div style='height:100px;display:flex;align-items:center;justify-content:center'>📄</div><button class="delete-file" onclick="delFile(${i})">×</button>`;
    }
    area.appendChild(div);
  });
}
function delFile(i){
  files.splice(i,1);
  showPreview();
}

// 儲存病歷
async function saveRecord(){
  const petId = document.getElementById('pet-select').value;
  const hospitalId = document.getElementById('hospital-select').value;
  const date = document.getElementById('record-date').value;
  const reason = document.getElementById('record-reason').value;
  const diagnosis = document.getElementById('record-diagnosis').value;
  const medicine = document.getElementById('record-medicine').value;

  if(!petId || !hospitalId || !date){ alert("必填"); return; }

  const pet = pets.find(p=>p.id===petId);
  const hospital = hospitals.find(h=>h.id===hospitalId);
  const attachments = [];

  for(let f of files){
    const ref = storage.ref(`files/${Date.now()}_${f.name}`);
    await ref.put(f);
    const url = await ref.getDownloadURL();
    attachments.push({name:f.name, url});
  }

  await db.collection('records').add({
    petId, petName:pet.name,
    hospitalId, hospitalName:hospital.name,
    date, reason, diagnosis, medicine, attachments
  });

  await loadAll();
  renderAll();
  files = [];
  showPreview();
  alert("儲存完成！");
}

// 畫面更新
function renderAll(){
  renderPet();
  renderHospital();
  renderRecord();
  fillSelect();
}

function renderPet(){
  const b = document.getElementById('pet-list-body');
  b.innerHTML = "";
  pets.forEach(p=>{
    b.innerHTML += `
    <tr>
      <td>${p.name}</td>
      <td>${p.owner}</td>
      <td>${p.phone}</td>
      <td>${p.chip||'-'}</td>
      <td>
        <button class='btn btn-sm btn-warning' onclick='editPet("${p.id}")'>修改</button>
      </td>
    </tr>`;
  });
}
function editPet(id){
  const p = pets.find(x=>x.id===id);
  document.getElementById('pet-title').innerText = "修改寵物";
  document.getElementById('pet-id').value = id;
  document.getElementById('pet-name').value = p.name;
  document.getElementById('owner-name').value = p.owner;
  document.getElementById('owner-phone').value = p.phone;
  document.getElementById('pet-chip').value = p.chip||'';
  document.getElementById('pet-modal').style.display = "flex";
}

function renderHospital(){
  const b = document.getElementById('hospital-body');
  b.innerHTML = "";
  hospitals.forEach(h=>{
    b.innerHTML += `
    <tr>
      <td>${h.name}</td>
      <td>${h.address}</td>
      <td>${h.phone}</td>
      <td>
        <button class='btn btn-sm btn-warning' onclick='editHos("${h.id}")'>修改</button>
      </td>
    </tr>`;
  });
}
function editHos(id){
  const h = hospitals.find(x=>x.id===id);
  document.getElementById('hos-title').innerText = "修改院所";
  document.getElementById('hos-id').value = id;
  document.getElementById('hos-name').value = h.name;
  document.getElementById('hos-address').value = h.address;
  document.getElementById('hos-phone').value = h.phone;
  document.getElementById('hospital-modal').style.display = "flex";
}

function renderRecord(){
  const b = document.getElementById('record-body');
  b.innerHTML = "";
  records.forEach(r=>{
    const cnt = r.attachments?.length||0;
    b.innerHTML += `
    <tr>
      <td>${r.date}</td>
      <td>${r.hospitalName}</td>
      <td>${r.reason}</td>
      <td>${r.diagnosis||'-'}</td>
      <td>${cnt} 個</td>
    </tr>`;
  });
}

function fillSelect(){
  const petSel = document.getElementById('pet-select');
  const hosSel = document.getElementById('hospital-select');
  petSel.innerHTML = `<option value=''>請選擇</option>`;
  hosSel.innerHTML = `<option value=''>請選擇</option>`;
  pets.forEach(p=>{
    petSel.innerHTML += `<option value='${p.id}'>${p.name}</option>`;
  });
  hospitals.forEach(h=>{
    hosSel.innerHTML += `<option value='${h.id}'>${h.name}</option>`;
  });
}

function doSearch(){
  const key = document.getElementById('search-key').value;
  const txt = document.getElementById('search-txt').value.toLowerCase();
  if(key==='name'){
    const list = pets.filter(p=>p.name.toLowerCase().includes(txt));
    const b = document.getElementById('pet-list-body');
    b.innerHTML = "";
    list.forEach(p=>{
      b.innerHTML += `<tr><td>${p.name}</td><td>${p.owner}</td><td>${p.phone}</td><td>${p.chip||'-'}</td></tr>`;
    });
    goto('pet-list');
  }
}

function saveSys(){
  alert("設定儲存成功");
}
</script>
</body>
</html>
