<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>貓貓の健康全紀錄</title>

<style>
.inlock-wrap{position:fixed;inset:0;background:linear-gradient(160deg, #f6f9fe, #eaf2f9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.inlock-box{width:100%;max-width:360px;background:#fff;border-radius:24px;padding:28px 20px;box-shadow:0 6px 20px rgba(71,143,184,0.15);text-align:center;}
.inlock-title{font-size:20px;color:#478fb8;margin-bottom:18px;font-weight:600;}
.inlock-input{width:100%;padding:13px 16px;border:1px solid #dce9f2;border-radius:18px;background:#f9fbfe;text-align:center;font-size:16px;margin-bottom:10px;}
.inlock-btn{width:100%;padding:13px;border:none;border-radius:18px;background:linear-gradient(90deg,#58a2cc,#478fb8);color:#fff;font-size:16px;cursor:pointer;}
.inlock-tip{height:20px;font-size:14px;color:#f28484;margin:6px 0;}
.main-content{display:none;}

/* 後台驗證彈窗 + 關閉按鈕 */
.admin-lock-modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9998;display:none;align-items:center;justify-content:center;padding:20px;}
.admin-lock-box{width:100%;max-width:360px;background:#fff;border-radius:24px;padding:28px 20px;box-shadow:0 10px 30px rgba(0,0,0,0.15);text-align:center;position:relative;}
.admin-close-btn{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;border:none;background:#f0f3f7;color:#666;font-size:20px;line-height:32px;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;}
.admin-close-btn:active{background:#dde2e8;transform:scale(0.92);}
.admin-lock-title{font-size:22px;color:#478fb8;margin-bottom:20px;font-weight:700;}
.admin-lock-input{width:100%;padding:14px 16px;border:1px solid #dce9f2;border-radius:20px;background:#f9fbfe;text-align:center;font-size:16px;margin-bottom:15px;}
.admin-lock-btn{width:100%;padding:14px;border:none;border-radius:20px;background:#58a2cc;color:white;font-size:17px;font-weight:500;cursor:pointer;}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
}

:root {
  --bg-gradient-1: #f6f9fe;
  --bg-gradient-2: #eaf2f9;
  --card-bg: #ffffff;
  --text-main: #506473;
  --primary: #478fb8;
  --primary-light: rgba(71,143,184,0.12);
  --border-color: #dce9f2;
  --input-bg: #f9fbfe;
  --btn-gray: #d7e3ec;
  --table-bg: #f8fbfd;
  --table-head: #f0f6fb;
  --danger: #f28484;
  --success: #34a873;
  --warn: #e39548;
  --green: #34a873;
  --orange: #f2994a;
}

.dark-mode {
  --bg-gradient-1: #1a202c;
  --bg-gradient-2: #121822;
  --card-bg: #242c37;
  --text-main: #cbd5e0;
  --primary: #63b3e0;
  --primary-light: rgba(99,179,224,0.15);
  --border-color: #3a4756;
  --input-bg: #2d3743;
  --btn-gray: #3a4756;
  --table-bg: #2d3743;
  --table-head: #323e4d;
}

body {
  font-family: "微軟正黑體", "Noto Sans TC", sans-serif;
  background: linear-gradient(160deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
  padding: 20px 14px;
  min-height: 100vh;
  color: var(--text-main);
}

.wrapper {
  width: 100%;
  max-width:560px;
  margin: 0 auto;
}

.main-title {
  text-align: center;
  font-size: 24px;
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.cat-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
  justify-content: center;
}
.cat-select {
  padding: 10px 14px;
  border-radius: 16px;
  border: 1px solid var(--border-color);
  background: var(--input-bg);
  color: var(--text-main);
  font-size: 15px;
  width: 180px;
  text-align: center;
}
.cat-add-btn {
  padding: 10px 12px;
  border-radius: 16px;
  border: none;
  background: var(--primary);
  color: #fff;
  cursor: pointer;
}

.tab-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  border-radius: 16px;
  border: none;
  background: var(--btn-gray);
  color: var(--text-main);
  font-size: 14px;
  cursor: pointer;
  min-width: 80px;
}
.tab-btn.active {
  background: var(--primary);
  color: #fff;
}
.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
}

.theme-switch {
  display: block;
  margin: 0 auto 16px;
  border: none;
  background: var(--primary-light);
  color: var(--primary);
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size:14px;
}
.theme-switch:active { transform: scale(0.96); }

.info-banner {
  width: 100%;
  background: var(--primary-light);
  border-radius: 30px;
  padding: 13px 16px;
  text-align: center;
  font-size: 15px;
  color: var(--primary);
  margin-bottom: 16px;
}

.ui-card {
  background: var(--card-bg);
  border-radius: 28px;
  padding: 20px 18px;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(71,143,184,0.08);
  overflow: hidden;
}

.form-input {
  width: 100%;
  padding: 13px 12px;
  margin: 6px 0;
  border: 1px solid var(--border-color);
  border-radius: 20px;
  background-color: var(--input-bg);
  font-size: 15px;
  text-align: center;
  color: var(--text-main);
}
.form-input:focus {
  outline: none;
  border-color: var(--primary);
}

.quick-btn-group {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.btn-quick {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--primary);
  background: transparent;
  color: var(--primary);
  border-radius: 15px;
  cursor: pointer;
  font-weight: 500;
}
.btn-quick:active {
  background: var(--primary);
  color: #fff;
  transform: scale(0.97);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  margin-top: 5px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(90deg, #58a2cc, #478fb8);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}
.btn-primary:active { opacity: 0.92; transform: scale(0.99); }

.btn-delete {
  border: none;
  background: var(--danger);
  color: #fff;
  padding: 6px 10px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
}
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.btn-clear-day, .btn-export, .btn-import {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 20px;
  background: var(--btn-gray);
  color: var(--text-main);
  font-size: 14px;
  cursor: pointer;
}

.today-total-box {
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  padding: 10px 0;
}
.text-low { color: #e39548; }
.text-normal { color: #34a873; }
.text-high { color: #58a2cc; }

.record-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 8px;
  table-layout: fixed;
  margin-top:10px;
}
.record-table th {
  background: var(--table-head);
  color: var(--primary);
  padding: 10px 4px;
  border-radius: 14px;
  font-weight: 500;
  font-size:13px;
}
.record-table td {
  background: var(--table-bg);
  text-align: center;
  padding: 12px 4px;
  font-size: 15px;
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 16px;
}
.stat-item {
  background: var(--primary-light);
  border-radius: 20px;
  padding: 16px 8px;
  text-align: center;
}
.stat-label { font-size: 14px; color: var(--primary); margin-bottom: 4px; }
.stat-num { font-size: 17px; font-weight: 600; line-height:1.4; }

.sync-badge{
  text-align:center;
  font-size:12px;
  color:var(--success);
  margin-bottom:8px;
}

.btn-danger-full {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 20px;
  background: var(--danger);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}

/* 後台專用樣式 */
.admin-logout-btn{background:#999;color:white;margin-bottom:16px;}
.admin-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-color);margin:6px 0;}
.admin-btn-sm{padding:8px 14px;border-radius:12px;border:none;cursor:pointer;}
.btn-edit{background:#cce7f5;color:var(--primary);margin-right:6px;}
.btn-del{background:#f28484;color:white;}
.admin-green{background:#34a873;color:white;}
.admin-orange{background:#e39548;color:white;}
.admin-desc{font-size:12px;color:#d9534f;margin-top:8px;text-align:center;}
.radio-row{display:flex;gap:20px;margin:10px 0 16px;padding:0 10px;}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<!-- 一般使用者解鎖 -->
<div class="inlock-wrap">
  <div class="inlock-box">
    <div class="inlock-title">🔐 波波健康紀錄 解鎖</div>
    <input type="password" class="inlock-input" id="inPwd" placeholder="請輸入密碼">
    <label style="display:block;text-align:left;margin:8px auto 0;width:fit-content;font-size:14px;color:var(--text-main);cursor:pointer;">
      <input type="checkbox" id="savePwdCheck"> 記住密碼
    </label>
    <div class="inlock-tip" id="inTip"></div>
    <button class="inlock-btn" onclick="checkInPwd()">確認解鎖</button>
  </div>
</div>

<!-- 管理員驗證彈窗 -->
<div class="admin-lock-modal" id="adminAuthModal">
  <div class="admin-lock-box">
    <button class="admin-close-btn" onclick="closeAdminModal()">×</button>
    <div class="admin-lock-title">管理員驗證</div>
    <input type="password" class="admin-lock-input" id="adminPwdInput" placeholder="輸入管理員密碼">
    <button class="admin-lock-btn" onclick="checkAdminPassword()">確認進入後台</button>
  </div>
</div>

<div class="main-content">
<div class="wrapper">
  <h1 class="main-title">🐾 貓貓の健康全紀錄</h1>
  <div class="sync-badge" id="syncBadge">☁️ 雲端同步連線中...</div>
  <button class="theme-switch" onclick="toggleDarkMode()">🌓 切換深色模式</button>

  <div class="cat-selector">
    <select class="cat-select" id="catSelect" onchange="switchCat()"></select>
    <button class="cat-add-btn" onclick="addNewCat()">+ 新增貓咪</button>
  </div>

  <div class="tab-wrap">
    <button class="tab-btn active" data-tab="water">飲水</button>
    <button class="tab-btn" data-tab="weight">體重</button>
    <button class="tab-btn" data-tab="deworm">驅蟲</button>
    <button class="tab-btn" data-tab="admin">系統後台</button>
  </div>

  <!-- 飲水頁 -->
  <div class="tab-content active" id="tab-water">
    <div class="info-banner">💧 貓咪建議目標：150ml ～ 210ml / 每日</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="selectDate">
      <input class="form-input" type="time" id="selectTime">
      <div class="quick-btn-group">
        <button class="btn-quick" onclick="quickAdd(25)">+25ml</button>
        <button class="btn-quick" onclick="quickAdd(50)">+50ml</button>
        <button class="btn-quick" onclick="quickAdd(75)">+75ml</button>
      </div>
      <input class="form-input" type="number" id="waterML" placeholder="手動輸入水量 ml" inputmode="numeric" min="1">
      <button class="btn-primary" onclick="addRecord()">✅ 新增飲水紀錄</button>
    </div>

    <div class="ui-card">
      <div class="today-total-box" id="totalShow">今日：0 ml</div>
      <div id="warnTip"></div>
      <table class="record-table">
        <thead>
          <tr><th>時間</th><th>飲水量</th><th>操作</th></tr>
        </thead>
        <tbody id="recordBody"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn-clear-day" onclick="clearDayRecord()">🗑️ 清空今日</button>
        <button class="btn-export" onclick="exportCSV()">📤 匯出CSV</button>
        <button class="btn-import" onclick="triggerImport()">📥 匯入CSV</button>
      </div>
      <input type="file" id="importFile" accept=".csv" onchange="importCSV(event)">
    </div>
  </div>

  <!-- 體重頁 (已修改最高/最低顯示日期) -->
  <div class="tab-content" id="tab-weight">
    <div class="info-banner">⏲️ 體重趨勢追蹤｜自動計算增減</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="weightDate">

<input class="form-input" type="number" step="0.001" min="0" id="weightVal" placeholder="輸入體重 kg">
      <input class="form-input" id="weightNote" placeholder="備註（飯前/飯後）">
      <button class="btn-primary" onclick="addWeight()">✅ 新增體重紀錄</button>
    </div>

    <div class="ui-card">
      <div class="today-total-box" id="weightLatest">最新體重：0 kg</div>
      <table class="record-table">
        <thead><tr><th>日期</th><th>體重</th><th>備註</th><th>刪除</th></tr></thead>
        <tbody id="weightBody"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn-export" onclick="exportWeightCSV()">📤 匯出CSV</button>
        <button class="btn-import" onclick="triggerWeightImport()">📥 匯入CSV</button>
      </div>
      <input type="file" id="importWeightFile" accept=".csv" style="display:none;" onchange="importWeightCSV(event)">
    </div>

    <div class="ui-card">
      <div style="text-align:center; margin-bottom:10px; font-weight:500;font-size:17px;">📈 體重統計</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-label">最高體重</div><div class="stat-num" id="wMax">0 kg</div></div>
        <div class="stat-item"><div class="stat-label">最低體重</div><div class="stat-num" id="wMin">0 kg</div></div>
        <div class="stat-item"><div class="stat-label">30日平均</div><div class="stat-num" id="wAvg">0 kg</div></div>
        <div class="stat-item"><div class="stat-label">最近變化</div><div class="stat-num" id="wDiff">0 kg</div></div>
      </div>
    </div>
  </div>

  <!-- 驅蟲頁 -->
  <div class="tab-content" id="tab-deworm">
    <div class="info-banner">🐛 體外驅蟲紀錄｜提醒下次使用時間</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="dewormDate">
      <select class="form-input" id="dewormDrug">
        <option value="">請選擇藥品</option>
        <option value="全能貓">全能貓</option>
        <option value="寵愛">寵愛</option>
      </select>
      <input class="form-input" type="date" id="dewormNext" placeholder="預計下次使用日期">
      <button class="btn-primary" onclick="addDeworm()">✅ 新增驅蟲紀錄</button>
    </div>

    <div class="ui-card">
      <table class="record-table">
        <thead><tr><th>使用日期</th><th>藥品</th><th>下次日期</th><th>刪除</th></tr></thead>
        <tbody id="dewormBody"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn-export" onclick="exportParaCSV()">📤 匯出CSV</button>
        <button class="btn-import" onclick="triggerParaImport()">📥 匯入CSV</button>
      </div>
      <input type="file" id="importParaFile" accept=".csv" style="display:none;" onchange="importParaCSV(event)">
    </div>
  </div>

  <!-- 系統後台頁 -->
  <div class="tab-content" id="tab-admin">
    <div class="ui-card">
      <button class="btn-primary admin-logout-btn" onclick="adminLogout()">後台登出</button>

      <h3 style="margin-bottom:12px;text-align:left;">🔐 密碼管理（雲端）</h3>
      <input class="form-input" type="password" id="oldAdminPwd" placeholder="舊登入密碼">
      <input class="form-input" type="password" id="newAdminPwd1" placeholder="新登入密碼">
      <input class="form-input" type="password" id="newAdminPwd2" placeholder="確認新密碼">
      <button class="btn-primary" onclick="updateAdminPassword()">更新使用者密碼</button>
    </div>

    <div class="ui-card">
      <h3 style="margin-bottom:12px;text-align:left;">🐾 貓咪檔案管理（雲端）</h3>
      <div id="adminCatList"></div>
      <button class="btn-primary" onclick="addNewCat()">新增貓咪</button>
    </div>

    <div class="ui-card">
      <h3 style="margin-bottom:12px;text-align:left;">💾 全域備份與還原</h3>
      <div class="radio-row">
        <label><input type="radio" name="globalMode" value="overwrite" checked> 覆蓋還原</label>
        <label><input type="radio" name="globalMode" value="add"> 增量匯入</label>
      </div>
      <div class="btn-row">
        <button class="btn-primary admin-green" onclick="fullBackupExport()">完整備份匯出</button>
        <button class="btn-primary admin-orange" onclick="triggerFullImport()">全域還原匯入</button>
      </div>
      <p class="admin-desc">覆蓋=清空舊數據還原｜增量=保留舊數據追加</p>
      <input type="file" id="fullBackupFile" accept=".json" style="display:none;" onchange="fullRestoreImport(event)">
    </div>

    <div class="ui-card">
      <h3 style="margin-bottom:12px;text-align:left;">📁 分類匯入匯出</h3>
      <div class="radio-row">
        <label><input type="radio" name="cateMode" value="overwrite" checked> 覆蓋匯入</label>
        <label><input type="radio" name="cateMode" value="add"> 增量匯入</label>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <button class="btn-clear-day" onclick="exportAllWater()">匯出全部飲水</button>
        <button class="btn-clear-day" onclick="exportAllWeight()">匯出全部體重</button>
        <button class="btn-clear-day" onclick="exportAllDeworm()">匯出全部驅蟲</button>
        <button class="btn-clear-day" onclick="exportCatList()">匯出貓咪清單</button>
        <button class="btn-clear-day" onclick="triggerCatWaterImport()">匯入飲水數據</button>
        <button class="btn-clear-day" onclick="triggerCatWeightImport()">匯入體重數據</button>
        <button class="btn-clear-day" onclick="triggerCatDewormImport()">匯入驅蟲數據</button>
        <button class="btn-clear-day" onclick="triggerCatListImport()">匯入貓咪清單</button>
      </div>
      <input type="file" id="cateImportFile" accept=".csv,.json" style="display:none;" onchange="categoryImport(event)">
    </div>

    <button class="btn-danger-full" onclick="showClearAllConfirm()">🗑️ 清空全部數據</button>
  </div>

</div>
</div>

<script>

document.oncontextmenu = () => false;
document.addEventListener('keydown',e=>{
  if(e.keyCode===123) e.preventDefault();
  if(e.ctrlKey&&e.keyCode===85)e.preventDefault();
  if(e.ctrlKey&&e.shiftKey&&e.keyCode===73)e.preventDefault();
  if(e.ctrlKey&&e.keyCode===83)e.preventDefault();
});

function closeAdminModal(){
  document.getElementById('adminAuthModal').style.display = 'none';
  document.getElementById('adminPwdInput').value = '';
}
document.getElementById('adminAuthModal').addEventListener('click',e=>{if(e.target === this) closeAdminModal()});

const validPws = ["0963612120", "0952867812", "ha821208"];
let ADMIN_PASSWORD = "cc821208";
const LOGIN_EXPIRE_HOUR = 4;
let loginCheckTimer = null;
let adminVerified = false;
let activeTab = "water"; // 記住當前分頁

window.addEventListener('DOMContentLoaded', () => {
  const savePwdCheck = document.getElementById('savePwdCheck');
  const pwdInput = document.getElementById('inPwd');
  const savedPwd = localStorage.getItem('catSysSavedPwd');
  const savedExpire = localStorage.getItem('catSysLoginExpire');

  if(savedPwd) pwdInput.value = savedPwd, savePwdCheck.checked = true;
  if(savedExpire){
    const expire = parseInt(savedExpire);
    if(Date.now() > expire) manualLogout();
    else {
      document.querySelector(".inlock-wrap").style.display="none";
      document.querySelector(".main-content").style.display="block";
      initCatSystem();
      startLoginExpireCheck();
    }
  }
  if(localStorage.getItem('darkMode') === 'true'){
    darkMode = true;
    document.body.classList.add('dark-mode');
  }

  // 點擊分頁儲存當前頁
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeTab = btn.dataset.tab;
      if(btn.dataset.tab === 'admin' && !adminVerified){
        document.getElementById('adminAuthModal').style.display = 'flex';
      }else{

function listenAllData(){
  const wCol = db.collection(`catWater_${currentCat}`);

async function addRecord(){
  const d=document.getElementById("selectDate").value;
  const t=document.getElementById("selectTime").value;
  const ml=+document.getElementById("waterML").value;
  if(!d||!t||isNaN(ml)||ml<1)return alert("輸入正確水量");
  await db.collection(`catWater_${currentCat}`).add({date:d,time:t,ml,stamp:Date.now()});
  document.getElementById("waterML").value="";
}

  if(!confirm("刪除此筆？"))return;
  const snap = await db.collection(`catWater_${currentCat}`).where("stamp","==",stamp).get();

}
async function clearDayRecord(){
  if(!confirm("清空今日紀錄？"))return;
  const pwd = prompt("輸入密碼確認：");
  if(!validPws.includes(pwd))return alert("密碼錯誤");
  const d = document.getElementById("selectDate").value;
  const snap = await db.collection(`catWater_${currentCat}`).where("date","==",d).get();

function renderPage(){
  const d = document.getElementById("selectDate").value;
  const list = recordData.filter(x=>x.date===d).sort((a,b)=>b.time.localeCompare(a.time));
  const total = list.reduce((s,x)=>s+x.ml,0);
  let cls="text-low",tip="";
  if(total>=150&&total<=210){cls="text-normal";tip="<div class='warn-high'>✅ 達標</div>"}
  else if(total>210){cls="text-high";tip="<div class='warn-high'>⚠️ 過量</div>"}
  else if(total>0){tip="<div class='warn-low'>⚠️ 不足</div>"}
  document.getElementById("totalShow").innerHTML=`今日：<span class="${cls}">${total}</span> ml`;
  document.getElementById("warnTip").innerHTML=tip;
  document.getElementById("recordBody").innerHTML = list.map(x=>`
  <tr><td>${x.time}</td><td>${x.ml}ml</td><td><button class='btn-delete' onclick='delOne(${x.stamp})'>刪</button></tr>`).join("");
}
document.getElementById("selectDate").addEventListener("change",renderPage);

// 體重完全原值顯示 無四捨五入
async function addWeight(){
  const d=document.getElementById("weightDate").value;
  const w=Number(document.getElementById("weightVal").value);
  const n=document.getElementById("weightNote").value;
  if(!d||isNaN(w)||w<=0)return alert("輸入正確體重");
  await db.collection(`catWeight_${currentCat}`).add({date:d,weight:w,note:n,stamp:Date.now()});
  document.getElementById("weightVal").value="";
  document.getElementById("weightNote").value="";
}
async function delWeight(stamp){
  if(!confirm("刪除此筆？"))return;
  const snap = await db.collection(`catWeight_${currentCat}`).where("stamp","==",stamp).get();
  snap.forEach(x=>x.ref.delete());
}

function renderWeight(){
  const list = [...weightData].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById("weightBody").innerHTML = list.map(x=>`
  <tr>
    <td>${x.date}</td>
    <td>${x.weight}</td>
    <td>${x.note||"-"}</td>
    <td><button class='btn-delete' onclick='delWeight(${x.stamp})'>刪</button></td>
  </tr>`).join("");

  if(!list.length){
    document.getElementById("weightLatest").innerText = "最新體重：無紀錄";
    document.getElementById("wMax").innerText = "0 kg";
    document.getElementById("wMin").innerText = "0 kg";
    document.getElementById("wAvg").innerText = "0 kg";
    document.getElementById("wDiff").innerText = "0 kg";
    return;
  }

  const latest = list[0];
  document.getElementById("weightLatest").innerText = `最新：${latest.weight} kg`;

  const maxItem = list.reduce((a,b)=>a.weight > b.weight ? a : b);
  const minItem = list.reduce((a,b)=>a.weight < b.weight ? a : b);

  document.getElementById("wMax").innerHTML = `${maxItem.weight} kg<br><small style="opacity:0.75">${maxItem.date}</small>`;
  document.getElementById("wMin").innerHTML = `${minItem.weight} kg<br><small style="opacity:0.75">${minItem.date}</small>`;

  const total = list.reduce((sum,item)=>sum + item.weight, 0);
  const avg = total / list.length;
  document.getElementById("wAvg").innerText = avg + " kg";

  const diff = list.length>=2 ? (list[0].weight - list[1].weight) : 0;
  document.getElementById("wDiff").innerText = diff + " kg";
}

function renderDeworm(){
  const list = [...dewormData].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById("dewormBody").innerHTML = list.map(x=>`
  <tr>
    <td>${x.date}</td>
    <td>${x.drug||"-"}</td>
    <td>${x.next||"-"}</td>
    <td><button class='btn-delete' onclick="delDeworm(${x.stamp})">刪</button></td>
  </tr>`).join("");
}
