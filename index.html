<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>貓咪健康專業後台｜點後台才彈密碼</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg1:#f6f9fe;--bg2:#eaf2f9;--card:#fff;--text:#506473;
--pri:#478fb8;--pri-light:rgba(71,143,184,0.12);--border:#dce9f2;
--input-bg:#f9fbfe;--gray:#d7e3ec;--danger:#f28484;--success:#34a873;--warn:#e39548;
}
.dark-mode{
--bg1:#1a202c;--bg2:#121822;--card:#242c37;--text:#cbd5e0;
--pri:#63b3e0;--pri-light:rgba(99,179,224,0.15);--border:#3a4756;
--input-bg:#2d3743;--gray:#3a4756;
}
body{font-family:"微軟正黑體",Noto Sans TC,sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2));color:var(--text);padding:16px;min-height:100vh}
.wrapper{max-width:560px;margin:0 auto}
.main-title{text-align:center;font-size:24px;color:var(--pri);font-weight:600;margin-bottom:12px}
.sync-badge{text-align:center;font-size:12px;color:var(--success);margin-bottom:8px}
.theme-switch{display:block;margin:0 auto 16px;border:none;background:var(--pri-light);color:var(--pri);padding:8px 16px;border-radius:20px;cursor:pointer}
.cat-selector{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.cat-select{padding:10px 14px;border-radius:16px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);width:180px;font-size:15px;text-align:center}
.cat-add-btn{padding:10px 12px;border-radius:16px;border:none;background:var(--pri);color:#fff;cursor:pointer}
.tab-wrap{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tab-btn{flex:1;padding:10px;border-radius:16px;border:none;background:var(--gray);color:var(--text);font-size:14px;min-width:80px;cursor:pointer}
.tab-btn.active{background:var(--pri);color:#fff}
.tab-content{display:none}
.tab-content.active{display:block}
.info-banner{background:var(--pri-light);border-radius:30px;padding:13px 16px;text-align:center;font-size:15px;color:var(--pri);margin-bottom:16px}
.ui-card{background:var(--card);border-radius:24px;padding:18px;margin-bottom:16px;box-shadow:0 8px 24px rgba(71,143,184,0.08)}
.form-input{width:100%;padding:13px 12px;margin:6px 0;border:1px solid var(--border);border-radius:18px;background:var(--input-bg);color:var(--text);font-size:15px;text-align:center}
.btn-primary{width:100%;padding:14px;border-radius:18px;border:none;background:linear-gradient(90deg,#58a2cc,#478fb8);color:#fff;font-size:16px;margin-top:8px;cursor:pointer}
.btn-danger-full{width:100%;padding:14px;border-radius:18px;border:none;background:var(--danger);color:#fff;font-size:16px;margin-top:8px;cursor:pointer}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-block{flex:1;padding:12px;border-radius:16px;border:none;background:var(--gray);color:var(--text);cursor:pointer;font-size:14px}
.btn-backup{background:var(--success);color:#fff}
.btn-restore{background:var(--warn);color:#fff}
.cat-admin-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.cat-admin-name{font-size:16px;font-weight:500}
.cat-admin-btn{padding:6px 10px;border-radius:12px;border:none;font-size:13px;cursor:pointer;margin:0 2px}
.cat-admin-edit{background:var(--pri-light);color:var(--pri)}
.cat-admin-del{background:var(--danger);color:#fff}
.inlock-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}
.inlock-box{width:100%;max-width:340px;background:var(--card);border-radius:20px;padding:24px}
.inlock-title{font-size:18px;color:var(--pri);text-align:center;margin-bottom:16px;font-weight:600}
.inlock-input{width:100%;padding:12px;border:1px solid var(--border);border-radius:16px;background:var(--input-bg);text-align:center;font-size:16px;margin-bottom:10px}
.inlock-btn{width:100%;padding:12px;border-radius:16px;background:var(--pri);color:#fff;border:none;font-size:16px}
.inlock-tip{text-align:center;font-size:14px;color:var(--danger);height:20px}
.file-hide{display:none}
.title-split{font-size:16px;font-weight:600;margin:10px 0 6px;color:var(--pri)}
.mode-check{display:flex;align-items:center;gap:6px;margin:8px 0;font-size:14px}
.tip-text{font-size:12px;color:var(--danger);margin-top:6px}
.item-row{padding:8px 0;border-bottom:1px solid var(--border)}
</style>
</head>
<body>
<!-- 管理員密碼框：預設隱藏，只有點後台才顯示 -->
<div class="inlock-wrap" id="adminLock">
<div class="inlock-box">
<div class="inlock-title">管理員驗證</div>
<input class="inlock-input" type="password" id="adminPwdIn" placeholder="輸入管理員密碼">
<div class="inlock-tip" id="adminTip"></div>
<button class="inlock-btn" onclick="checkAdminPwd()">確認進入後台</button>
</div>
</div>

<div class="wrapper">
<h1 class="main-title">🐾貓咪健康管理系統</h1>
<div class="sync-badge" id="syncBadge">雲端連線中</div>
<button class="theme-switch" onclick="toggleDarkMode()">切換深色模式</button>

<div class="cat-selector">
<select class="cat-select" id="catSelect" onchange="switchCat()"></select>
<button class="cat-add-btn" onclick="addNewCat()">新增貓咪</button>
</div>

<div class="tab-wrap">
<button class="tab-btn active" data-tab="water">飲水</button>
<button class="tab-btn" data-tab="weight">體重</button>
<button class="tab-btn" data-tab="deworm">驅蟲</button>
<button class="tab-btn" data-tab="admin">系統後台</button>
</div>

<!-- 飲水頁 -->
<div class="tab-content active" id="tab-water">
<div class="info-banner">每日建議飲水量150-210ml</div>
<div class="ui-card">
<input class="form-input" type="date" id="selDate">
<input class="form-input" type="time" id="selTime">
<input class="form-input" type="number" id="waterNum" placeholder="輸入水量ml">
<button class="btn-primary" onclick="addWaterLog()">新增紀錄</button>
</div>
<div class="ui-card" id="waterListBox"></div>
</div>

<!-- 體重頁 -->
<div class="tab-content" id="tab-weight">
<div class="info-banner">體重趨勢追蹤</div>
<div class="ui-card">
<input class="form-input" type="date" id="weightDate">
<input class="form-input" type="number" step="0.01" id="weightNum" placeholder="體重kg">
<input class="form-input" id="weightNote" placeholder="備註">
<button class="btn-primary" onclick="addWeightLog()">新增體重</button>
</div>
<div class="ui-card" id="weightListBox"></div>
</div>

<!-- 驅蟲頁 -->
<div class="tab-content" id="tab-deworm">
<div class="info-banner">驅蟲時間備註</div>
<div class="ui-card">
<input class="form-input" type="date" id="dewormDate">
<input class="form-input" id="dewormDrug" placeholder="藥品名稱">
<input class="form-input" type="date" id="dewormNext">
<button class="btn-primary" onclick="addDewormLog()">新增紀錄</button>
</div>
<div class="ui-card" id="dewormListBox"></div>
</div>

<!-- 專業後台頁 -->
<div class="tab-content" id="tab-admin">
<div class="info-banner">專業管理後台｜管理密碼cc821208</div>

<div class="ui-card">
<div class="title-split">🔐密碼管理</div>
<input class="form-input" type="password" id="oldUserPwd" placeholder="舊登入密碼">
<input class="form-input" type="password" id="newUserPwd" placeholder="新登入密碼">
<input class="form-input" type="password" id="newUserPwd2" placeholder="確認新密碼">
<button class="btn-primary" onclick="updateUserPwd()">更新使用者密碼</button>
<div id="pwdTip" style="text-align:center;margin-top:6px;font-size:14px"></div>
</div>

<div class="ui-card">
<div class="title-split">🐾貓咪檔案管理</div>
<div id="catAdminList"></div>
<button class="btn-primary" onclick="addNewCat()">新增貓咪</button>
</div>

<div class="ui-card">
<div class="title-split">💾全域備份與還原</div>
<div class="mode-check">
<input type="radio" name="fullMode" id="fullCover" value="cover" checked>
<label for="fullCover">覆蓋還原</label>
<input type="radio" name="fullMode" id="fullAdd" value="add">
<label for="fullAdd">增量匯入</label>
</div>
<div class="btn-row">
<button class="btn-block btn-backup" onclick="fullBackup()">完整備份匯出</button>
<button class="btn-block btn-restore" onclick="triggerFullRestore()">全域還原匯入</button>
</div>
<input type="file" class="file-hide" id="fullRestoreFile" accept=".json" onchange="fullRestore(event)">
<p class="tip-text">覆蓋=清空舊數據還原｜增量=保留舊數據追加</p>
</div>

<div class="ui-card">
<div class="title-split">📂分類匯入匯出</div>
<div class="mode-check">
<input type="radio" name="csvMode" id="csvCover" value="cover" checked>
<label for="csvCover">覆蓋匯入</label>
<input type="radio" name="csvMode" id="csvAdd" value="add">
<label for="csvAdd">增量匯入</label>
</div>
<div class="btn-row">
<button class="btn-block" onclick="exportAllWater()">匯出全部飲水</button>
<button class="btn-block" onclick="exportAllWeight()">匯出全部體重</button>
</div>
<div class="btn-row" style="margin-top:8px">
<button class="btn-block" onclick="exportAllDeworm()">匯出全部驅蟲</button>
<button class="btn-block" onclick="exportCatInfo()">匯出貓咪清單</button>
</div>
<div class="btn-row" style="margin-top:8px">
<button class="btn-block" onclick="triggerImpWater()">匯入飲水數據</button>
<button class="btn-block" onclick="triggerImpWeight()">匯入體重數據</button>
</div>
<div class="btn-row" style="margin-top:8px">
<button class="btn-block" onclick="triggerImpDeworm()">匯入驅蟲數據</button>
<button class="btn-block" onclick="triggerImpCat()">匯入貓咪清單</button>
</div>
<input type="file" class="file-hide" id="impWaterFile" accept=".csv" onchange="impWaterData(event)">
<input type="file" class="file-hide" id="impWeightFile" accept=".csv" onchange="impWeightData(event)">
<input type="file" class="file-hide" id="impDewormFile" accept=".csv" onchange="impDewormData(event)">
<input type="file" class="file-hide" id="impCatFile" accept=".json" onchange="impCatData(event)">
</div>

<div class="ui-card">
<div class="title-split">🗑數據清理</div>
<button class="btn-danger-full" onclick="clearAllData()">清空全部數據</button>
</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const ADMIN_PWD = "cc821208";
let adminAuth = false;
const DEFAULT_USER_PWD = ["0963612120","0952867812","ha821208"];
let catList = JSON.parse(localStorage.getItem("petCats")||'[{"id":"c0","name":"波波"}]');
let currentCat = catList[0].id;
let waterData=[],weightData=[],dewormData=[];
let wSub,wgSub,dwSub;

function getFullMode(){
  return document.getElementById("fullCover").checked ? "cover" : "add";
}
function getCsvMode(){
  return document.getElementById("csvCover").checked ? "cover" : "add";
}

// 管理員密碼驗證
function checkAdminPwd(){
  let val = document.getElementById("adminPwdIn").value.trim();
  let tip = document.getElementById("adminTip");
  if(val===ADMIN_PWD){
    adminAuth=true;
    document.getElementById("adminLock").style.display="none";
    tip.innerText="";
    renderAdminPage();
    // 直接切換到後台分頁
    document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(x=>x.classList.remove("active"));
    document.querySelector('[data-tab="admin"]').classList.add("active");
    document.getElementById("tab-admin").classList.add("active");
  }else{
    tip.innerText="密碼錯誤";
    document.getElementById("adminPwdIn").value="";
  }
}

// 分頁切換：只有點 admin 才檢查密碼
document.querySelectorAll(".tab-btn").forEach(b=>{
  b.onclick=function(){
    let t = this.dataset.tab;

    // 切換到「系統後台」且尚未驗證 → 彈密碼框
    if(t==="admin" && !adminAuth){
      document.getElementById("adminLock").style.display="flex";
      document.getElementById("adminPwdIn").value="";
      document.getElementById("adminTip").innerText="";
      return;
    }

    // 一般分頁 / 已驗證後台 → 直接切換
    document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(x=>x.classList.remove("active"));
    this.classList.add("active");
    document.getElementById("tab-"+t).classList.add("active");
  }
})

const fbConfig={apiKey:"AIzaSyD4iT2_YhVoBvOSVWz_-ZNJcR9BjEqHhaE",authDomain:"naibo-health.firebaseapp.com",projectId:"naibo-health",storageBucket:"naibo-health.firebasestorage.app",messagingSenderId:"1008746304734",appId:"1:1008746304734:web:33b87646673ee83b975e4f"};
firebase.initializeApp(fbConfig);
const db=firebase.firestore();

function init(){
  renderCatSel();
  switchCat();
  let d=new Date().toISOString().split("T")[0];
  document.getElementById("selDate").value=d;
  document.getElementById("weightDate").value=d;
  document.getElementById("dewormDate").value=d;
  if(localStorage.getItem("dark")==="1"){document.body.classList.add("dark-mode")}
}
function toggleDarkMode(){
  document.body.classList.toggle("dark-mode");
  localStorage.setItem("dark",document.body.classList.contains("dark-mode")?"1":"0");
}
function renderCatSel(){
  let sel=document.getElementById("catSelect");
  sel.innerHTML=catList.map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
}
function renderAdminPage(){
  let box=document.getElementById("catAdminList");
  box.innerHTML=catList.map(c=>`
  <div class="cat-admin-item">
    <span>${c.name}</span>
    <div>
      <button class="cat-admin-btn cat-admin-edit" onclick="editCat('${c.id}')">編輯</button>
      <button class="cat-admin-btn cat-admin-del" onclick="delCat('${c.id}')">刪除</button>
    </div>
  </div>`).join("");
}
function addNewCat(){
  let n=prompt("輸入貓咪名稱");if(!n)return;
  let id="cat_"+Date.now();
  catList.push({id,name:n});
  localStorage.setItem("petCats",JSON.stringify(catList));
  renderCatSel();renderAdminPage();
}
function editCat(id){
  let o=catList.find(x=>x.id===id);
  let n=prompt("修改名稱",o.name);if(!n||n===o.name)return;
  o.name=n;
  localStorage.setItem("petCats",JSON.stringify(catList));
  renderCatSel();renderAdminPage();
}
async function delCat(id){
  let p=prompt("輸入管理員密碼確認");if(p!==ADMIN_PWD)return alert("密碼錯誤");
  let c=catList.find(x=>x.id===id);
  if(!confirm("確認刪除"+c.name+"及所有數據"))return;
  let colls=[`catWater_${id}`,`catWeight_${id}`,`catDeworm_${id}`];
  for(let cl of colls){
    let s=await db.collection(cl).get();
    let batch=db.batch();
    s.forEach(d=>batch.delete(d.ref));
    await batch.commit();
  }
  catList=catList.filter(x=>x.id!==id);
  localStorage.setItem("petCats",JSON.stringify(catList));
  renderCatSel();renderAdminPage();
  switchCat();
}

function switchCat(){
  if(wSub)wSub();if(wgSub)wgSub();if(dwSub)dwSub();
  currentCat=document.getElementById("catSelect").value;
  waterData=[];weightData=[];dewormData=[];
  let wCol=db.collection("catWater_"+currentCat);
  let wgCol=db.collection("catWeight_"+currentCat);
  let dwCol=db.collection("catDeworm_"+currentCat);
  wSub=wCol.onSnapshot(s=>{waterData=[];s.forEach(d=>waterData.push(d.data()));renderWater()});
  wgSub=wgCol.onSnapshot(s=>{weightData=[];s.forEach(d=>weightData.push(d.data()));renderWeight()});
  dwSub=dwCol.onSnapshot(s=>{dewormData=[];s.forEach(d=>dewormData.push(d.data()));renderDeworm()});
}

async function addWaterLog(){
  let d=document.getElementById("selDate").value;
  let t=document.getElementById("selTime").value;
  let ml=+document.getElementById("waterNum").value;
  if(!d||!t||!ml)return;
  await db.collection("catWater_"+currentCat).add({date:d,time:t,ml,stamp:Date.now()});
  document.getElementById("waterNum").value="";
}
async function addWeightLog(){
  let d=document.getElementById("weightDate").value;
  let w=+document.getElementById("weightNum").value;
  let n=document.getElementById("weightNote").value;
  if(!d||!w)return;
  await db.collection("catWeight_"+currentCat).add({date:d,weight:w,note:n,stamp:Date.now()});
  document.getElementById("weightNum").value="";
  document.getElementById("weightNote").value="";
}
async function addDewormLog(){
  let d=document.getElementById("dewormDate").value;
  let drug=document.getElementById("dewormDrug").value;
  let next=document.getElementById("dewormNext").value;
  if(!d||!drug)return;
  await db.collection("catDeworm_"+currentCat).add({date:d,drug,next,stamp:Date.now()});
  document.getElementById("dewormDrug").value="";
}

async function fullBackup(){
  let now = new Date();
  let dateStr = now.getFullYear()+""+(now.getMonth()+1).toString().padStart(2,'0')+now.getDate().toString().padStart(2,'0');
  let timeStr = now.getHours().toString().padStart(2,'0')+now.getMinutes().toString().padStart(2,'0');
  let catNames = catList.map(c=>c.name).join("");
  let fileName = `貓咪全備份_${catNames}_${dateStr}_${timeStr}.json`;

  let allData={cats:catList,water:[],weight:[],deworm:[],backupTime:now.toLocaleString()};
  for(let c of catList){
    let w=await db.collection("catWater_"+c.id).get();
    let wg=await db.collection("catWeight_"+c.id).get();
    let dw=await db.collection("catDeworm_"+c.id).get();
    allData.water.push({cid:c.id,list:w.docs.map(d=>d.data())});
    allData.weight.push({cid:c.id,list:wg.docs.map(d=>d.data())});
    allData.deworm.push({cid:c.id,list:dw.docs.map(d=>d.data())});
  }
  let blob=new Blob([JSON.stringify(allData,null,2)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=fileName;
  a.click();
  URL.revokeObjectURL(a.href);
}
function triggerFullRestore(){document.getElementById("fullRestoreFile").click()}
async function fullRestore(e){
  let p=prompt("輸入管理員密碼還原");if(p!==ADMIN_PWD)return;
  let mode = getFullMode();
  if(!confirm(mode==="cover"?"確認覆蓋還原全部數據":"確認增量追加數據"))return;
  let f=e.target.files[0];
  let txt=await f.text();
  let data=JSON.parse(txt);
  localStorage.setItem("petCats",JSON.stringify(data.cats));
  catList=data.cats;renderCatSel();renderAdminPage();

  for(let w of data.water){
    let col=db.collection("catWater_"+w.cid);
    if(mode==="cover"){
      let batch=db.batch();
      let old=await col.get();old.forEach(d=>batch.delete(d.ref));
      await batch.commit();
    }
    let batch=db.batch();
    for(let item of w.list)batch.set(col.doc(),{...item,stamp:Date.now()+Math.random()*10000});
    await batch.commit();
  }
  for(let wg of data.weight){
    let col=db.collection("catWeight_"+wg.cid);
    if(mode==="cover"){
      let batch=db.batch();
      let old=await col.get();old.forEach(d=>batch.delete(d.ref));
      await batch.commit();
    }
    let batch=db.batch();
    for(let item of wg.list)batch.set(col.doc(),{...item,stamp:Date.now()+Math.random()*10000});
    await batch.commit();
  }
  for(let dw of data.deworm){
    let col=db.collection("catDeworm_"+dw.cid);
    if(mode==="cover"){
      let batch=db.batch();
      let old=await col.get();old.forEach(d=>batch.delete(d.ref));
      await batch.commit();
    }
    let batch=db.batch();
    for(let item of dw.list)batch.set(col.doc(),{...item,stamp:Date.now()+Math.random()*10000});
    await batch.commit();
  }
  alert(mode==="cover"?"覆蓋還原完成":"增量匯入完成");
  switchCat();
}

function exportAllWater(){
  let now = new Date();
  let dstr = now.getFullYear()+""+(now.getMonth()+1).toString().padStart(2,'0')+now.getDate().toString().padStart(2,'0');
  let csv="\uFEFF貓咪,日期,時間,水量\n";
  catList.forEach(c=>{
    waterData.forEach(d=>csv+=`${c.name},${d.date},${d.time},${d.ml}\n`)
  });
  downFile(csv,`全部飲水紀錄_${dstr}.csv`);
}
function exportAllWeight(){
  let now = new Date();
  let dstr = now.getFullYear()+""+(now.getMonth()+1).toString().padStart(2,'0')+now.getDate().toString().padStart(2,'0');
  let csv="\uFEFF貓咪,日期,體重,備註\n";
  catList.forEach(c=>{
    weightData.forEach(d=>csv+=`${c.name},${d.date},${d.weight},${d.note||""}\n`)
  });
  downFile(csv,`全部體重紀錄_${dstr}.csv`);
}
function exportAllDeworm(){
  let now = new Date();
  let dstr = now.getFullYear()+""+(now.getMonth()+1).toString().padStart(2,'0')+now.getDate().toString().padStart(2,'0');
  let csv="\uFEFF貓咪,日期,藥品,下次日期\n";
  catList.forEach(c=>{
    dewormData.forEach(d=>csv+=`${c.name},${d.date},${d.drug},${d.next||""}\n`)
  });
  downFile(csv,`全部驅蟲紀錄_${dstr}.csv`);
}
function exportCatInfo(){
  let now = new Date();
  let dstr = now.getFullYear()+""+(now.getMonth()+1).toString().padStart(2,'0')+now.getDate().toString().padStart(2,'0');
  downFile(JSON.stringify(catList,null,2),`貓咪清單_${dstr}.json`);
}
function downFile(content,name){
  let b=new Blob([content]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(b);a.download=name;a.click();
  URL.revokeObjectURL(a.href);
}

function triggerImpWater(){document.getElementById("impWaterFile").click()}
function triggerImpWeight(){document.getElementById("impWeightFile").click()}
function triggerImpDeworm(){document.getElementById("impDewormFile").click()}
function triggerImpCat(){document.getElementById("impCatFile").click()}

async function impWaterData(e){
  let p=prompt("管理員密碼確認");if(p!==ADMIN_PWD)return;
  let mode=getCsvMode();
  let f=e.target.files[0];
  let txt=await f.text();
  let lines=txt.replace(/^\uFEFF/,"").split("\n").filter(l=>l.trim());
  let col=db.collection("catWater_"+currentCat);
  if(mode==="cover"){
    let batch=db.batch();
    let old=await col.get();old.forEach(d=>batch.delete(d.ref));
    await batch.commit();
  }
  let cnt=0;
  for(let i=1;i<lines.length;i++){
    let arr=lines[i].split(",");
    let date=arr[1]?.trim(),time=arr[2]?.trim(),ml=parseInt(arr[3]||"0");
    if(date&&time&&ml>0){
      await col.add({date,time,ml,stamp:Date.now()+i});
      cnt++;
    }
  }
  alert(`飲水匯入${cnt}筆｜${mode==="cover"?"覆蓋":"增量"}`);
  e.target.value="";
}

async function impCatData(e){
  let p=prompt("管理員密碼確認");if(p!==ADMIN_PWD)return;
  let f=e.target.files[0];
  let txt=await f.text();
  let list=JSON.parse(txt);
  catList=list;
  localStorage.setItem("petCats",JSON.stringify(catList));
  renderCatSel();renderAdminPage();switchCat();
  alert("貓咪清單匯入完成");
  e.target.value="";
}

function updateUserPwd(){
  let old=document.getElementById("oldUserPwd").value.trim();
  let n1=document.getElementById("newUserPwd").value.trim();
  let n2=document.getElementById("newUserPwd2").value.trim();
  let tip=document.getElementById("pwdTip");
  if(!DEFAULT_USER_PWD.includes(old)){tip.innerText="舊密碼錯誤";tip.style.color="var(--danger)";return}
  if(n1!==n2){tip.innerText="兩次新密碼不一致";tip.style.color="var(--danger)";return}
  if(n1.length<4){tip.innerText="密碼至少4位";tip.style.color="var(--danger)";return}
  localStorage.setItem("userPwdSet",JSON.stringify([n1]));
  tip.innerText="使用者密碼更新成功";tip.style.color="var(--success)";
}

async function clearAllData(){
  let p=prompt("管理員密碼確認清空");if(p!==ADMIN_PWD)return;
  if(!confirm("徹底清空所有數據無法恢復"))return;
  for(let c of catList){
    let cols=["catWater_"+c.id,"catWeight_"+c.id,"catDeworm_"+c.id];
    for(let cl of cols){
      let s=await db.collection(cl).get();
      let batch=db.batch();
      s.forEach(d=>batch.delete(d.ref));
      await batch.commit();
    }
  }
  alert("全部數據已清空");switchCat();
}

function renderWater(){
  let d=document.getElementById("selDate").value;
  let list=waterData.filter(x=>x.date===d).sort((a,b)=>b.time.localeCompare(a.time));
  let total=list.reduce((s,x)=>s+x.ml,0);
  document.getElementById("waterListBox").innerHTML=`
  <div style="text-align:center;font-size:20px;margin-bottom:10px">今日總計：${total}ml</div>
  ${list.map(x=>`<div class="item-row">${x.time}｜${x.ml}ml</div>`).join("")}`;
}
function renderWeight(){
  let list=[...weightData].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById("weightListBox").innerHTML=list.map(x=>`
  <div class="item-row">${x.date}｜${x.weight}kg｜${x.note||""}</div>`).join("");
}
function renderDeworm(){
  let list=[...dewormData].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById("dewormListBox").innerHTML=list.map(x=>`
  <div class="item-row">${x.date}｜${x.drug}｜下次${x.next||""}</div>`).join("");
}
