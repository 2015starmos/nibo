async function delVaccine(stamp){
  const snap = await vaccineCol.where("stamp","==",stamp).get();
  snap.forEach(d=>d.ref.delete());
}
function addVacCal(title,dateStr,note){
  if(!dateStr) return alert("請填下次接種日期");
  const rev=new Date(dateStr);
  const early=new Date(rev); early.setDate(rev.getDate()-7);
  const fmt=d=>d.getFullYear()+String(d.getMonth()+1).padStart(2,0)+String(d.getDate()).padStart(2,0);
  const ics=`BEGIN:VCALENDAR
VERSION:2.0
CALSCALE:GREGORIAN
BEGIN:VEVENT
DTSTART;VALUE=DATE:${fmt(early)}
DTEND;VALUE=DATE:${fmt(early)}
SUMMARY:💉 疫苗接種提醒
DESCRIPTION:${note}
END:VEVENT
BEGIN:VEVENT
DTSTART;VALUE=DATE:${fmt(rev)}
DTEND;VALUE=DATE:${fmt(rev)}
SUMMARY:💉 疫苗接種日
END:VEVENT
END:VCALENDAR`;
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([ics],{type:"text/calendar"}));
  a.download="疫苗提醒.ics";
  a.click();
  alert("✅ 行事曆提醒檔案已下載");
}
function renderVaccine(){

function renderPage(){
  const date = document.getElementById("selectDate").value;
  const todayList = recordData.filter(r=>r.date===date);
  let total = todayList.reduce((sum,r)=>sum+(r.ml||0),0);
  document.getElementById("totalShow").innerText = `今日總計：${total} ml`;
  const tip = document.getElementById("warnTip");
  tip.innerHTML = "";
  if(total<150){
    tip.innerHTML = `<div class='warn-low text-low'>⚠️ 當日飲水量偏低，建議觀察喝水狀況<br>目標：150~210ml</div>`;
  }else if(total>250){
    tip.innerHTML = `<div class='warn-high text-high'>⚠️ 當日飲水量偏高，建議留意腎臟/糖尿病風險</div>`;
  }
  document.getElementById("recordBody").innerHTML = todayList.sort((a,b)=>a.time.localeCompare(b.time)).map(r=>`
  <tr>
    <td>${r.time}</td>
    <td>${r.ml}ml</td>
    <td><button class='btn-delete' onclick='delRecord(${r.stamp})'>刪</button></td>
  </tr>`).join("");
  calcStat();
}
async function delRecord(stamp){
  const snap = await waterCol.where("stamp","==",stamp).get();
  snap.forEach(d=>d.ref.delete());
}
function exportCSV(){
  const content = "日期,時間,水量(ml)\n" + recordData.map(r=>`${r.date},${r.time},${r.ml}`).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([content],{type:"text/csv"}));
  a.download = "寵物飲水紀錄.csv";
  a.click();
}
function triggerImport(){ document.getElementById("importFile").click(); }
function importCSV(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev)=>{
    const lines = ev.target.result.split("\n").filter(l=>l.trim()&&!l.startsWith("日期"));
    for(let line of lines){
      const [date,time,ml] = line.split(",").map(s=>s.trim());
      if(date&&time&&ml) await waterCol.add({date,time,ml:parseInt(ml),stamp:Date.now()});
    }
    alert("✅ 匯入完成");
  };
  reader.readAsText(file);
}
function calcStat(){
  const now = new Date();
  const weekAgo = new Date(now.setDate(now.getDate()-7));
  const weekData = recordData.filter(r=>new Date(r.date)>=weekAgo);
  const weekTotal = weekData.reduce((s,r)=>s+r.ml,0);
  const weekAvg = Math.round(weekTotal/7)||0;
  const monthData = recordData.filter(r=>new Date(r.date)>=new Date(now.setMonth(now.getMonth()-1)));
  const monthTotal = monthData.reduce((s,r)=>s+r.ml,0);
  const monthAvg = Math.round(monthTotal/30)||0;
  const monthMax = Math.max(...monthData.map(r=>r.ml),0);
  document.getElementById("weekAvg").innerText = weekAvg+" ml";
  document.getElementById("weekTotal").innerText = weekTotal+" ml";
  document.getElementById("monthAvg").innerText = monthAvg+" ml";
  document.getElementById("monthMax").innerText = monthMax+" ml";
}

  const snap = await weightCol.where("stamp","==",stamp).get();
  snap.forEach(d=>d.ref.delete());

function renderWeight(){
  const list = [...weightData].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById("weightBody").innerHTML = list.map(x=>`
  <tr>
    <td>${x.date}</td>
    <td>${x.val}kg</td>
    <td>${x.note||"-"}</td>
    <td><button class='btn-delete' onclick='delWeight(${x.stamp})'>刪</button></td>
  </tr>`).join("");
  if(list.length){
    document.getElementById("weightLatest").innerText = `最新體重：${list[0].val} kg`;
    const vals = list.map(x=>x.val);
    document.getElementById("wMax").innerText = Math.max(...vals).toFixed(2)+" kg";
    document.getElementById("wMin").innerText = Math.min(...vals).toFixed(2)+" kg";
    document.getElementById("wAvg").innerText = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2)+" kg";
    if(vals.length>=2){
      const diff = (vals[0]-vals[1]).toFixed(2);
      document.getElementById("wDiff").innerText = (diff>0?"+":"")+diff+" kg";
    }else{
      document.getElementById("wDiff").innerText = "0 kg";
    }
  }
}

async function addMedical(){
  const type = document.getElementById("medType").value;
  const date = document.getElementById("medDate").value;
  const review = document.getElementById("medReview").value;
  const note = document.getElementById("medNote").value.trim();
  if(!date) return alert("請填就診日期");
  const files = medFiles;
  const attachments = [];
  for(let f of files){
    if(f.type.includes("pdf")||f.type.includes("image")){
      const base64 = await toBase64(f);
      attachments.push({name:f.name,type:f.type,base64});
    }
  }
  await medCol.add({
    type,date,review,note,attachments,
    star:false,stamp:Date.now()
  });
