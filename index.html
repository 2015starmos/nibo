<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寵物醫療病歷管理系統</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;font-size:14px;}
        body{background:#f5f5f5;color:#333;padding:10px;}
        body.dark-mode{background:#1a1a1a;color:#eee;}
        .container{max-width:1200px;margin:0 auto;background:#fff;border:1px solid #ddd;border-radius:4px;overflow:hidden;}
        body.dark-mode .container{background:#2d2d2d;border-color:#444;}
        .header{background:#003366;color:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;}
        .header h1{font-size:18px;font-weight:600;}
        .btn{padding:6px 12px;border:none;border-radius:3px;cursor:pointer;font-weight:500;}
        .btn-primary{background:#0066cc;color:#fff;}
        .btn-success{background:#28a745;color:#fff;}
        .btn-warning{background:#ffc107;color:#333;}
        .btn-danger{background:#dc3545;color:#fff;}
        .btn-sm{padding:4px 8px;font-size:12px;}
        .tabs{display:flex;background:#e9ecef;border-bottom:1px solid #ddd;}
        body.dark-mode .tabs{background:#383838;border-color:#444;}
        .tab-item{padding:10px 20px;cursor:pointer;border-right:1px solid #ddd;}
        body.dark-mode .tab-item{border-color:#444;}
        .tab-item.active{background:#fff;border-top:2px solid #0066cc;border-bottom:1px solid #fff;margin-bottom:-1px;}
        body.dark-mode .tab-item.active{background:#2d2d2d;border-bottom-color:#2d2d2d;}
        .search-bar{padding:10px 20px;background:#f8f9fa;border-bottom:1px solid #ddd;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
        body.dark-mode .search-bar{background:#333;border-color:#444;}
        .search-bar input,.search-bar select{padding:6px 8px;border:1px solid #ddd;border-radius:3px;width:200px;}
        body.dark-mode .search-bar input,body.dark-mode .search-bar select{background:#444;color:#eee;border-color:#555;}
        .data-table{width:100%;border-collapse:collapse;margin:10px 0;}
        .data-table th,.data-table td{border:1px solid #ddd;padding:8px 10px;text-align:left;}
        body.dark-mode .data-table th,body.dark-mode .data-table td{border-color:#444;}
        .data-table th{background:#e9ecef;}
        body.dark-mode .data-table th{background:#383838;}
        .data-table tr:nth-child(even){background:#f8f9fa;}
        body.dark-mode .data-table tr:nth-child(even){background:#333;}
        .form-section{padding:20px;display:none;}
        .form-section.active{display:block;}
        .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
        .form-group label{font-weight:500;}
        .form-group input,.form-group select,.form-group textarea{padding:8px;border:1px solid #ddd;border-radius:3px;}
        body.dark-mode .form-group input,body.dark-mode .form-group select,body.dark-mode .form-group textarea{background:#444;color:#eee;border-color:#555;}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;}
        .modal.show{display:flex;}
        .modal-content{background:#fff;padding:20px;border-radius:6px;width:500px;max-width:90%;}
        body.dark-mode .modal-content{background:#2d2d2d;color:#eee;}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
        .modal-close{background:none;border:none;font-size:20px;cursor:pointer;}
        .login-modal .login-box{padding:30px;border-radius:8px;width:350px;text-align:center;background:#fff;}
        body.dark-mode .login-modal .login-box{background:#2d2d2d;color:#eee;}
    </style>
</head>
<body>

<!-- 登入彈窗 -->
<div id="loginModal" class="modal show">
    <div class="login-box">
        <h2>🔒 系統登入</h2>
        <input type="password" id="loginPwd" placeholder="輸入密碼">
        <button class="btn btn-primary" style="width:100%;padding:10px;margin-top:10px;" onclick="loginCheck()">登入</button>
    </div>
</div>

<div class="container" id="mainApp" style="display:none;">
    <div class="header">
        <h1>寵物醫療病歷管理系統</h1>
    </div>

    <div class="tabs">
        <div class="tab-item active" onclick="switchTab('pet')">寵物資料列表</div>
        <div class="tab-item" onclick="switchTab('record')">病歷紀錄</div>
        <div class="tab-item" onclick="switchTab('hospital')">就醫院所查詢</div>
    </div>

    <!-- 寵物資料 -->
    <div id="pet" class="form-section active">
        <div style="margin:10px 0;">
            <button class="btn btn-primary" onclick="openPetModal()">➕ 新增寵物</button>
        </div>
        <table class="data-table">
            <thead>
                <tr><th>姓名</th><th>品種</th><th>體重</th><th>操作</th></tr>
            </thead>
            <tbody id="petTable"></tbody>
        </table>
    </div>

    <!-- 病歷紀錄 -->
    <div id="record" class="form-section">
        <div style="margin:10px 0;">
            <button class="btn btn-warning" onclick="clearRecordForm()">清空表單</button>
        </div>
        <div class="form-group">
            <label>選擇寵物</label>
            <select id="recPet"></select>
        </div>
        <div class="form-group">
            <label>就診內容</label>
            <textarea id="recContent" rows="5"></textarea>
        </div>
    </div>

    <!-- 就醫院所 -->
    <div id="hospital" class="form-section">
        <div style="margin:10px 0;">
            <button class="btn btn-primary" onclick="openHospitalModal()">➕ 新增院所</button>
        </div>
        <table class="data-table">
            <thead>
                <tr><th>院所名稱</th><th>電話</th><th>操作</th></tr>
            </thead>
            <tbody id="hospitalTable"></tbody>
        </table>
    </div>
</div>

<!-- 寵物彈窗 -->
<div id="petModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>新增/編輯寵物</h3>
            <button class="modal-close" onclick="closePetModal()">×</button>
        </div>
        <div class="form-group">
            <label>寵物姓名</label>
            <input type="text" id="petName">
        </div>
        <div class="form-group">
            <label>品種</label>
            <input type="text" id="petBreed">
        </div>
        <div class="form-group">
            <label>體重</label>
            <input type="text" id="petWeight">
        </div>
        <input type="hidden" id="petEditId">
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:15px;">
            <button class="btn btn-danger" onclick="closePetModal()">取消</button>
            <button class="btn btn-success" onclick="savePet()">儲存</button>
        </div>
    </div>
</div>

<!-- 院所彈窗 -->
<div id="hospitalModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>新增/編輯院所</h3>
            <button class="modal-close" onclick="closeHospitalModal()">×</button>
        </div>
        <div class="form-group">
            <label>院所名稱</label>
            <input type="text" id="hospitalName">
        </div>
        <div class="form-group">
            <label>聯絡電話</label>
            <input type="text" id="hospitalTel">
        </div>
        <input type="hidden" id="hospitalEditId">
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:15px;">
            <button class="btn btn-danger" onclick="closeHospitalModal()">取消</button>
            <button class="btn btn-success" onclick="saveHospital()">儲存</button>
        </div>
    </div>
</div>

<script>
// ==================== 攔截 F12 右鍵 隱藏資訊 ====================
document.oncontextmenu = e => e.preventDefault();
document.addEventListener("keydown",e=>{
    if(e.key==="F12"||(e.ctrlKey&&e.key==="u")||(e.ctrlKey&&e.shiftKey&&e.key==="I")){
        e.preventDefault();
        return false;
    }
});
setInterval(()=>{
    let w=window.outerWidth-window.innerWidth;
    let h=window.outerHeight-window.innerHeight;
    if(w>150||h>150) document.body.innerHTML="<div style='padding:50px;text-align:center;font-size:20px'>禁止查看原始碼</div>";
},1000);

// ==================== 固定密碼 ====================
const LOGIN_PWD = "0963612120";
let db;

// ==================== Firebase 隱藏初始化 ====================
(function(){
    const cfg = {
        apiKey:"AIzaSyD4iT2_YhVoBvOSVWz_-ZNJcR9BjEqHhaE",
        authDomain:"naibo-health.firebaseapp.com",
        projectId:"naibo-health",
        storageBucket:"naibo-health.firebasestorage.app",
        messagingSenderId:"1008746304734",
        appId:"1:1008746304734:web:33b87646673ee83b975e4f"
    };
    firebase.initializeApp(cfg);
    db = firebase.database();
})();

// ==================== 登入驗證 ====================
function loginCheck(){
    let val = document.getElementById("loginPwd").value.trim();
    if(val === LOGIN_PWD){
        document.getElementById("loginModal").classList.remove("show");
        document.getElementById("mainApp").style.display = "block";
        loadAllData();
    }else{
        alert("密碼錯誤");
    }
}

// ==================== 分頁切換 ====================
function switchTab(id){
    document.querySelectorAll(".tab-item").forEach(t=>t.classList.remove("active"));
    event.target.classList.add("active");
    document.querySelectorAll(".form-section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// ==================== 載入全部資料 ====================
function loadAllData(){
    loadPet();
    loadHospital();
}

// ========== 寵物功能 全部修復 ==========
function openPetModal(){
    document.getElementById("petEditId").value = "";
    document.getElementById("petName").value = "";
    document.getElementById("petBreed").value = "";
    document.getElementById("petWeight").value = "";
    document.getElementById("petModal").classList.add("show");
}
function closePetModal(){
    document.getElementById("petModal").classList.remove("show");
}
function savePet(){
    let name = document.getElementById("petName").value.trim();
    let breed = document.getElementById("petBreed").value.trim();
    let weight = document.getElementById("petWeight").value.trim();
    let editId = document.getElementById("petEditId").value;

    if(!name){alert("請輸入寵物姓名");return;}

    if(editId){
        db.ref("pets/"+editId).update({name,breed,weight});
    }else{
        db.ref("pets").push({name,breed,weight});
    }
    closePetModal();
    loadPet();
}
function loadPet(){
    db.ref("pets").on("value",snap=>{
        let data = snap.val()||{};
        let html = "";
        let selectOpt = "<option value=''>請選擇寵物</option>";
        for(let k in data){
            let v = data[k];
            html += `<tr>
                <td>${v.name||""}</td>
                <td>${v.breed||""}</td>
                <td>${v.weight||""}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editPet('${k}')">修改</button>
                    <button class="btn btn-sm btn-danger" onclick="delPet('${k}')">刪除</button>
                </td>
            </tr>`;
            selectOpt += `<option value="${k}">${v.name}</option>`;
        }
        document.getElementById("petTable").innerHTML = html;
        document.getElementById("recPet").innerHTML = selectOpt;
    });
}
function editPet(id){
    db.ref("pets/"+id).once("value",snap=>{
        let d = snap.val();
        document.getElementById("petEditId").value = id;
        document.getElementById("petName").value = d.name||"";
        document.getElementById("petBreed").value = d.breed||"";
        document.getElementById("petWeight").value = d.weight||"";
        document.getElementById("petModal").classList.add("show");
    });
}
function delPet(id){
    if(confirm("確定刪除?")){
        db.ref("pets/"+id).remove();
    }
}

// ========== 病歷清空表單 修復 ==========
function clearRecordForm(){
    document.getElementById("recPet").value = "";
    document.getElementById("recContent").value = "";
}

// ========== 就醫院所 新增/修改/刪除 全修復 ==========
function openHospitalModal(){
    document.getElementById("hospitalEditId").value = "";
    document.getElementById("hospitalName").value = "";
    document.getElementById("hospitalTel").value = "";
    document.getElementById("hospitalModal").classList.add("show");
}
function closeHospitalModal(){
    document.getElementById("hospitalModal").classList.remove("show");
}
function saveHospital(){
    let name = document.getElementById("hospitalName").value.trim();
    let tel = document.getElementById("hospitalTel").value.trim();
    let editId = document.getElementById("hospitalEditId").value;

    if(!name){alert("請輸入院所名稱");return;}

    if(editId){
        db.ref("hospital/"+editId).update({name,tel});
    }else{
        db.ref("hospital").push({name,tel});
    }
    closeHospitalModal();
    loadHospital();
}
function loadHospital(){
    db.ref("hospital").on("value",snap=>{
        let data = snap.val()||{};
        let html = "";
        for(let k in data){
            let v = data[k];
            html += `<tr>
                <td>${v.name||""}</td>
                <td>${v.tel||""}</td>
                <td>
                    <button class="btn btn-sm btn-warning" onclick="editHospital('${k}')">修改</button>
                    <button class="btn btn-sm btn-danger" onclick="delHospital('${k}')">刪除</button>
                </td>
            </tr>`;
        }
        document.getElementById("hospitalTable").innerHTML = html;
    });
}
function editHospital(id){
    db.ref("hospital/"+id).once("value",snap=>{
        let d = snap.val();
        document.getElementById("hospitalEditId").value = id;
        document.getElementById("hospitalName").value = d.name||"";
        document.getElementById("hospitalTel").value = d.tel||"";
        document.getElementById("hospitalModal").classList.add("show");
    });
}
function delHospital(id){
    if(confirm("確定刪除院所?")){
        db.ref("hospital/"+id).remove();
    }
}
</script>

</body>
</html>
