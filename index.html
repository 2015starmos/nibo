<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>寵物健康全紀錄系統</title>
<style>
.inlock-wrap{position:fixed;inset:0;background:linear-gradient(160deg, #f6f9fe, #eaf2f9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.inlock-box{width:100%;max-width:360px;background:#fff;border-radius:24px;padding:28px 20px;box-shadow:0 6px 20px rgba(71,143,184,0.15);text-align:center;}
.inlock-title{font-size:20px;color:#478fb8;margin-bottom:18px;font-weight:600;}
.inlock-input{width:100%;padding:13px 16px;border:1px solid #dce9f2;border-radius:18px;background:#f9fbfe;text-align:center;font-size:16px;margin-bottom:10px;}
.inlock-btn{width:100%;padding:13px;border:none;border-radius:18px;background:linear-gradient(90deg,#58a2cc,#478fb8);color:#fff;font-size:16px;cursor:pointer;}
.inlock-tip{height:20px;font-size:14px;color:#f28484;margin:6px 0;}
.main-content{display:none;}
*{margin:0;padding:0;box-sizing:border-box;transition:background 0.3s ease,color 0.3s ease;}
:root {
  --bg-gradient-1: #f6f9fe;
  --bg-gradient-2: #eaf2f9;
  --card-bg: #ffffff;
  --text-main: #506473;
  --primary: #478fb8;
  --primary-light: rgba(71, 143, 184, 0.12);
  --border-color: #dce9f2;
  --input-bg: #f9fbfe;
  --btn-gray: #d7e3ec;
  --table-bg: #f8fbfd;
  --table-head: #f0f6fb;
  --danger: #f28484;
  --success: #34a873;
  --warn: #e39548;
  --orange: #f2994a;
}
.dark-mode {
  --bg-gradient-1: #1a202c;
  --bg-gradient-2: #121822;
  --card-bg: #242c37;
  --text-main: #cbd5e0;
  --primary: #63b3e0;
  --primary-light: rgba(99, 179, 224, 0.15);
  --border-color: #3a4756;
  --input-bg: #2d3743;
  --btn-gray: #3a4756;
  --table-bg: #2d3743;
  --table-head: #323e4d;
}
body {font-family:"微軟正黑體","Noto Sans TC",sans-serif;background:linear-gradient(160deg,var(--bg-gradient-1),var(--bg-gradient-2));padding:20px 14px;min-height:100vh;color:var(--text-main);}
.wrapper{width:100%;max-width:560px;margin:0 auto;}
.main-title{text-align:center;font-size:24px;color:var(--primary);font-weight:600;margin-bottom:12px;}
.cat-selector{display:flex;gap:8px;margin-bottom:16px;align-items:center;justify-content:center;}
.cat-select{padding:10px 14px;border-radius:16px;border:1px solid var(--border-color);background:var(--input-bg);color:var(--text-main);font-size:15px;width:180px;text-align:center;}
.cat-add-btn{padding:10px 12px;border-radius:16px;border:none;background:var(--primary);color:#fff;cursor:pointer;}
.tab-wrap{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{flex:1;padding:10px;border-radius:16px;border:none;background:var(--btn-gray);color:var(--text-main);font-size:13px;cursor:pointer;min-width:70px;}
.tab-btn.active{background:var(--primary);color:#fff;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.theme-switch{display:block;margin:0 auto 16px;border:none;background:var(--primary-light);color:var(--primary);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:14px;}
.info-banner{width:100%;background:var(--primary-light);border-radius:30px;padding:13px 16px;text-align:center;font-size:15px;color:var(--primary);margin-bottom:16px;}
.ui-card{background:var(--card-bg);border-radius:28px;padding:20px 18px;margin-bottom:16px;box-shadow:0 8px 24px rgba(71,143,184,0.08);}
.form-input{width:100%;padding:13px 12px;margin:6px 0;border:1px solid var(--border-color);border-radius:20px;background:var(--input-bg);font-size:15px;text-align:center;color:var(--text-main);}
.form-textarea{text-align:left;min-height:70px;resize:vertical;}
.form-input:focus{outline:none;border-color:var(--primary);}
.btn-primary{width:100%;padding:14px;margin-top:5px;border:none;border-radius:20px;background:linear-gradient(90deg,#58a2cc,#478fb8);color:#fff;font-size:16px;font-weight:500;cursor:pointer;}
.btn-delete{border:none;background:var(--danger);color:#fff;padding:4px 6px;border-radius:8px;cursor:pointer;font-size:11px;}
.btn-calendar{border:none;background:var(--success);color:#fff;padding:3px 5px;border-radius:8px;cursor:pointer;font-size:10px;}
.desc-small{font-size:12px;color:var(--text-main);opacity:0.8;text-align:center;margin-bottom:4px;}
.sync-badge{text-align:center;font-size:12px;color:var(--success);margin-bottom:8px;}
.record-table{width:100%;border-collapse:separate;border-spacing:0 8px;}
.record-table th{background:var(--table-head);color:var(--primary);padding:10px 4px;border-radius:14px;}
.record-table td{background:var(--table-bg);text-align:center;padding:10px 4px;font-size:13px;}
</style>
</head>
<body>
<!-- 密碼鎖 -->
<div class="inlock-wrap">
  <div class="inlock-box">
    <div class="inlock-title">🔐 寵物健康紀錄 解鎖</div>
    <input type="password" class="inlock-input" id="inPwd" placeholder="請輸入密碼">
    <div class="inlock-tip" id="inTip"></div>
    <button class="inlock-btn" onclick="checkInPwd()">確認解鎖</button>
  </div>
</div>

<!-- 主內容 -->
<div class="main-content">
<div class="wrapper">
  <h1 class="main-title">🐾 寵物健康全紀錄</h1>
  <div class="sync-badge" id="syncBadge">☁️ 雲端同步連線中...</div>
  <button class="theme-switch" onclick="toggleDarkMode()">🌓 切換深色模式</button>

  <div class="cat-selector">
    <select class="cat-select" id="catSelect" onchange="switchCat()"></select>
    <button class="cat-add-btn" onclick="addNewCat()">+ 新增貓咪</button>
  </div>

  <div class="tab-wrap">
    <button class="tab-btn active" data-tab="petInfo">寵物資料</button>
    <button class="tab-btn" data-tab="water">飲水</button>
    <button class="tab-btn" data-tab="weight">體重</button>
    <button class="tab-btn" data-tab="deworm">驅蟲</button>
    <button class="tab-btn" data-tab="vaccine">疫苗</button>
    <button class="tab-btn" data-tab="medical">病歷</button>
  </div>

  <!-- 寵物資料【完整升級】 -->
  <div class="tab-content active" id="tab-petInfo">
    <div class="info-banner">🐱 完整寵物資料｜單貓獨立雲端保存</div>
    <div class="ui-card">
      <input class="form-input" id="petName" placeholder="呼名 / 本名">
      <input class="form-input" id="petBreed" placeholder="品種">
      <select class="form-input" id="petGender">
        <option value="">選擇性別</option>
        <option value="公">公</option>
        <option value="母">母</option>
      </select>
      <select class="form-input" id="petCut">
        <option value="">結紮狀態</option>
        <option value="已結紮">已結紮</option>
        <option value="未結紮">未結紮</option>
      </select>
      <input class="form-input" id="petColor" placeholder="花色 / 外觀特徵">
      <input class="form-input" id="petBlood" placeholder="血型">

      <div class="desc-small">真實出生日期</div>
      <input class="form-input" type="date" id="petBirthReal">
      <div class="desc-small">慶生生日</div>
      <input class="form-input" type="date" id="petBirthCele">

      <input class="form-input" id="petChip" placeholder="晶片號碼">
      <input class="form-input" type="date" id="petChipDate" placeholder="晶片植入日期">

      <input class="form-input" id="petShop" placeholder="購入寵物店 / 繁殖場">
      <input class="form-input" type="date" id="petBuyDate" placeholder="購入日期">
      <input class="form-input" id="petSource" placeholder="飼養來源（購買/領養/自家）">

      <input class="form-input" id="petHospital" placeholder="常駐就診醫院">
      <input class="form-input" id="petDoctor" placeholder="專屬獸醫師">

      <input class="form-input" id="petInsName" placeholder="寵物保險公司">
      <input class="form-input" id="petInsNo" placeholder="保單號碼">
      <input class="form-input" type="date" id="petInsStart" placeholder="投保日期">
      <input class="form-input" type="date" id="petInsEnd" placeholder="保單到期日">

      <input class="form-input" id="petOwner" placeholder="飼主姓名">
      <input class="form-input" id="petTel" placeholder="緊急聯絡電話">
      <input class="form-input" id="petFood" placeholder="主食/飼料品牌">
      <textarea class="form-input form-textarea" id="petMemo" placeholder="備註：過敏史、慢性病、禁忌、個性..."></textarea>

      <button class="btn-primary" onclick="savePetInfo()">✅ 儲存全部資料</button>
    </div>
    <div class="ui-card">
      <div style="text-align:center;font-weight:600;color:var(--primary);margin-bottom:10px;">📋 寵物資料總覽</div>
      <div id="petInfoShow" style="line-height:1.8;"></div>
    </div>
  </div>

  <!-- 飲水 -->
  <div class="tab-content" id="tab-water">
    <div class="info-banner">💧 每日飲水紀錄</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="selectDate">
      <input class="form-input" type="time" id="selectTime">
      <input class="form-input" type="number" id="waterML" placeholder="輸入水量 ml">
      <button class="btn-primary" onclick="addRecord()">新增飲水</button>
    </div>
  </div>

  <!-- 體重 -->
  <div class="tab-content" id="tab-weight">
    <div class="info-banner">⚖️ 體重追蹤</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="weightDate">
      <input class="form-input" type="number" step="0.01" id="weightVal" placeholder="體重 kg">
      <button class="btn-primary" onclick="addWeight()">新增體重</button>
    </div>
  </div>

  <!-- 驅蟲 -->
  <div class="tab-content" id="tab-deworm">
    <div class="info-banner">🪲 驅蟲紀錄</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="dewormDate">
      <input class="form-input" id="dewormDrug" placeholder="驅蟲藥品">
      <button class="btn-primary" onclick="addDeworm()">新增驅蟲</button>
    </div>
  </div>

  <!-- 疫苗 -->
  <div class="tab-content" id="tab-vaccine">
    <div class="info-banner">💉 疫苗接種紀錄</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="vacDate">
      <input class="form-input" id="vacName" placeholder="疫苗名稱">
      <input class="form-input" type="date" id="vacNext" placeholder="下次接種日">
      <textarea class="form-input form-textarea" id="vacNote" placeholder="備註"></textarea>
      <button class="btn-primary" onclick="addVaccine()">新增疫苗</button>
    </div>
    <div class="ui-card">
      <table class="record-table">
        <thead>
          <tr><th>接種日</th><th>名稱</th><th>下次</th><th>操作</th></tr>
        </thead>
        <tbody id="vaccineBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 病歷 -->
  <div class="tab-content" id="tab-medical">
    <div class="info-banner">🏥 醫療病歷</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="medDate">
      <textarea class="form-input form-textarea" id="medNote" placeholder="就診備註"></textarea>
      <button class="btn-primary">新增病歷</button>
    </div>
  </div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
// 密碼鎖
const validPws = ["0963612120","0952867812","ha821208"];
function checkInPwd(){
  let val = document.getElementById("inPwd").value.trim();
  let tip = document.getElementById("inTip");
  if(validPws.includes(val)){
    document.querySelector(".inlock-wrap").style.display = "none";
    document.querySelector(".main-content").style.display = "block";
    tip.innerText = "";
    initCatSystem();
  }else{
    tip.innerText = "❌ 密碼錯誤";
    document.getElementById("inPwd").value = "";
  }
}
document.addEventListener("keydown",e=>{if(e.key==="Enter")checkInPwd();});

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyD4iT2_YhVoBvOSVWz_-ZNJcR9BjEqHhaE",
  authDomain: "naibo-health.firebaseapp.com",
  projectId: "naibo-health",
  storageBucket: "naibo-health.firebasestorage.app",
  messagingSenderId: "1008746304734",
  appId: "1:1008746304734:web:33b8746673ee83b975e4f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 多貓管理
let currentCat = "default";
let catList = JSON.parse(localStorage.getItem("petCats")||'[{"id":"default","name":"波波"}]');
let petInfoCol, vaccineCol;
let petInfoData = {}, vaccineData = [];

function initCatSystem(){
  renderCatSelect();
  switchCat();
  let today = new Date().toISOString().split("T")[0];
  document.getElementById("vacDate").value = today;
}
function renderCatSelect(){
  let sel = document.getElementById("catSelect");
  sel.innerHTML = catList.map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
}
function addNewCat(){
  let name = prompt("輸入貓咪名稱：");
  if(!name)return;
  let id = "cat_"+Date.now();
  catList.push({id,name});
  localStorage.setItem("petCats",JSON.stringify(catList));
  renderCatSelect();
  document.getElementById("catSelect").value = id;
  switchCat();
}
function switchCat(){
  currentCat = document.getElementById("catSelect").value;
  listenData();
}

// 資料監聽
function listenData(){
  petInfoCol = db.collection("petInfo_"+currentCat);
  vaccineCol = db.collection("catVaccine_"+currentCat);

  petInfoCol.onSnapshot(snap=>{
    petInfoData = {};
    snap.forEach(d=>petInfoData = d.data());
    renderPetInfo();
  });
  vaccineCol.onSnapshot(snap=>{
    vaccineData = [];
    snap.forEach(d=>vaccineData.push(d.data()));
    renderVaccine();
  });
}

// 分頁切換
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.onclick = function(){
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
    this.classList.add("active");
    let t = this.dataset.tab;
    document.getElementById("tab-"+t).classList.add("active");
  }
});
function toggleDarkMode(){document.body.classList.toggle("dark-mode");}

// ========== 寵物資料 完整儲存 ==========
async function savePetInfo(){
  let data = {
    name:document.getElementById("petName").value.trim(),
    breed:document.getElementById("petBreed").value.trim(),
    gender:document.getElementById("petGender").value,
    cut:document.getElementById("petCut").value,
    color:document.getElementById("petColor").value.trim(),
    blood:document.getElementById("petBlood").value.trim(),
    birthReal:document.getElementById("petBirthReal").value,
    birthCele:document.getElementById("petBirthCele").value,
    chip:document.getElementById("petChip").value.trim(),
    chipDate:document.getElementById("petChipDate").value,
    shop:document.getElementById("petShop").value.trim(),
    buyDate:document.getElementById("petBuyDate").value,
    source:document.getElementById("petSource").value.trim(),
    hospital:document.getElementById("petHospital").value.trim(),
    doctor:document.getElementById("petDoctor").value.trim(),
    insName:document.getElementById("petInsName").value.trim(),
    insNo:document.getElementById("petInsNo").value.trim(),
    insStart:document.getElementById("petInsStart").value,
    insEnd:document.getElementById("petInsEnd").value,
    owner:document.getElementById("petOwner").value.trim(),
    tel:document.getElementById("petTel").value.trim(),
    food:document.getElementById("petFood").value.trim(),
    memo:document.getElementById("petMemo").value.trim(),
    updateTime:Date.now()
  };
  await petInfoCol.doc("info").set(data);
  alert("✅ 資料儲存成功");
}
function renderPetInfo(){
  document.getElementById("petName").value = petInfoData.name||"";
  document.getElementById("petBreed").value = petInfoData.breed||"";
  document.getElementById("petGender").value = petInfoData.gender||"";
  document.getElementById("petCut").value = petInfoData.cut||"";
  document.getElementById("petColor").value = petInfoData.color||"";
  document.getElementById("petBlood").value = petInfoData.blood||"";
  document.getElementById("petBirthReal").value = petInfoData.birthReal||"";
  document.getElementById("petBirthCele").value = petInfoData.birthCele||"";
  document.getElementById("petChip").value = petInfoData.chip||"";
  document.getElementById("petChipDate").value = petInfoData.chipDate||"";
  document.getElementById("petShop").value = petInfoData.shop||"";
  document.getElementById("petBuyDate").value = petInfoData.buyDate||"";
  document.getElementById("petSource").value = petInfoData.source||"";
  document.getElementById("petHospital").value = petInfoData.hospital||"";
  document.getElementById("petDoctor").value = petInfoData.doctor||"";
  document.getElementById("petInsName").value = petInfoData.insName||"";
  document.getElementById("petInsNo").value = petInfoData.insNo||"";
  document.getElementById("petInsStart").value = petInfoData.insStart||"";
  document.getElementById("petInsEnd").value = petInfoData.insEnd||"";
  document.getElementById("petOwner").value = petInfoData.owner||"";
  document.getElementById("petTel").value = petInfoData.tel||"";
  document.getElementById("petFood").value = petInfoData.food||"";
  document.getElementById("petMemo").value = petInfoData.memo||"";

  let html = `
本名：${petInfoData.name||"未填寫"}<br>
品種：${petInfoData.breed||"未填寫"}<br>
性別：${petInfoData.gender||"未填寫"}｜結紮：${petInfoData.cut||"未填寫"}<br>
花色：${petInfoData.color||"未填寫"}<br>
血型：${petInfoData.blood||"未填寫"}<br>
出生日期：${petInfoData.birthReal||"未填寫"}<br>
慶生日期：${petInfoData.birthCele||"未填寫"}<br>
晶片：${petInfoData.chip||"未填寫"}<br>
購入店家：${petInfoData.shop||"未填寫"}<br>
常駐醫院：${petInfoData.hospital||"未填寫"}<br>
保險公司：${petInfoData.insName||"未填寫"}<br>
保單號碼：${petInfoData.insNo||"未填寫"}<br>
緊急電話：${petInfoData.tel||"未填寫"}<br>
備註：${petInfoData.memo||"無"}
  `;
  document.getElementById("petInfoShow").innerHTML = html;
}

// 疫苗
async function addVaccine(){
  let data = {
    date:document.getElementById("vacDate").value,
    name:document.getElementById("vacName").value.trim(),
    next:document.getElementById("vacNext").value,
    note:document.getElementById("vacNote").value.trim(),
    stamp:Date.now()
  };
  if(!data.date||!data.name)return alert("請填寫必要欄位");
  await vaccineCol.add(data);
  document.getElementById("vacName").value = "";
  document.getElementById("vacNote").value = "";
}
function renderVaccine(){
  let list = vaccineData.sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById("vaccineBody").innerHTML = list.map(x=>`
    <tr>
      <td>${x.date}</td>
      <td>${x.name}</td>
      <td>${x.next||"-"}</td>
      <td><button class="btn-delete" onclick="delVac(${x.stamp})">刪除</button></td>
    </tr>
  `).join("");
}
async function delVac(stamp){
  let s = await vaccineCol.where("stamp","==",stamp).get();
  s.forEach(d=>d.ref.delete());
}

// 空白佔位功能（避免報錯）
function addRecord(){}
function addWeight(){}
function addDeworm(){}
</script>
</body>
</html>
