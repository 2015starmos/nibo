<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>貓貓の健康全紀錄</title>

<style>
.inlock-wrap{position:fixed;inset:0;background:linear-gradient(160deg, #f6f9fe, #eaf2f9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.inlock-box{width:100%;max-width:360px;background:#fff;border-radius:24px;padding:28px 20px;box-shadow:0 6px 20px rgba(71,143,184,0.15);text-align:center;}
.inlock-title{font-size:20px;color:#478fb8;margin-bottom:18px;font-weight:600;}
.inlock-input{width:100%;padding:13px 16px;border:1px solid #dce9f2;border-radius:18px;background:#f9fbfe;text-align:center;font-size:16px;margin-bottom:10px;}
.inlock-btn{width:100%;padding:13px;border:none;border-radius:18px;background:linear-gradient(90deg,#58a2cc,#478fb8);color:#fff;font-size:16px;cursor:pointer;}
.inlock-tip{height:20px;font-size:14px;color:#f28484;margin:6px 0;}
.main-content{display:none;}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
}

:root {
  --bg-gradient-1: #f6f9fe;
  --bg-gradient-2: #eaf2f9;
  --card-bg: #ffffff;
  --text-main: #506473;
  --primary: #478fb8;
  --primary-light: rgba(71,143,184,0.12);
  --border-color: #dce9f2;
  --input-bg: #f9fbfe;
  --btn-gray: #d7e3ec;
  --table-bg: #f8fbfd;
  --table-head: #f0f6fb;
  --danger: #f28484;
  --success: #34a873;
  --warn: #e39548;
  --green: #34a873;
  --orange: #f2994a;
}

.dark-mode {
  --bg-gradient-1: #1a202c;
  --bg-gradient-2: #121822;
  --card-bg: #242c37;
  --text-main: #cbd5e0;
  --primary: #63b3e0;
  --primary-light: rgba(99,179,224,0.15);
  --border-color: #3a4756;
  --input-bg: #2d3743;
  --btn-gray: #3a4756;
  --table-bg: #2d3743;
  --table-head: #323e4d;
}

body {
  font-family: "微軟正黑體", "Noto Sans TC", sans-serif;
  background: linear-gradient(160deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
  padding: 20px 14px;
  min-height: 100vh;
  color: var(--text-main);
}

.wrapper {
  width: 100%;
  max-width:560px;
  margin: 0 auto;
}

.main-title {
  text-align: center;
  font-size: 24px;
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.cat-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
  justify-content: center;
}
.cat-select {
  padding: 10px 14px;
  border-radius: 16px;
  border: 1px solid var(--border-color);
  background: var(--input-bg);
  color: var(--text-main);
  font-size: 15px;
  width: 180px;
  text-align: center;
}
.cat-add-btn {
  padding: 10px 12px;
  border-radius: 16px;
  border: none;
  background: var(--primary);
  color: #fff;
  cursor: pointer;
}

.tab-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  border-radius: 16px;
  border: none;
  background: var(--btn-gray);
  color: var(--text-main);
  font-size: 14px;
  cursor: pointer;
  min-width: 80px;
}
.tab-btn.active {
  background: var(--primary);
  color: #fff;
}
.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
}

.theme-switch {
  display: block;
  margin: 0 auto 16px;
  border: none;
  background: var(--primary-light);
  color: var(--primary);
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size:14px;
}
.theme-switch:active { transform: scale(0.96); }

.info-banner {
  width: 100%;
  background: var(--primary-light);
  border-radius: 30px;
  padding: 13px 16px;
  text-align: center;
  font-size: 15px;
  color: var(--primary);
  margin-bottom: 16px;
}

.ui-card {
  background: var(--card-bg);
  border-radius: 28px;
  padding: 20px 18px;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(71,143,184,0.08);
  overflow: hidden;
}

.form-input {
  width: 100%;
  padding: 13px 12px;
  margin: 6px 0;
  border: 1px solid var(--border-color);
  border-radius: 20px;
  background-color: var(--input-bg);
  font-size: 15px;
  text-align: center;
  color: var(--text-main);
}
.form-textarea {
  text-align: left;
  min-height: 70px;
  resize: vertical;
}
.form-input:focus {
  outline: none;
  border-color: var(--primary);
}

.quick-btn-group {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.btn-quick {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--primary);
  background: transparent;
  color: var(--primary);
  border-radius: 15px;
  cursor: pointer;
  font-weight: 500;
}
.btn-quick:active {
  background: var(--primary);
  color: #fff;
  transform: scale(0.97);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  margin-top: 5px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(90deg, #58a2cc, #478fb8);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}
.btn-primary:active { opacity: 0.92; transform: scale(0.99); }

.btn-delete {
  border: none;
  background: var(--danger);
  color: #fff;
  padding: 4px 6px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 11px;
}
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.btn-clear-day, .btn-export, .btn-import {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 20px;
  background: var(--btn-gray);
  color: var(--text-main);
  font-size: 14px;
  cursor: pointer;
}

input#importFile { display: none; }

.today-total-box {
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  padding: 10px 0;
}
.text-low { color: #e39548; }
.text-normal { color: #34a873; }
.text-high { color: #58a2cc; }
.warn-low, .warn-high {
  text-align: center;
  font-size: 14px;
  margin-bottom: 12px;
  line-height: 1.5;
}

.record-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 8px;
  table-layout: fixed;
}
.record-table th {
  background: var(--table-head);
  color: var(--primary);
  padding: 10px 4px;
  border-radius: 14px;
  font-weight: 500;
  font-size:13px;
}
.record-table td {
  background: var(--table-bg);
  text-align: center;
  padding: 10px 4px;
  font-size: 14px;
  word-break:break-word;
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}
.stat-item {
  background: var(--primary-light);
  border-radius: 20px;
  padding: 12px 6px;
  text-align: center;
}
.stat-label { font-size: 12px; color: var(--primary); margin-bottom: 3px; }
.stat-num { font-size: 16px; font-weight: 600; }

.loading-text {
  text-align:center;
  color:var(--primary);
  padding:10px;
  font-size:14px;
}
.sync-badge{
  text-align:center;
  font-size:12px;
  color:var(--success);
  margin-bottom:8px;
}

.btn-danger-full {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 20px;
  background: var(--danger);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}
.btn-danger-full:active { opacity: 0.9; transform: scale(0.99); }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<div class="inlock-wrap">
  <div class="inlock-box">
    <div class="inlock-title">🔐 波波健康紀錄 解鎖</div>
    <input type="password" class="inlock-input" id="inPwd" placeholder="請輸入密碼">
    <label style="display:block;text-align:left;margin:8px auto 0;width:fit-content;font-size:14px;color:var(--text-main);cursor:pointer;">
      <input type="checkbox" id="savePwdCheck"> 記住密碼
    </label>
    <div class="inlock-tip" id="inTip"></div>
    <button class="inlock-btn" onclick="checkInPwd()">確認解鎖</button>
  </div>
</div>

<div class="main-content">
<div class="wrapper">
  <h1 class="main-title">🐾 貓貓の健康全紀錄</h1>
  <div class="sync-badge" id="syncBadge">☁️ 雲端同步連線中...</div>
  <button class="theme-switch" onclick="toggleDarkMode()">🌓 切換深色模式</button>

  <div class="cat-selector">
    <select class="cat-select" id="catSelect" onchange="switchCat()"></select>
    <button class="cat-add-btn" onclick="addNewCat()">+ 新增貓咪</button>
  </div>

  <div class="tab-wrap">
    <button class="tab-btn active" data-tab="water">飲水紀錄</button>
    <button class="tab-btn" data-tab="weight">體重紀錄</button>
    <button class="tab-btn" data-tab="deworm">體外驅蟲</button>
  </div>

  <!-- 🌟 這裡是我幫你新增的 Discord 一鍵按鈕 -->
  <button id="discordAddBtn" style="width:100%;margin:12px 0;padding:14px;border:none;border-radius:20px;background:#478fb8;color:white;font-size:16px;font-weight:bold;cursor:pointer;">📥 貼上 Discord 喝水指令</button>

  <div class="tab-content active" id="tab-water">
    <div class="info-banner">💧 貓咪建議目標：150ml ～ 210ml / 每日</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="selectDate">
      <input class="form-input" type="time" id="selectTime">
      <div class="quick-btn-group">
        <button class="btn-quick" onclick="quickAdd(25)">+25ml</button>
        <button class="btn-quick" onclick="quickAdd(50)">+50ml</button>
        <button class="btn-quick" onclick="quickAdd(75)">+75ml</button>
      </div>
      <input class="form-input" type="number" id="waterML" placeholder="手動輸入水量 ml" inputmode="numeric" min="1">
      <button class="btn-primary" onclick="addRecord()">✅ 新增飲水紀錄</button>
    </div>

    <div class="ui-card">
      <div class="today-total-box" id="totalShow">今日總計：0 ml</div>
      <div id="warnTip"></div>
      <table class="record-table">
        <thead>
          <tr><th>時間</th><th>飲水量</th><th>操作</th></tr>
        </thead>
        <tbody id="recordBody"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn-clear-day" onclick="clearDayRecord()">🗑️ 清空今日</button>
        <button class="btn-export" onclick="exportCSV()">📤 匯出CSV</button>
        <button class="btn-import" onclick="triggerImport()">📥 匯入CSV</button>
      </div>
      <input type="file" id="importFile" accept=".csv" onchange="importCSV(event)">
    </div>
  </div>

  <div class="tab-content" id="tab-weight">
    <div class="info-banner">⏲️ 體重趨勢追蹤｜自動計算增減</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="weightDate">
      <input class="form-input" type="number" step="0.01" min="0" id="weightVal" placeholder="輸入體重 kg">
      <input class="form-input" id="weightNote" placeholder="備註（飯前/飯後）">
      <button class="btn-primary" onclick="addWeight()">✅ 新增體重紀錄</button>
    </div>

    <div class="ui-card">
      <div class="today-total-box" id="weightLatest">最新體重：0 kg</div>
      <table class="record-table">
        <thead><tr><th>日期</th><th>體重</th><th>備註</th><th>刪除</th></tr></thead>
        <tbody id="weightBody"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn-export" onclick="exportWeightCSV()">📤 匯出CSV</button>
        <button class="btn-import" onclick="triggerWeightImport()">📥 匯入CSV</button>
      </div>
      <input type="file" id="importWeightFile" accept=".csv" style="display:none;" onchange="importWeightCSV(event)">
    </div>

    <div class="ui-card">
      <div style="text-align:center; margin-bottom:10px; font-weight:500;">📈 體重統計</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-label">最高體重</div><div class="stat-num" id="wMax">0 kg</div></div>
        <div class="stat-item"><div class="stat-label">最低體重</div><div class="stat-num" id="wMin">0 kg</div></div>
        <div class="stat-item"><div class="stat-label">30日平均</div><div class="stat-num" id="wAvg">0 kg</div></div>
        <div class="stat-item"><div class="stat-label">最近變化</div><div class="stat-num" id="wDiff">0 kg</div></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-deworm">
    <div class="info-banner">🐛 體外驅蟲紀錄｜提醒下次使用時間</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="dewormDate">
      <select class="form-input" id="dewormDrug">
        <option value="">請選擇藥品</option>
        <option value="全能貓">全能貓</option>
        <option value="寵     愛">寵   愛</option>
      </select>
      <input class="form-input" type="date" id="dewormNext" placeholder="預計下次使用日期">
      <button class="btn-primary" onclick="addDeworm()">✅ 新增驅蟲紀錄</button>
    </div>

    <div class="ui-card">
      <table class="record-table">
        <thead><tr><th>使用日期</th><th>藥品</th><th>下次日期</th><th>刪除</th></tr></thead>
        <tbody id="dewormBody"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn-export" onclick="exportParaCSV()">📤 匯出CSV</button>
        <button class="btn-import" onclick="triggerParaImport()">📥 匯入CSV</button>
      </div>
      <input type="file" id="importParaFile" accept=".csv" style="display:none;" onchange="importParaCSV(event)">
    </div>
  </div>

  <div style="margin-top:20px;">
    <button class="btn-danger-full" onclick="showClearAllConfirm()">⚠️ 清除所有貓咪全部數據</button>
  </div>

</div>
</div>

<script>
document.oncontextmenu = () => false;
document.addEventListener('keydown',e=>{
  if(e.keyCode===123) e.preventDefault();
  if(e.ctrlKey&&e.keyCode===85)e.preventDefault();
  if(e.ctrlKey&&e.shiftKey&&e.keyCode===73)e.preventDefault();
  if(e.ctrlKey&&e.keyCode===83)e.preventDefault();
});

const validPws = ["0963612120", "0952867812", "ha821208"];
const LOGIN_EXPIRE_HOUR = 4;
let loginCheckTimer = null;

window.addEventListener('DOMContentLoaded', () => {
  const savePwdCheck = document.getElementById('savePwdCheck');
  const pwdInput = document.getElementById('inPwd');
  const savedPwd = localStorage.getItem('catSysSavedPwd');
  const savedExpire = localStorage.getItem('catSysLoginExpire');

  if(savedPwd){
    pwdInput.value = savedPwd;
    savePwdCheck.checked = true;
  }

  if(savedExpire){
    const expireTime = parseInt(savedExpire, 10);
    const now = Date.now();
    if(now > expireTime){
      manualLogout();
    }else{
      document.querySelector(".inlock-wrap").style.display="none";
      document.querySelector(".main-content").style.display="block";
      initCatSystem();
      startLoginExpireCheck();
    }
  }

  if(localStorage.getItem('darkMode') === 'true'){
    darkMode = true;
    document.body.classList.add('dark-mode');
  }

  // 綁定 Discord 按鈕功能
  document.getElementById("discordAddBtn").onclick = async function(){
    let cmd = prompt("請貼上你在 Discord 打的指令\n例如：喝水50、50ml、喝30");
    if(!cmd) return;

    let ml = parseInt(cmd.replace(/\D/g, ''));
    if(isNaN(ml) || ml < 10 || ml > 500){
      alert("❌ 請輸入正確水量（10~500ml）");
      return;
    }

    const now = new Date();
    const date = now.toISOString().split('T')[0];
    const time = now.toTimeString().slice(0,5);

    await waterCol.add({
      date: date,
      time: time,
      ml: ml,
      stamp: Date.now()
    });

    alert(`✅ 成功幫波波新增 ${ml}ml 飲水！`);
  };
});

function checkInPwd(){
  const val = document.getElementById("inPwd").value.trim();
  const tip = document.getElementById("inTip");
  const savePwdCheck = document.getElementById('savePwdCheck');

  if(validPws.includes(val)){
    document.querySelector(".inlock-wrap").style.display="none";
    document.querySelector(".main-content").style.display="block";
    tip.innerText = "";
    initCatSystem();

    const expireStamp = Date.now() + LOGIN_EXPIRE_HOUR * 60 * 60 * 1000;
    localStorage.setItem('catSysLoginExpire', expireStamp);
    startLoginExpireCheck();

    if(savePwdCheck.checked){
      localStorage.setItem('catSysSavedPwd', val);
    }else{
      localStorage.removeItem('catSysSavedPwd');
    }
  }else{
    tip.innerText = "❌ 密碼錯誤";
    document.getElementById("inPwd").value = "";
  }
}

document.addEventListener("keydown",e=>{
  if(e.key==="Enter") checkInPwd();
});

function manualLogout(){
  localStorage.removeItem('catSysLoginExpire');
  if(loginCheckTimer) clearInterval(loginCheckTimer);
  document.querySelector(".inlock-wrap").style.display="flex";
  document.querySelector(".main-content").style.display="none";
}

function startLoginExpireCheck(){
  if(loginCheckTimer) clearInterval(loginCheckTimer);
  loginCheckTimer = setInterval(()=>{
    const exp = localStorage.getItem('catSysLoginExpire');
    if(!exp) return;
    if(Date.now() > parseInt(exp)) manualLogout();
  }, 5000);
}

const firebaseConfig = {
  apiKey: "AIzaSyD4iT2_YhVoBvOSVWz_-ZNJcR9BjEqHhaE",
  authDomain: "naibo-health.firebaseapp.com",
  projectId: "naibo-health",
  storageBucket: "naibo-health.firebasestorage.app",
  messagingSenderId: "1008746304734",
  appId: "1:1008746304734:web:33b87646673ee83b975e4f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentCat = "default";
let catList = JSON.parse(localStorage.getItem("petCats") || '[{"id":"default","name":"波波"}]');
let currentCatName = "波波";

let waterUnsubscribe = null;
let weightUnsubscribe = null;
let dewormUnsubscribe = null;

function initCatSystem(){
  renderCatSelect();
  switchCat();
  setNow();
}
function renderCatSelect(){
  const sel = document.getElementById("catSelect");
  sel.innerHTML = catList.map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
}
function addNewCat(){
  const name = prompt("輸入新貓咪名稱：");
  if(!name)return;
  const id = "cat_"+Date.now();
  catList.push({id,name});
  localStorage.setItem("petCats",JSON.stringify(catList));
  renderCatSelect();
  document.getElementById("catSelect").value = id;
  switchCat();
}

function switchCat(){
  if(waterUnsubscribe) waterUnsubscribe();
  if(weightUnsubscribe) weightUnsubscribe();
  if(dewormUnsubscribe) dewormUnsubscribe();

  currentCat = document.getElementById("catSelect").value;
  const catObj = catList.find(c=>c.id === currentCat);
  currentCatName = catObj ? catObj.name : "貓咪";

  recordData = [];
  weightData = [];
  dewormData = [];
  renderPage();
  renderWeight();
  renderDeworm();

  listenAllData();
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick = function(){
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    this.classList.add('active');
    const t = this.dataset.tab;
    if(t==="water")document.getElementById("tab-water").classList.add("active");
    if(t==="weight")document.getElementById("tab-weight").classList.add("active");
    if(t==="deworm")document.getElementById("tab-deworm").classList.add("active");
  }
});

let waterCol, weightCol, dewormCol;
let recordData = [], weightData = [], dewormData = [];
let darkMode = localStorage.getItem('darkMode') === 'true';

function listenAllData(){
  waterCol = db.collection(`catWater_${currentCat}`);
  weightCol = db.collection(`catWeight_${currentCat}`);
  dewormCol = db.collection(`catDeworm_${currentCat}`);

  waterUnsubscribe = waterCol.onSnapshot(snap=>{
    recordData=[]; snap.forEach(d=>recordData.push(d.data()));
    renderPage();
    document.getElementById("syncBadge").innerText="☁️ 已同步";
  });
  weightUnsubscribe = weightCol.onSnapshot(snap=>{
    weightData=[]; snap.forEach(d=>weightData.push(d.data()));
    renderWeight();
  });
  dewormUnsubscribe = dewormCol.onSnapshot(snap=>{
    dewormData=[]; snap.forEach(d=>dewormData.push(d.data()));
    renderDeworm();
  });
}

const setNow = () => {
  const today = new Date().toISOString().split('T')[0];
  const nowTime = new Date().toTimeString().slice(0,5);
  document.getElementById('selectDate').value = today;
  document.getElementById('selectTime').value = nowTime;
  document.getElementById('weightDate').value = today;
  document.getElementById('dewormDate').value = today;
};

async function addRecord(){
  const d=document.getElementById("selectDate").value;
  const t=document.getElementById("selectTime").value;
  const ml=parseInt(document.getElementById("waterML").value);
  if(!d||!t||isNaN(ml)||ml<1)return alert("請輸入正確水量");
  await waterCol.add({date:d,time:t,ml,stamp:Date.now()});

}

async function delOne(stamp){
  if(!confirm("確定刪除此筆紀錄？")) return;

  snap.forEach(d=>d.ref.delete());
}

async function clearDayRecord(){
  if(!confirm("⚠️ 確定要清空「當天選取日期」的所有飲水紀錄嗎？")) return;
  
  let inputPwd = "";
  while(true){
    inputPwd = prompt("請輸入登入密碼以確認清空：");
    if(inputPwd === null) return;
    inputPwd = inputPwd.trim();
    if(inputPwd !== "") break;
    alert("❌ 不可以輸入空白，請輸入密碼！");
  }

  if (!validPws.includes(inputPwd)) {
    alert("❌ 密碼錯誤，無法清空！");
    return;
  }

  const d=document.getElementById("selectDate").value;
  const snap=await waterCol.where("date","==",d).get();
  const b=db.batch(); 
  snap.forEach(d=>b.delete(d.ref)); 
  await b.commit();
  alert("✅ 今日飲水紀錄已清空！");
}

function triggerImport(){document.getElementById("importFile").click();}

async function importCSV(e){
  const f=e.target.files[0];if(!f)return;
  
  if(!confirm("匯入將覆蓋全部舊資料，確定繼續？")) return;
  const snapAll = await waterCol.get();
  const batch = db.batch();
  snapAll.forEach(doc => batch.delete(doc.ref));
  await batch.commit();

  const r=new FileReader();
  r.onload=async ev=>{
    const lines=ev.target.result.split("\n").filter(l=>l.trim());
    let count=0;
    for(let i=1;i<lines.length;i++){
      const [d,t,mlStr]=lines[i].split(",");
      const ml=parseInt(mlStr);
      if(d&&t&&!isNaN(ml)&&ml>0){
        await waterCol.add({date:d,time:t,ml,stamp:Date.now()+i});
        count++;
      }
    }
    alert(`覆蓋匯入完成：${count} 筆`);
    document.getElementById("importFile").value = "";
  };
  r.readAsText(f);
}

function getDayDiff(a,b){return Math.floor((new Date(a)-new Date(b))/86400000)}
  
function renderPage(){
  const d=document.getElementById("selectDate").value;
  const list=recordData.filter(x=>x.date===d).sort((a,b)=>b.time.localeCompare(a.time));
  const total=list.reduce((s,x)=>s+x.ml,0);
  let cls="text-low",tip="";
  if(total>=150&&total<=210){cls="text-normal";tip="<div class='warn-high'>✅ 達標</div>"}
  else if(total>210){cls="text-high";tip="<div class='warn-high'>⚠️ 過量</div>"}
  else if(total>0){tip="<div class='warn-low'>⚠️ 不足</div>"}
  document.getElementById("totalShow").innerHTML=`今日：<span class="${cls}">${total}</span> ml`;
  document.getElementById("warnTip").innerHTML=tip;
  document.getElementById("recordBody").innerHTML=list.map(x=>`
  <tr><td>${x.time}</td><td>${x.ml}ml</td><td><button class='btn-delete' onclick='delOne(${x.stamp})'>刪</button></td></tr>`).join("");
}

document.getElementById("selectDate").addEventListener("change",renderPage);

function renderWeight(){
  const list=[...weightData].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById("weightBody").innerHTML=list.map(x=>`
  <tr>
    <td>${x.date}</td>
    <td>${parseFloat(x.weight).toFixed(2)}</td>
    <td>${x.note||"-"}</td>
    <td><button class='btn-delete' onclick='delWeight(${x.stamp})'>刪</button></td>
  </tr>`).join("");

  if(list.length){
    document.getElementById("weightLatest").innerText=`最新：${parseFloat(list[0].weight).toFixed(2)} kg`;
    const vals=list.map(x=>parseFloat(x.weight));
    const max=Math.max(...vals).toFixed(2);
    const min=Math.min(...vals).toFixed(2);
    const avg=(vals.reduce((s,x)=>s+x,0)/vals.length).toFixed(2);
    const diff=list.length>=2?(vals[0]-vals[1]).toFixed(2):0;
    document.getElementById("wMax").innerText=max+" kg";
    document.getElementById("wMin").innerText=min+" kg";
    document.getElementById("wAvg").innerText=avg+" kg";
    document.getElementById("wDiff").innerText=diff+" kg";
  }
}

function triggerWeightImport(){document.getElementById("importWeightFile").click();}
async function importWeightCSV(e){
  const file = e.target.files[0];if(!file)return;
  if(!confirm("匯入會新增資料，確定？"))return;
  const text = await file.text();
  const lines = text.replace(/^\uFEFF/, "").split("\n").filter(l=>l.trim());
  let count=0;
  for(let i=1;i<lines.length;i++){
    const parts=lines[i].split(",").map(p=>p.replace(/^"|"$/g,"").trim());
    const date=parts[0], weight=parts[1], note=parts[2]||"";
    if(!date||!weight||isNaN(parseFloat(weight)))continue;
    await weightCol.add({date,weight,note,stamp:Date.now()+i});
    count++;
  }
  alert(`體重匯入完成：${count} 筆`);
  document.getElementById("importWeightFile").value="";
}

  if (!validPws.includes(inputPwd)) {alert("❌ 密碼錯誤");return;}

async function clearAllCatsAllData() {
  try {
    for (const cat of catList) {
      const colls = [`catWater_${cat.id}`, `catWeight_${cat.id}`, `catDeworm_${cat.id}`];
      for (const collName of colls) {
        const snap = await db.collection(collName).get();
        const batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
      }
    }
    alert("✅ 所有數據已清除！");
  } catch (err) {
    alert("❌ 失敗："+err.message);
  }
}
