<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>貓貓の健康全紀錄</title>

<style>
.inlock-wrap{position:fixed;inset:0;background:linear-gradient(160deg, #f6f9fe, #eaf2f9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.inlock-box{width:100%;max-width:360px;background:#fff;border-radius:24px;padding:28px 20px;box-shadow:0 6px 20px rgba(71,143,184,0.15);text-align:center;}
.inlock-title{font-size:20px;color:#478fb8;margin-bottom:18px;font-weight:600;}
.inlock-input{width:100%;padding:13px 16px;border:1px solid #dce9f2;border-radius:18px;background:#f9fbfe;text-align:center;font-size:16px;margin-bottom:10px;}
.inlock-btn{width:100%;padding:13px;border:none;border-radius:18px;background:linear-gradient(90deg,#58a2cc,#478fb8);color:#fff;font-size:16px;cursor:pointer;}
.inlock-tip{height:20px;font-size:14px;color:#f28484;margin:6px 0;}
.main-content{display:none;}

/* 管理員驗證彈窗樣式 */
.admin-modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  z-index: 999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.admin-modal-box {
  width: 100%;
  max-width: 340px;
  background: #fff;
  border-radius: 24px;
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}
.admin-modal-title {
  font-size: 18px;
  color: #478fb8;
  font-weight: 600;
  margin-bottom: 16px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
}

:root {
  --bg-gradient-1: #f6f9fe;
  --bg-gradient-2: #eaf2f9;
  --card-bg: #ffffff;
  --text-main: #506473;
  --primary: #478fb8;
  --primary-light: rgba(71,143,184,0.12);
  --border-color: #dce9f2;
  --input-bg: #f9fbfe;
  --btn-gray: #d7e3ec;
  --table-bg: #f8fbfd;
  --table-head: #f0f6fb;
  --danger: #f28484;
  --success: #34a873;
  --warn: #e39548;
  --green: #34a873;
  --orange: #f2994a;
}

.dark-mode {
  --bg-gradient-1: #1a202c;
  --bg-gradient-2: #121822;
  --card-bg: #242c37;
  --text-main: #cbd5e0;
  --primary: #63b3e0;
  --primary-light: rgba(99,179,224,0.15);
  --border-color: #3a4756;
  --input-bg: #2d3743;
  --btn-gray: #3a4756;
  --table-bg: #2d3743;
  --table-head: #323e4d;
}

body {
  font-family: "微軟正黑體", "Noto Sans TC", sans-serif;
  background: linear-gradient(160deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
  padding: 20px 14px;
  min-height: 100vh;
  color: var(--text-main);
}

.wrapper {
  width: 100%;
  max-width:560px;
  margin: 0 auto;
}

.main-title {
  text-align: center;
  font-size: 24px;
  color: var(--primary);
  font-weight: 600;
  margin-bottom: 12px;
  letter-spacing: 1px;
}

.cat-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
  justify-content: center;
}
.cat-select {
  padding: 10px 14px;
  border-radius: 16px;
  border: 1px solid var(--border-color);
  background: var(--input-bg);
  color: var(--text-main);
  font-size: 15px;
  width: 180px;
  text-align: center;
}
.cat-add-btn {
  padding: 10px 12px;
  border-radius: 16px;
  border: none;
  background: var(--primary);
  color: #fff;
  cursor: pointer;
}

.tab-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.tab-btn {
  flex: 1;
  padding: 10px;
  border-radius: 16px;
  border: none;
  background: var(--btn-gray);
  color: var(--text-main);
  font-size: 14px;
  cursor: pointer;
  min-width: 80px;
}
.tab-btn.active {
  background: var(--primary);
  color: #fff;
}
.tab-content {
  display: none;
}
.tab-content.active {
  display: block;
}

.theme-switch {
  display: block;
  margin: 0 auto 16px;
  border: none;
  background: var(--primary-light);
  color: var(--primary);
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  font-size:14px;
}
.theme-switch:active { transform: scale(0.96); }

.info-banner {
  width: 100%;
  background: var(--primary-light);
  border-radius: 30px;
  padding: 13px 16px;
  text-align: center;
  font-size: 15px;
  color: var(--primary);
  margin-bottom: 16px;
}

.ui-card {
  background: var(--card-bg);
  border-radius: 28px;
  padding: 20px 18px;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(71,143,184,0.08);
  overflow: hidden;
}

.form-input {
  width: 100%;
  padding: 13px 12px;
  margin: 6px 0;
  border: 1px solid var(--border-color);
  border-radius: 20px;
  background-color: var(--input-bg);
  font-size: 15px;
  text-align: center;
  color: var(--text-main);
}
.form-textarea {
  text-align: left;
  min-height: 70px;
  resize: vertical;
}
.form-input:focus {
  outline: none;
  border-color: var(--primary);
}

.quick-btn-group {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}
.btn-quick {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--primary);
  background: transparent;
  color: var(--primary);
  border-radius: 15px;
  cursor: pointer;
  font-weight: 500;
}
.btn-quick:active {
  background: var(--primary);
  color: #fff;
  transform: scale(0.97);
}

.btn-primary {
  width: 100%;
  padding: 14px;
  margin-top: 5px;
  border: none;
  border-radius: 20px;
  background: linear-gradient(90deg, #58a2cc, #478fb8);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}
.btn-primary:active { opacity: 0.92; transform: scale(0.99); }

.btn-delete {
  border: none;
  background: var(--danger);
  color: #fff;
  padding: 4px 6px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 11px;
}
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.btn-clear-day, .btn-export, .btn-import {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 20px;
  background: var(--btn-gray);
  color: var(--text-main);
  font-size: 14px;
  cursor: pointer;
}

input#importFile { display: none; }

.today-total-box {
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  padding: 10px 0;
}
.text-low { color: #e39548; }
.text-normal { color: #34a873; }
.text-high { color: #58a2cc; }
.warn-low, .warn-high {
  text-align: center;
  font-size: 14px;
  margin-bottom: 12px;
  line-height: 1.5;
}

.record-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 8px;
  table-layout: fixed;
}
.record-table th {
  background: var(--table-head);
  color: var(--primary);
  padding: 10px 4px;
  border-radius: 14px;
  font-weight: 500;
  font-size:13px;
}
.record-table td {
  background: var(--table-bg);
  text-align: center;
  padding: 10px 4px;
  font-size: 14px;
  word-break:break-word;
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}
.stat-item {
  background: var(--primary-light);
  border-radius: 20px;
  padding: 12px 6px;
  text-align: center;
}
.stat-label { font-size: 12px; color: var(--primary); margin-bottom: 3px; }
.stat-num { font-size: 16px; font-weight: 600; line-height: 1.3; }

.loading-text {
  text-align:center;
  color:var(--primary);
  padding:10px;
  font-size:14px;
}
.sync-badge{
  text-align:center;
  font-size:12px;
  color:var(--success);
  margin-bottom:8px;
}

.btn-danger-full {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border: none;
  border-radius: 20px;
  background: var(--danger);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
}
.btn-danger-full:active { opacity: 0.9; transform: scale(0.99); }

/* 後台專用微調樣式 */
.admin-cat-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 4px;
  border-bottom: 1px solid var(--border-color);
}
.radio-group {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin: 10px 0;
}
.radio-label {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  font-size: 14px;
}
.grid-3col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<div class="inlock-wrap">
  <div class="inlock-box">
    <div class="inlock-title">🔐 波波健康紀錄 解鎖</div>
    <input type="password" class="inlock-input" id="inPwd" placeholder="請輸入密碼">
    <label style="display:block;text-align:left;margin:8px auto 0;width:fit-content;font-size:14px;color:var(--text-main);cursor:pointer;">
      <input type="checkbox" id="savePwdCheck"> 記住密碼
    </label>
    <div class="inlock-tip" id="inTip"></div>
    <button class="inlock-btn" onclick="checkInPwd()">確認解鎖</button>
  </div>
</div>

<div class="admin-modal-backdrop" id="adminAuthModal" style="display: none;">
  <div class="admin-modal-box">
    <div class="admin-modal-title">管理員驗證</div>
    <input type="password" class="form-input" id="adminModalPwd" placeholder="輸入管理員密碼" style="margin-bottom: 16px;">
    <button class="btn-primary" onclick="verifyAdminTab()">確認進入後台</button>
    <button class="btn-clear-day" onclick="cancelAdminTab()" style="margin-top: 8px; width: 100%;">取消</button>
  </div>
</div>

<div class="main-content">
<div class="wrapper">
  <h1 class="main-title">🐾 貓貓の健康全紀錄</h1>
  <div class="sync-badge" id="syncBadge">☁️ 雲端同步連線中...</div>
  <button class="theme-switch" onclick="toggleDarkMode()">🌓 切換深色模式</button>

  <div class="cat-selector">
    <select class="cat-select" id="catSelect" onchange="switchCat()"></select>
    <button class="cat-add-btn" onclick="addNewCat()">+ 新增貓咪</button>
  </div>

  <div class="tab-wrap">
    <button class="tab-btn active" data-tab="water">飲水紀錄</button>
    <button class="tab-btn" data-tab="weight">體重紀錄</button>
    <button class="tab-btn" data-tab="deworm">體外驅蟲</button>
    <button class="tab-btn" data-tab="admin" id="tabBtnAdmin">系統後台</button>
  </div>

  <div class="tab-content active" id="tab-water">
    <div class="info-banner">💧 貓咪建議目標：150ml ～ 210ml / 每日</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="selectDate">
      <input class="form-input" type="time" id="selectTime">
      <div class="quick-btn-group">
        <button class="btn-quick" onclick="quickAdd(25)">+25ml</button>
        <button class="btn-quick" onclick="quickAdd(50)">+50ml</button>
        <button class="btn-quick" onclick="quickAdd(75)">+75ml</button>
      </div>
      <input class="form-input" type="number" id="waterML" placeholder="手動輸入水量 ml" inputmode="numeric" min="1">
      <button class="btn-primary" onclick="addRecord()">✅ 新增飲水紀錄</button>
    </div>

    <div class="ui-card">
      <div class="today-total-box" id="totalShow">今日總計：0 ml</div>
      <div id="warnTip"></div>
      <table class="record-table">
        <thead>
          <tr><th>時間</th><th>飲水量</th><th>操作</th></tr>
        </thead>
        <tbody id="recordBody"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn-clear-day" onclick="clearDayRecord()">🗑️ 清空今日</button>
        <button class="btn-export" onclick="exportCSV()">📤 匯出CSV</button>
        <button class="btn-import" onclick="triggerImport()">📥 匯入CSV</button>
      </div>
      <input type="file" id="importFile" accept=".csv" onchange="importCSV(event)">
    </div>
  </div>

  <div class="tab-content" id="tab-weight">
    <div class="info-banner">⏲️ 體重趨勢追蹤｜自動計算增減</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="weightDate">
      <input class="form-input" type="number" step="0.01" min="0" id="weightVal" placeholder="輸入體重 kg">
      <input class="form-input" id="weightNote" placeholder="備註（飯前/飯後）">
      <button class="btn-primary" onclick="addWeight()">✅ 新增體重紀錄</button>
    </div>

    <div class="ui-card">
      <div class="today-total-box" id="weightLatest">最新體重：0 kg</div>
      <table class="record-table">
        <thead><tr><th>日期</th><th>體重</th><th>備註</th><th>刪除</th></tr></thead>
        <tbody id="weightBody"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn-export" onclick="exportWeightCSV()">📤 匯出CSV</button>
        <button class="btn-import" onclick="triggerWeightImport()">📥 匯入CSV</button>
      </div>
      <input type="file" id="importWeightFile" accept=".csv" style="display:none;" onchange="importWeightCSV(event)">
    </div>

    <div class="ui-card">
      <div style="text-align:center; margin-bottom:10px; font-weight:500;">📈 體重統計</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-label">最高體重</div><div class="stat-num" id="wMax">0 kg</div></div>
        <div class="stat-item"><div class="stat-label">最低體重</div><div class="stat-num" id="wMin">0 kg</div></div>
        <div class="stat-item"><div class="stat-label">30日平均</div><div class="stat-num" id="wAvg">0 kg</div></div>
        <div class="stat-item"><div class="stat-label">最近變化</div><div class="stat-num" id="wDiff">0 kg</div></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-deworm">
    <div class="info-banner">🐛 體外驅蟲紀錄｜提醒下次使用時間</div>
    <div class="ui-card">
      <input class="form-input" type="date" id="dewormDate">
      <select class="form-input" id="dewormDrug">
        <option value="">請選擇藥品</option>
        <option value="全能貓">全能貓</option>
        <option value="寵     愛">寵   愛</option>
      </select>
      <input class="form-input" type="date" id="dewormNext" placeholder="預計下次使用日期">
      <button class="btn-primary" onclick="addDeworm()">✅ 新增驅蟲紀錄</button>
    </div>

    <div class="ui-card">
      <table class="record-table">
        <thead><tr><th>使用日期</th><th>藥品</th><th>下次日期</th><th>刪除</th></tr></thead>
        <tbody id="dewormBody"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn-export" onclick="exportParaCSV()">📤 匯出CSV</button>
        <button class="btn-import" onclick="triggerParaImport()">📥 匯入CSV</button>
      </div>
      <input type="file" id="importParaFile" accept=".csv" style="display:none;" onchange="importParaCSV(event)">
    </div>
  </div>

  <div class="tab-content" id="tab-admin">
    <div class="info-banner">⚙️ 專業管理後台</div>
    
    <button class="btn-clear-day" onclick="adminLogout()" style="width:100%; margin-bottom:16px;">後台登出</button>

    <div class="ui-card">
      <div style="text-align:center; margin-bottom:10px; font-weight:500;">🔐密碼管理 (雲端)</div>
      <input type="password" class="form-input" id="oldAdminPwd" placeholder="舊登入密碼">
      <input type="password" class="form-input" id="newAdminPwd" placeholder="新登入密碼">
      <input type="password" class="form-input" id="confirmAdminPwd" placeholder="確認新密碼">
      <button class="btn-primary" onclick="updateAdminPassword()">更新使用者密碼</button>
    </div>

    <div class="ui-card">
      <div style="text-align:center; margin-bottom:10px; font-weight:500;">🐾 貓咪檔案管理 (雲端)</div>
      <div id="adminCatList"></div>
      <button class="btn-primary" onclick="addNewCat()" style="margin-top:12px;">新增貓咪</button>
    </div>

    <div class="ui-card">
      <div style="text-align:center; font-weight:500;">💾全域備份與還原</div>
      <div class="radio-group">
        <label class="radio-label"><input type="radio" name="restoreMode" value="overwrite" checked> 覆蓋還原</label>
        <label class="radio-label"><input type="radio" name="restoreMode" value="incremental"> 增量匯入</label>
      </div>
      <div class="btn-row" style="margin-top:0;">
        <button class="btn-export" onclick="exportAllDataJSON()" style="background:var(--success); color:#fff;">完整備份匯出</button>
        <button class="btn-import" onclick="triggerAllRestore()" style="background:var(--orange); color:#fff;">全域還原匯入</button>
      </div>
      <input type="file" id="importAllFile" accept=".json" style="display:none;" onchange="importAllDataJSON(event)">
      <div style="text-align:center; font-size:11px; color:var(--danger); margin-top:8px;">覆蓋=清空舊數據還原 | 增量=保留舊數據追加</div>
    </div>

    <div class="ui-card">
      <div style="text-align:center; margin-bottom:10px; font-weight:500;">📁分類匯入匯出</div>
      <div class="radio-group">
        <label class="radio-label"><input type="radio" name="categoryMode" value="overwrite" checked> 覆蓋匯入</label>
        <label class="radio-label"><input type="radio" name="categoryMode" value="incremental"> 增量匯入</label>
      </div>
      <div class="grid-3col">
        <button class="btn-export" onclick="exportCSV()">匯出全部飲水</button>
        <button class="btn-export" onclick="exportWeightCSV()">匯出全部體重</button>
      </div>
      <div class="grid-3col">
        <button class="btn-export" onclick="exportParaCSV()">匯出全部驅蟲</button>
        <button class="btn-export" onclick="exportAdminCatListCSV()">匯出貓咪清單</button>
      </div>
      <div class="grid-3col" style="margin-top:12px;">
        <button class="btn-import" onclick="triggerImport()">匯入飲水數據</button>
        <button class="btn-import" onclick="triggerWeightImport()">匯入體重數據</button>
      </div>
      <div class="grid-3col">
        <button class="btn-import" onclick="triggerParaImport()">匯入驅蟲數據</button>
        <button class="btn-import" onclick="triggerCatListImport()">匯入貓咪清單</button>
      </div>
      <input type="file" id="importCatListFile" accept=".csv" style="display:none;" onchange="importCatListCSV(event)">
    </div>

    <div class="ui-card">
      <div style="text-align:center; margin-bottom:10px; font-weight:500;">🗑️ 數據清理</div>
      <button class="btn-danger-full" onclick="showClearAllConfirm()">清空全部數據</button>
    </div>
  </div>

</div>
</div>

<script>
document.oncontextmenu = () => false;
document.addEventListener('keydown',e=>{
  if(e.keyCode===123) e.preventDefault();
  if(e.ctrlKey&&e.keyCode===85)e.preventDefault();
  if(e.ctrlKey&&e.shiftKey&&e.keyCode===73)e.preventDefault();
  if(e.ctrlKey&&e.keyCode===83)e.preventDefault();
});

let validPws = ["0963612120", "0952867812", "ha821208"];
const LOGIN_EXPIRE_HOUR = 4;
let loginCheckTimer = null;
let isAdminAuthenticated = false; 

window.addEventListener('DOMContentLoaded', () => {
  const savePwdCheck = document.getElementById('savePwdCheck');
  const pwdInput = document.getElementById('inPwd');
  const savedPwd = localStorage.getItem('catSysSavedPwd');
  const savedExpire = localStorage.getItem('catSysLoginExpire');

  if(savedPwd){
    pwdInput.value = savedPwd;
    savePwdCheck.checked = true;
  }

  if(savedExpire){
    const expireTime = parseInt(savedExpire, 10);
    const now = Date.now();
    if(now > expireTime){
      manualLogout();
    }else{
      document.querySelector(".inlock-wrap").style.display="none";
      document.querySelector(".main-content").style.display="block";
      initCatSystem();
      startLoginExpireCheck();
    }
  }

  if(localStorage.getItem('darkMode') === 'true'){
    darkMode = true;
    document.body.classList.add('dark-mode');
  }
});

function checkInPwd(){
  const val = document.getElementById("inPwd").value.trim();
  const tip = document.getElementById("inTip");
  const savePwdCheck = document.getElementById('savePwdCheck');

  if(validPws.includes(val)){

async function importCSV(e){

  const isOverwrite = document.querySelector('input[name="categoryMode"]:checked')?.value === 'overwrite';
  if(isOverwrite) {
    if(!confirm("匯入將覆蓋全部舊資料，確定繼續？")) return;

  } else {

  }

  const r=new FileReader();
  r.onload=async ev=>{
    const lines=ev.target.result.replace(/^\uFEFF/, "").split("\n").filter(l=>l.trim());
    let count=0;
    for(let i=1;i<lines.length;i++){
      const [d,t,mlStr]=lines[i].split(",");

      if(d&&t&&!isNaN(ml)&&ml>0){

function renderWeight(){
  const list=[...weightData].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById("weightBody").innerHTML=list.map(x=>`
  <tr>
    <td>${x.date}</td>
    <td>${parseFloat(x.weight).toFixed(2)}</td>
    <td>${x.note||"-"}</td>
    <td><button class='btn-delete' onclick='delWeight(${x.stamp})'>刪</button></td>
  </tr>`).join("");

  if(list.length){
    document.getElementById("weightLatest").innerText=`最新：${parseFloat(list[0].weight).toFixed(2)} kg`;
    const vals=list.map(x=>parseFloat(x.weight));
    const avg=(vals.reduce((s,x)=>s+x,0)/vals.length).toFixed(2);
    const diff=list.length>=2?(vals[0]-vals[1]).toFixed(2):0;

    // 🎯 核心更新：精準尋找最高與最低體重對應的年月日
    let maxItem = list[0];
    let minItem = list[0];
    list.forEach(x => {
      if (parseFloat(x.weight) > parseFloat(maxItem.weight)) {
        maxItem = x;
      }
      if (parseFloat(x.weight) < parseFloat(minItem.weight)) {
        minItem = x;
      }
    });

    // 格式化輸出，將日期以半透明小字顯示在體重下方
    document.getElementById("wMax").innerHTML=`${parseFloat(maxItem.weight).toFixed(2)} kg<br><span style="font-size:11px; font-weight:normal; opacity:0.75;">(${maxItem.date})</span>`;
    document.getElementById("wMin").innerHTML=`${parseFloat(minItem.weight).toFixed(2)} kg<br><span style="font-size:11px; font-weight:normal; opacity:0.75;">(${minItem.date})</span>`;
    document.getElementById("wAvg").innerText=avg+" kg";
    document.getElementById("wDiff").innerText=diff+" kg";
  } else {
    document.getElementById("weightLatest").innerText=`最新：0 kg`;
    document.getElementById("wMax").innerHTML="0 kg";
    document.getElementById("wMin").innerHTML="0 kg";
    document.getElementById("wAvg").innerText="0 kg";
    document.getElementById("wDiff").innerText="0 kg";
  }
}

async function deleteCatProfile(id) {

  try {

      const snap = await db.collection(collName).get();
      const batch = db.batch();
      snap.forEach(doc => batch.delete(doc.ref));
      await batch.commit();
    }
    catList = catList.filter(c => c.id !== id);

  const newPwd = document.getElementById("newAdminPwd").value.trim();

  if(!oldPwd || !newPwd || !confPwd) {
    return alert("請填寫所有密碼欄位！");
  }
  if(!validPws.includes(oldPwd)) {
    return alert("❌ 舊登入密碼驗證錯誤！");
  }
  if(newPwd !== confPwd) {
    return alert("❌ 兩次輸入的新密碼不一致！");
  }
  if(newPwd.length < 4) {
    return alert("密碼強度過低，請輸入至少4位數。");
  }

  validPws.push(newPwd);
  alert("✅ 使用者密碼更新成功！新密碼即時生效。");
  document.getElementById("oldAdminPwd").value = "";
  document.getElementById("newAdminPwd").value = "";
  document.getElementById("confirmAdminPwd").value = "";

function exportAdminCatListCSV() {
  if(!catList.length) return alert("無資料");
  let csv = "\uFEFF貓咪ID,貓咪名稱\n";
  catList.forEach(c => csv += `"${c.id}","${c.name}"\n`);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv]));
  a.download = `貓咪清單備份.csv`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

function triggerCatListImport() { document.getElementById("importCatListFile").click(); }
async function importCatListCSV(e) {
  const file = e.target.files[0]; if(!file) return;
  const isOverwrite = document.querySelector('input[name="categoryMode"]:checked')?.value === 'overwrite';
  
  if(isOverwrite) {
    if(!confirm("確定要[覆蓋匯入]貓咪名單嗎？此操作將取代現有名單。")) return;
    catList = [];
  } else {
    if(!confirm("將以[增量]模式追加貓咪名單？")) return;
  }

  const text = await file.text();
  const lines = text.replace(/^\uFEFF/,"").split("\n").filter(l=>l.trim());
  let count = 0;
  for(let i=1; i<lines.length; i++) {
    const parts = lines[i].split(",").map(p=>p.replace(/^"|"$/g,"").trim());
    const id = parts[0], name = parts[1];
    if(!id || !name) continue;
    if(!catList.some(c => c.id === id)) {
      catList.push({ id, name });
      count++;
    }
  }
  localStorage.setItem("petCats", JSON.stringify(catList));
  renderCatSelect();
  renderAdminCatList();
  alert(`貓咪清單匯入完成：${count} 筆`);
  document.getElementById("importCatListFile").value = "";
}

async function exportAllDataJSON() {
  document.getElementById("syncBadge").innerText = "⏳ 正在打包備份全域數據...";
  try {
    let backupPackage = {
      version: "2026.1",
      timestamp: Date.now(),
      cats: catList,
      payload: {}
    };

    for (const cat of catList) {
      backupPackage.payload[cat.id] = { water: [], weight: [], deworm: [] };
      
      const waterSnap = await db.collection(`catWater_${cat.id}`).get();
      waterSnap.forEach(d => backupPackage.payload[cat.id].water.push(d.data()));

      const weightSnap = await db.collection(`catWeight_${cat.id}`).get();
      weightSnap.forEach(d => backupPackage.payload[cat.id].weight.push(d.data()));

      const dewormSnap = await db.collection(`catDeworm_${cat.id}`).get();
      dewormSnap.forEach(d => backupPackage.payload[cat.id].deworm.push(d.data()));
    }

    const blob = new Blob([JSON.stringify(backupPackage, null, 2)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `貓貓健康全紀錄_全域完整雲端備份_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    document.getElementById("syncBadge").innerText = "☁️ 已同步";
    alert("✅ 雲端全域完整備份打包下載完成！");
  } catch(err) {
    alert("❌ 備份打包失敗: " + err.message);
  }
}

function triggerAllRestore() { document.getElementById("importAllFile").click(); }
async function importAllDataJSON(e) {
  const file = e.target.files[0]; if(!file) return;
  const isOverwrite = document.querySelector('input[name="restoreMode"]:checked')?.value === 'overwrite';

  try {
    const text = await file.text();
    const backupData = JSON.parse(text);
    
    if(!backupData.version || !backupData.payload) {
      return alert("❌ 還原失敗：此檔案非本系統標準全域Json備份檔！");
    }

    const modeText = isOverwrite ? "【覆蓋還原】" : "【增量匯入】";
    const confirmPrompt = isOverwrite 
      ? `⚠️ 警告：即將執行 ${modeText}！\n這會清除雲端資料庫上所有貓咪的現有全部飲水、體重、驅蟲數據，並覆蓋取代為備份檔內容！確認繼續？`
      : `確認是否執行 ${modeText}？\n系統會保留現有雲端數據，僅追加備份檔中的新紀錄。確認繼續？`;

    if(!confirm(confirmPrompt)) return;
    document.getElementById("syncBadge").innerText = "⏳ 雲端數據還原佈署中...";

    if(isOverwrite) {
      for (const oldCat of catList) {
        const colls = [`catWater_${oldCat.id}`, `catWeight_${oldCat.id}`, `catDeworm_${oldCat.id}`];
        for (const cName of colls) {
          const snap = await db.collection(cName).get();
          const batch = db.batch();
          snap.forEach(d => batch.delete(d.ref));
          await batch.commit();
        }
      }
      catList = backupData.cats || [];
    } else {
      if(backupData.cats) {
        backupData.cats.forEach(nc => {
          if(!catList.some(oc => oc.id === nc.id)) catList.push(nc);
        });
      }
    }

    localStorage.setItem("petCats", JSON.stringify(catList));
    renderCatSelect();

    for (const catId in backupData.payload) {
      const target = backupData.payload[catId];
      
      if(target.water && target.water.length) {
        const coll = db.collection(`catWater_${catId}`);
        for(const item of target.water) await coll.add(item);
      }
      if(target.weight && target.weight.length) {
        const coll = db.collection(`catWeight_${catId}`);
        for(const item of target.weight) await coll.add(item);
      }
      if(target.deworm && target.deworm.length) {
        const coll = db.collection(`catDeworm_${catId}`);
        for(const item of target.deworm) await coll.add(item);
      }
    }

    document.getElementById("catSelect").value = catList[0].id;
    switchCat();
    renderAdminCatList();
    alert(`✅ 全域數據${modeText}還原處置已成功完成！`);
  } catch(err) {
    alert("❌ 解析還原出錯: " + err.message);
  } finally {
    document.getElementById("importAllFile").value = "";
  }
}
</script>
