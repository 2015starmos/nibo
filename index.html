<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>小貓醫療紀錄系統</title>
<style>
.inlock-wrap{position:fixed;inset:0;background:linear-gradient(160deg, #f6f9fe, #eaf2f9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.inlock-box{width:100%;max-width:360px;background:#fff;border-radius:24px;padding:28px 20px;box-shadow:0 6px 20px rgba(71,143,184,0.15);text-align:center;}
.inlock-title{font-size:20px;color:#478fb8;margin-bottom:18px;font-weight:600;}
.inlock-input{width:100%;padding:13px 16px;border:1px solid #dce9f2;border-radius:18px;background:#f9fbfe;text-align:center;font-size:16px;margin-bottom:10px;}
.inlock-btn{width:100%;padding:13px;border:none;border-radius:18px;background:linear-gradient(90deg,#58a2cc,#478fb8);color:#fff;font-size:16px;cursor:pointer;}
.inlock-tip{height:20px;font-size:14px;color:#f28484;margin:6px 0;}
.main-content{display:none;}
*{margin:0;padding:0;box-sizing:border-box;}
:root {
  --bg-gradient-1: #f6f9fe;
  --bg-gradient-2: #eaf2f9;
  --card-bg: #ffffff;
  --text-main: #506473;
  --primary: #478fb8;
  --primary-light: rgba(71, 143, 184, 0.12);
  --border-color: #dce9f2;
  --input-bg: #f9fbfe;
  --btn-gray: #d7e3ec;
  --table-bg: #f8fbfd;
  --table-head: #f0f6fb;
  --danger: #f28484;
  --success: #34a873;
  --warn: #e39548;
  --orange: #f2994a;
}
body {
  font-family:"微軟正黑體","Noto Sans TC",sans-serif;
  background:linear-gradient(160deg,var(--bg-gradient-1),var(--bg-gradient-2));
  padding:20px 14px;
  min-height:100vh;
  color:var(--text-main);
}
.wrapper{width:100%;max-width:560px;margin:0 auto;}
.main-title{text-align:center;font-size:24px;color:var(--primary);font-weight:600;margin-bottom:12px;}
.cat-selector{display:flex;gap:8px;margin-bottom:16px;align-items:center;justify-content:center;}
.cat-select{padding:10px 14px;border-radius:16px;border:1px solid var(--border-color);background:var(--input-bg);color:var(--text-main);font-size:15px;width:180px;text-align:center;}
.cat-add-btn{padding:10px 12px;border-radius:16px;border:none;background:var(--primary);color:#fff;cursor:pointer;}
.tab-wrap{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tab-btn{flex:1;padding:10px;border-radius:16px;border:none;background:var(--btn-gray);color:var(--text-main);font-size:14px;cursor:pointer;min-width:80px;}
.tab-btn.active{background:var(--primary);color:#fff;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.theme-switch{display:block;margin:0 auto 16px;border:none;background:var(--primary-light);color:var(--primary);padding:8px 16px;border-radius:20px;cursor:pointer;font-size:14px;}
.info-banner{width:100%;background:var(--primary-light);border-radius:30px;padding:13px 16px;text-align:center;font-size:15px;color:var(--primary);margin-bottom:16px;}
.ui-card{background:var(--card-bg);border-radius:28px;padding:20px 18px;margin-bottom:16px;box-shadow:0 8px 24px rgba(71,143,184,0.08);overflow:hidden;}
.form-input{width:100%;padding:13px 12px;margin:6px 0;border:1px solid var(--border-color);border-radius:20px;background-color:var(--input-bg);font-size:15px;text-align:center;color:var(--text-main);}
.form-textarea{text-align:left;min-height:70px;resize:vertical;}
.form-input:focus{outline:none;border-color:var(--primary);}
.btn-primary{width:100%;padding:14px;margin-top:5px;border:none;border-radius:20px;background:linear-gradient(90deg,#58a2cc,#478fb8);color:#fff;font-size:16px;font-weight:500;cursor:pointer;}
.btn-delete{border:none;background:var(--danger);color:#fff;padding:4px 6px;border-radius:8px;cursor:pointer;font-size:11px;}
.btn-edit{border:none;background:var(--warn);color:#fff;padding:4px 6px;border-radius:8px;cursor:pointer;font-size:11px;margin-right:3px;}
.btn-star{border:none;background:var(--orange);color:#fff;padding:4px 6px;border-radius:8px;cursor:pointer;font-size:11px;margin-right:3px;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.btn-clear-day,.btn-export,.btn-import{flex:1;padding:12px;border:none;border-radius:20px;background:var(--btn-gray);color:var(--text-main);font-size:14px;cursor:pointer;}
.today-total-box{text-align:center;font-size:22px;font-weight:600;padding:10px 0;}
.text-low{color:#e39548;}
.text-normal{color:#34a873;}
.text-high{color:#58a2cc;}
.record-table{width:100%;border-collapse:separate;border-spacing:0 8px;}
.record-table th{background:var(--table-head);color:var(--primary);padding:10px 4px;border-radius:14px;font-weight:500;}
.record-table td{background:var(--table-bg);text-align:center;padding:10px 4px;font-size:14px;}
.med-filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.filter-btn{padding:6px 10px;border-radius:12px;border:none;font-size:12px;background:var(--btn-gray);color:var(--text-main);cursor:pointer;}
.filter-btn.active{background:var(--primary);color:#fff;}
.med-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.med-card{background:var(--table-bg);border-radius:16px;padding:10px;font-size:13px;position:relative;display:flex;flex-direction:column;gap:6px;cursor:pointer;}
.desc-small{font-size:12px;color:var(--text-main);opacity:0.8;text-align:center;margin-bottom:4px;}
.preview-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;align-items:center;justify-content:center;z-index:9999;padding:15px;}
.preview-modal.show{display:flex;}
.preview-close{position:absolute;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.3);color:#fff;border:none;font-size:22px;cursor:pointer;z-index:100;}
.edit-modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:10000;padding:15px;}
.edit-modal.show{display:flex;}
.edit-box{width:100%;max-width:480px;background:var(--card-bg);border-radius:24px;padding:20px;}
.sync-badge{text-align:center;font-size:12px;color:var(--success);margin-bottom:8px;}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="inlock-wrap">
  <div class="inlock-box">
    <div class="inlock-title">🔐 波波健康紀錄 解鎖</div>
    <input type="password" class="inlock-input" id="inPwd" placeholder="請輸入密碼">
    <div class="inlock-tip" id="inTip"></div>
    <button class="inlock-btn" onclick="checkInPwd()">確認解鎖</button>
  </div>
</div>

<div class="main-content">
<div class="wrapper">
  <h1 class="main-title">🐾 波波健康全紀錄</h1>
  <div class="sync-badge" id="syncBadge">☁️ 雲端同步連線中...</div>
  <button class="theme-switch" onclick="toggleDarkMode()">🌓 切換深色模式</button>

  <div class="cat-selector">
    <select class="cat-select" id="catSelect" onchange="switchCat()"></select>
    <button class="cat-add-btn" onclick="addNewCat()">+ 新增貓咪</button>
  </div>

  <div class="tab-wrap">
    <button class="tab-btn active" data-tab="water">飲水紀錄</button>
    <button class="tab-btn" data-tab="weight">體重紀錄</button>
    <button class="tab-btn" data-tab="deworm">體外驅蟲</button>
    <button class="tab-btn" data-tab="medical">醫療病歷</button>
  </div>

  <!-- 醫療病歷 -->
  <div class="tab-content" id="tab-medical">
    <div class="info-banner">🏥 完整病歷管理</div>
    <div class="ui-card">
      <input class="form-input" placeholder="🔍 關鍵字搜尋病歷" id="medSearch" oninput="renderMedList()">
      <div class="med-filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="setMedFilter('all',this)">全部</button>
        <button class="filter-btn" data-filter="檢驗報告" onclick="setMedFilter('檢驗報告',this)">檢驗</button>
        <button class="filter-btn" data-filter="用藥單" onclick="setMedFilter('用藥單',this)">用藥</button>
        <button class="filter-btn" data-filter="就診紀錄" onclick="setMedFilter('就診紀錄',this)">就診</button>
        <button class="filter-btn" data-filter="術後追蹤" onclick="setMedFilter('術後追蹤',this)">術後</button>
        <button class="filter-btn" data-filter="star" onclick="setMedFilter('star',this)">⭐星標</button>
      </div>
    </div>

    <div class="ui-card">
      <select class="form-input" id="medType">
        <option value="檢驗報告">檢驗報告</option>
        <option value="就診紀錄">就診紀錄</option>
        <option value="用藥單">用藥單</option>
        <option value="術後追蹤">術後追蹤</option>
        <option value="其他報告">其他報告</option>
      </select>
      <input class="form-input" type="date" id="medDate">
      <input class="form-input" type="date" id="medReview" placeholder="下次回診日期">
      <textarea class="form-input form-textarea" id="medNote" placeholder="備註、症狀、醫師囑咐..."></textarea>
      
      <button class="btn-primary" style="background:var(--success)" onclick="saveTextMedical()">💾 僅儲存文字病歷</button>
    </div>

    <div class="ui-card">
      <div style="text-align:center;color:var(--primary);margin-bottom:12px;font-weight:500;">📁 所有儲存病歷</div>
      <div class="med-list" id="medList"></div>
    </div>
  </div>

</div>
</div>

<script>
// 密碼保留你原本
const validPws = ["0963612120", "0952867812", "ha821208"];
function checkInPwd(){
  const val = document.getElementById("inPwd").value.trim();
  const tip = document.getElementById("inTip");
  if(validPws.includes(val)){
    document.querySelector(".inlock-wrap").style.display="none";
    document.querySelector(".main-content").style.display="block";
    tip.innerText = "";
    initCatSystem();
  }else{
    tip.innerText = "❌ 密碼錯誤";
    document.getElementById("inPwd").value = "";
  }
}
document.addEventListener("keydown",e=>{
  if(e.key==="Enter") checkInPwd();
});

// ===== 完全沿用你原本 Firebase 城市碼 =====
const firebaseConfig = {
  apiKey: "AIzaSyD4iT2_YhVoBvOSVWz_-ZNJcR9BjEqHhaE",
  authDomain: "naibo-health.firebaseapp.com",
  projectId: "naibo-health",
  storageBucket: "naibo-health.firebasestorage.app",
  messagingSenderId: "1008746304734",
  appId: "1:1008746304734:web:33b87646673ee83b975e4f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 多貓變數
let currentCat = "default";
let catList = JSON.parse(localStorage.getItem("petCats") || '[{"id":"default","name":"波波"}]');
let currentCatName = "波波";
let medUnsubscribe = null;
let medData = [];
let medFilter = "all";

function initCatSystem(){
  renderCatSelect();
  switchCat();
  setNow();
}
function renderCatSelect(){
  const sel = document.getElementById("catSelect");
  sel.innerHTML = catList.map(c=>`<option value="${c.id}">${c.name}</option>`).join("");
}
function addNewCat(){
  const name = prompt("輸入新貓咪名稱：");
  if(!name)return;
  const id = "cat_"+Date.now();
  catList.push({id,name});
  localStorage.setItem("petCats",JSON.stringify(catList));
  renderCatSelect();
  document.getElementById("catSelect").value = id;
  switchCat();
}
function switchCat(){
  if(medUnsubscribe) medUnsubscribe();
  currentCat = document.getElementById("catSelect").value;
  const catObj = catList.find(c=>c.id === currentCat);
  currentCatName = catObj ? catObj.name : "貓咪";
  medData = [];
  renderMedList();
  listenMedData();
}
function setNow(){
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('medDate').value = today;
}
function toggleDarkMode(){
  document.body.classList.toggle("dark-mode");
}

// 監聽病歷資料
function listenMedData(){
  const medCol = db.collection(`catMed_${currentCat}`);
  medUnsubscribe = medCol.onSnapshot(snap=>{
    medData=[];
    snap.forEach(d=>{
      let x=d.data();
      x.docId=d.id;
      medData.push(x);
    });
    renderMedList();
    document.getElementById("syncBadge").innerText="☁️ 已同步";
  });
}

// 【重點修復版】純文字病歷儲存 → 存完自動刷新列表
async function saveTextMedical() {
  const type = document.getElementById("medType").value;
  const date = document.getElementById("medDate").value;
  const review = document.getElementById("medReview").value;
  const note = document.getElementById("medNote").value.trim();

  if (!date || !note) {
    return alert("請填寫日期與病歷備註");
  }

  const medCol = db.collection(`catMed_${currentCat}`);
  await medCol.add({
    type,
    date,
    review,
    note,
    imgs:[],
    star:false,
    createTime: new Date()
  });

  alert("✅ 文字病歷儲存成功");
  document.getElementById("medNote").value = "";
  // 強制刷新病歷列表 → 立刻看到新資料
  renderMedList();
}

function setMedFilter(val,btn){
  medFilter = val;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderMedList();
}

// 渲染病歷列表
function renderMedList(){
  let list = [...medData];
  if(medFilter !== "all"){
    if(medFilter === "star"){
      list = list.filter(x=>x.star === true);
    }else{
      list = list.filter(x=>x.type === medFilter);
    }
  }
  // 關鍵字搜尋
  const kw = document.getElementById("medSearch").value.toLowerCase().trim();
  if(kw){
    list = list.filter(x=>
      x.note.toLowerCase().includes(kw) || x.type.toLowerCase().includes(kw)
    );
  }
  // 最新在最上面
  list.sort((a,b)=>new Date(b.createTime) - new Date(a.createTime));

  const wrap = document.getElementById("medList");
  if(list.length === 0){
    wrap.innerHTML = "<div style='grid-column:1/-1;text-align:center;padding:20px;color:#999;'>暫無病歷資料</div>";
    return;
  }
  wrap.innerHTML = list.map(x=>`
    <div class="med-card">
      <div><strong>${x.type}</strong></div>
      <div>日期：${x.date}</div>
      <div style="font-size:12px;opacity:0.9;max-height:80px;overflow:hidden;">${x.note}</div>
    </div>
  `).join("");
}
</script>
</body>
</html>
