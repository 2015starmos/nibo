<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>貓咪醫療紀錄系統</title>
<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Noto Sans TC", "微軟正黑體", sans-serif;
}

:root {
  --blue-main: #4080ff;
  --bg-page: #f0f5fc;
  --card-white: #ffffff;
  --text-gray: #333333;
  --text-light: #666666;
  --border-gray: #dddddd;
}

body {
  background-color: var(--bg-page);
  min-height: 100vh;
}

/* 解鎖彈窗 100% 還原你的截圖 */
.inlock-wrap{
  position: fixed;
  inset: 0;
  background: var(--bg-page);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.inlock-box{
  width: 100%;
  max-width: 420px;
  background: var(--card-white);
  border-radius: 24px;
  padding: 40px 28px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}
.inlock-title{
  text-align: center;
  font-size: 26px;
  font-weight: 600;
  color: var(--text-gray);
  margin-bottom: 32px;
}
.inlock-input{
  width: 100%;
  padding: 18px 16px;
  border: 1px solid var(--border-gray);
  border-radius: 14px;
  background: #f9fafc;
  font-size: 17px;
  margin-bottom: 18px;
  outline: none;
}
/* 重點修正：記住密碼排版 絕對不跑位 */
.remember-wrap{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}
.remember-wrap input[type="checkbox"]{
  width: 22px;
  height: 22px;
  cursor: pointer;
}
.remember-wrap label{
  font-size: 16px;
  color: var(--text-light);
  cursor: pointer;
}
.inlock-btn{
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: 14px;
  background-color: var(--blue-main);
  color: white;
  font-size: 18px;
  font-weight: 500;
  cursor: pointer;
}
.inlock-btn:active{
  opacity: 0.9;
}
.err-txt{
  text-align: center;
  color: #f25555;
  font-size: 14px;
  margin-bottom: 12px;
  display: none;
}

/* 系統主頁內容 */
.main-content{
  display: none;
  padding: 16px;
}
.main-title{
  text-align: center;
  font-size: 22px;
  color: var(--blue-main);
  font-weight: 600;
  margin-bottom: 20px;
}
.card{
  background: var(--card-white);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 16px;
}
.btn-full{
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: var(--blue-main);
  color: #fff;
  font-size: 16px;
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- 密碼解鎖區 排版已完全修復 -->
<div class="inlock-wrap" id="lockWrap">
  <div class="inlock-box">
    <div class="inlock-title">🔐 貓咪醫療紀錄系統</div>

    <input 
      type="password" 
      class="inlock-input" 
      id="pwdInput" 
      placeholder="請輸入密碼"
    >

    <div class="remember-wrap">
      <input type="checkbox" id="rememberPwd">
      <label for="rememberPwd">記住密碼</label>
    </div>

    <div class="err-txt" id="errTxt">密碼錯誤，請重新輸入</div>

    <button class="inlock-btn" id="unlockBtn">進入系統</button>
  </div>
</div>

<!-- 登入後主內容 -->
<div class="main-content" id="mainContent">
  <div class="main-title">🐾 貓咪健康全紀錄</div>

  <div class="card">
    <h3>💧 飲水紀錄</h3>
    <input class="form-input" type="number" placeholder="今日飲水量 ml">
    <button class="btn-full">新增紀錄</button>
  </div>

  <div class="card">
    <h3>⚖️ 體重紀錄</h3>
    <input class="form-input" type="number" step="0.01" placeholder="體重 kg">
    <button class="btn-full">新增紀錄</button>
  </div>

  <div class="card">
    <h3>🏥 醫療病歷</h3>
    <textarea class="form-input" placeholder="備註、用藥、回診紀錄"></textarea>
    <button class="btn-full">儲存病歷</button>
  </div>
</div>

<script>
// 密碼設定（維持你原本的密碼）
const validPasswords = ["0963612120", "0952867812", "ha821208"];

// 頁面載入 自動讀取記住密碼
window.addEventListener("DOMContentLoaded", () => {
  const savedChecked = localStorage.getItem("catRemember") === "true";
  rememberPwd.checked = savedChecked;

  if(savedChecked){
    const savedPwd = localStorage.getItem("catSavedPwd") || "";
    pwdInput.value = savedPwd;
  }
})

// 解鎖驗證
unlockBtn.addEventListener("click", () => {
  const inputPwd = pwdInput.value.trim();
  errTxt.style.display = "none";

  if(validPasswords.includes(inputPwd)){

    // 記住密碼邏輯
    if(rememberPwd.checked){
      localStorage.setItem("catRemember", "true");
      localStorage.setItem("catSavedPwd", inputPwd);
    }else{
      localStorage.setItem("catRemember", "false");
      localStorage.removeItem("catSavedPwd");
    }

    // 解鎖進入系統
    lockWrap.style.display = "none";
    mainContent.style.display = "block";

  }else{
    errTxt.style.display = "block";
    errTxt.innerText = "❌ 密碼錯誤";
    pwdInput.value = "";
  }
})

// 按Enter快速解鎖
pwdInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter") unlockBtn.click();
})
</script>

</body>
</html>
