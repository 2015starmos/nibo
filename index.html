<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小貓醫療紀錄系統 - 穩定優化版</title>

<style>
/* 基礎樣式保持一致 */
:root {
  --bg-gradient-1: #f6f9fe; --bg-gradient-2: #eaf2f9; --card-bg: #ffffff;
  --primary: #478fb8; --primary-light: rgba(71, 143, 184, 0.12);
  --border-color: #dce9f2; --input-bg: #f9fbfe; --text-main: #506473;
  --success: #34a873; --danger: #f28484;
}
body { font-family: "微軟正黑體", sans-serif; background: linear-gradient(160deg, var(--bg-gradient-1), var(--bg-gradient-2)); padding: 15px; color: var(--text-main); }
.wrapper { max-width: 500px; margin: 0 auto; }
.ui-card { background: var(--card-bg); border-radius: 24px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
.form-input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid var(--border-color); border-radius: 15px; background: var(--input-bg); }
.btn-primary { width: 100%; padding: 12px; border: none; border-radius: 15px; background: #478fb8; color: #fff; cursor: pointer; margin-top: 5px; font-weight: bold; }
.btn-text-upload { background: linear-gradient(90deg, #34a873, #2d9465); margin-top: 10px; }

/* 照片切換樣式 */
.med-img-wrap { position: relative; width: 100%; aspect-ratio: 1; margin-bottom: 8px; }
.med-img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
.prev-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 50%; z-index: 2; }
.prev-left { left: 5px; }
.prev-right { right: 5px; }

.med-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.med-card { background: #f8fbfe; border-radius: 15px; padding: 10px; font-size: 13px; border: 1px solid #eee; }
.inlock-wrap { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="inlock-wrap" id="lockScreen">
  <div style="text-align:center;">
    <h3>🔐 醫學紀錄解鎖</h3><br>
    <input type="password" id="inPwd" class="form-input" placeholder="請輸入密碼">
    <button class="btn-primary" onclick="unlock()">確認</button>
  </div>
</div>

<div class="wrapper" id="mainContent" style="display:none;">
  <h2 style="text-align:center; color:#478fb8;">🐾 寵物健康管理系統</h2>
  
  <div class="ui-card">
    <select id="catSelect" class="form-input" onchange="switchCat()">
      <option value="cat1">奶几</option>
      <option value="cat2">奶波</option>
    </select>
  </div>

  <div class="ui-card">
    <select id="medType" class="form-input">
      <option value="檢驗報告">檢驗報告</option>
      <option value="用藥單">用藥單</option>
      <option value="就診紀錄">就診紀錄</option>
    </select>
    <input type="date" id="medDate" class="form-input">
    <input type="date" id="medReview" class="form-input" placeholder="回診日期">
    <textarea id="medNote" class="form-input" placeholder="病歷備註..."></textarea>
    
    <button class="btn-primary" onclick="document.getElementById('fileInput').click()">📎 上傳報告照片</button>
    <button class="btn-primary btn-text-upload" onclick="saveTextMedical()">📝 文字病歷上傳</button>
    <input type="file" id="fileInput" multiple style="display:none;" onchange="uploadImages(event)">
  </div>

  <div class="ui-card">
    <input type="text" id="medSearch" class="form-input" placeholder="🔍 搜尋此貓病歷..." oninput="renderMedList()">
  </div>

  <div id="medList" class="med-list"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD4iT2_YhVoBvOSVWz_-ZNJcR9BjEqHhaE",
  authDomain: "naibo-health.firebaseapp.com",
  projectId: "naibo-health",
  storageBucket: "naibo-health.firebasestorage.app",
  messagingSenderId: "1008746304734",
  appId: "1:1008746304734:web:33b87646673ee83b975e4f"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentCat = "cat1";
let medData = [];
let cardImgIndices = {}; // 紀錄每張卡片的圖片索引

function unlock() {
  const pwd = document.getElementById("inPwd").value;
  if(pwd === "0963612120" || pwd === "ha821208") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    switchCat();
  } else { alert("密碼錯誤"); }
}

// 核心：切換貓咪並隔離搜尋
function switchCat() {
  currentCat = document.getElementById("catSelect").value;
  // 監聽專屬此貓的資料夾
  db.collection(`catMed_${currentCat}`).orderBy("date", "desc").onSnapshot(snap => {
    medData = [];
    snap.forEach(doc => {
      let data = doc.data();
      data.docId = doc.id;
      medData.push(data);
    });
    renderMedList();
  });
}

// 您提供的優化版上傳邏輯
async function saveTextMedical() {
  const type = document.getElementById("medType").value;
  const date = document.getElementById("medDate").value;
  const review = document.getElementById("medReview").value;
  const note = document.getElementById("medNote").value.trim();

  if (!date || !note) { return alert("請填寫日期與病歷備註"); }

  try {
    const medCol = db.collection(`catMed_${currentCat}`);
    await medCol.add({
      type, date, review, note,
      imgs: [],
      star: false,
      createTime: firebase.firestore.FieldValue.serverTimestamp() 
    });
    alert("✅ 文字病歷上傳成功");
    document.getElementById("medNote").value = "";
    document.getElementById("medReview").value = "";
    renderMedList(); 
  } catch (error) {
    console.error("Error adding document: ", error);
    alert("❌ 上傳失敗，請檢查網路連線");
  }
}

// 手動切換圖片
function changeImg(docId, step) {
  const item = medData.find(x => x.docId === docId);
  if(!item) return;
  if(cardImgIndices[docId] === undefined) cardImgIndices[docId] = 0;
  cardImgIndices[docId] = (cardImgIndices[docId] + step + item.imgs.length) % item.imgs.length;
  document.getElementById(`img-${docId}`).src = item.imgs[cardImgIndices[docId]];
}

// 渲染列表 (包含手動切換按鈕)
function renderMedList() {
  const wrap = document.getElementById("medList");
  const keyword = document.getElementById("medSearch").value.toLowerCase();
  
  let filtered = medData.filter(x => x.note.toLowerCase().includes(keyword) || x.type.includes(keyword));
  
  wrap.innerHTML = filtered.map(item => {
    let imgArea = `<div style="height:100px; display:flex; align-items:center; justify-content:center; background:#eee; border-radius:10px; margin-bottom:5px;">無照片</div>`;
    
    if(item.imgs && item.imgs.length > 0) {
      const idx = cardImgIndices[item.docId] || 0;
      imgArea = `
        <div class="med-img-wrap">
          ${item.imgs.length > 1 ? `<button class="prev-btn prev-left" onclick="changeImg('${item.docId}', -1)">←</button>` : ''}
          <img src="${item.imgs[idx]}" id="img-${item.docId}" class="med-img">
          ${item.imgs.length > 1 ? `<button class="prev-btn prev-right" onclick="changeImg('${item.docId}', 1)">→</button>` : ''}
        </div>
      `;
    }

    return `
      <div class="med-card">
        ${imgArea}
        <div style="font-weight:bold; color:#478fb8;">${item.type}</div>
        <div style="font-size:11px;">📅 ${item.date}</div>
        <div style="margin-top:5px; height:40px; overflow:hidden;">${item.note}</div>
      </div>
    `;
  }).join("");
}

// 圖片上傳壓縮處理 (簡略示範)
async function uploadImages(e) {
  const files = e.target.files;
  const imgs = [];
  for(let f of files) {
    const base64 = await toBase64(f);
    imgs.push(base64);
  }
  const type = document.getElementById("medType").value;
  const date = document.getElementById("medDate").value;
  const note = document.getElementById("medNote").value;
  await db.collection(`catMed_${currentCat}`).add({
    type, date, note, imgs, star:false, createTime: firebase.firestore.FieldValue.serverTimestamp()
  });
  alert("照片病歷上傳成功");
}

function toBase64(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
  });
}
</script>
</body>
</html>
