<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no">
<title>小貓醫療紀錄系統</title>
<style>
:root{
  --main:#4080ff;
  --main-light:#e8f0ff;
  --text:#222;
  --text-2:#666;
  --bg:#f7f9fc;
  --card:#fff;
  --border:#eee;
  --red:#f56c6c;
  --green:#67c23a;
}
body.dark{
  --text:#f0f0f0;
  --text-2:#aaa;
  --bg:#1a1a1a;
  --card:#262626;
  --border:#333;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang TC","Microsoft JhengHei",sans-serif;}
body{background:var(--bg);color:var(--text);transition:.3s;padding-bottom:80px;}

/* 解鎖頁面 */
.inlock-wrap{position:fixed;inset:0;background:linear-gradient(160deg, #f6f9fe, #eaf2f9);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.inlock-box{width:100%;max-width:340px;background:#fff;border-radius:16px;padding:30px 24px;box-shadow:0 8px 24px rgba(0,0,0,0.08);}
.inlock-title{text-align:center;font-size:20px;font-weight:600;color:#333;margin-bottom:24px;}
.inlock-input{width:100%;height:48px;border:1px solid #ddd;border-radius:8px;padding:0 14px;font-size:16px;margin-bottom:16px;outline:none;transition:.2s;}
.inlock-input:focus{border-color:var(--main);}
.remember-wrap{display:flex;align-items:center;margin-bottom:20px;gap:8px;}
.remember-wrap label{font-size:14px;color:#666;cursor:pointer;}
.inlock-btn{width:100%;height:48px;background:var(--main);color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;transition:.2s;}
.inlock-btn:active{opacity:0.9;}
.err-txt{color:var(--red);font-size:13px;margin-top:-12px;margin-bottom:12px;display:none;}

/* 通用布局 */
.head{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:9;}
.head h1{font-size:18px;}
.switch-dark{font-size:14px;color:var(--main);cursor:pointer;}
.container{padding:16px;}
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid var(--border);}
.card-title{font-size:16px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.item-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
.btn{padding:8px 14px;border-radius:6px;border:none;background:var(--main-light);color:var(--main);cursor:pointer;font-size:14px;transition:.2s;}
.btn.red{background:#fee;color:var(--red);}
.btn.green{background:#f0f9e8;color:var(--green);}
input,select,textarea{width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);margin-top:6px;margin-bottom:10px;outline:none;}
textarea{min-height:80px;resize:vertical;}

/* 底部導航 */
.foot-nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:var(--card);display:flex;border-top:1px solid var(--border);z-index:9;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--text-2);}
.nav-item.active{color:var(--main);}

/* 隱藏類 */
.page{display:none;}
.page.active{display:block;}
.inlock-wrap.hidden{display:none;}

/* 列表 */
.list-item{padding:12px;border-bottom:1px solid var(--border);font-size:14px;}
.list-item:last-child{border-bottom:none;}
</style>
</head>
<body>

<!-- 密碼解鎖畫面 -->
<div class="inlock-wrap" id="lockWrap">
  <div class="inlock-box">
    <div class="inlock-title">🔐 貓咪醫療紀錄系統</div>
    <input type="password" class="inlock-input" id="pwdInput" placeholder="請輸入密碼">
    <div class="err-txt" id="errTxt">密碼錯誤，請重新輸入</div>
    <div class="remember-wrap">
      <input type="checkbox" id="rememberPwd">
      <label for="rememberPwd">記住密碼</label>
    </div>
    <button class="inlock-btn" id="unlockBtn">進入系統</button>
  </div>
</div>

<!-- 頂部標題列 -->
<div class="head">
  <h1>奶波 健康全紀錄</h1>
  <div class="switch-dark" id="darkBtn">🌓 深色模式</div>
</div>

<!-- 頁面容器 -->
<div class="container">
  <!-- 首頁頁面 -->
  <div class="page active" id="pageHome">
    <div class="card">
      <div class="card-title">📌 快速概覽</div>
      <p>體重：<span id="nowWeight">--</span> kg</p>
      <p>今日飲水：<span id="nowWater">--</span> ml</p>
      <p>下次驅蟲：<span id="nextWorm">未記錄</span></p>
    </div>
    <div class="card">
      <div class="card-title">📝 今日備註</div>
      <textarea id="dayNote" placeholder="填寫今日狀況、飲食、精神、排尿排便..."></textarea>
      <button class="btn green" onclick="saveDayNote()">儲存備註</button>
    </div>
  </div>

  <!-- 體重頁面 -->
  <div class="page" id="pageWeight">
    <div class="card">
      <div class="card-title">⚖️ 新增體重紀錄</div>
      <input type="number" step="0.01" id="weightVal" placeholder="輸入體重(kg)">
      <button class="btn green" onclick="addWeight()">新增紀錄</button>
    </div>
    <div class="card">
      <div class="card-title">📤 匯入/匯出</div>
      <input type="file" id="weightFile" accept=".csv">
      <button class="btn" onclick="exportWeightCSV()">匯出CSV</button>
      <button class="btn red" onclick="clearWeightAll()">清空全部</button>
    </div>
    <div class="card">
      <div class="card-title">📋 體重列表</div>
      <div id="weightList"></div>
    </div>
  </div>

  <!-- 飲水頁面 -->
  <div class="page" id="pageWater">
    <div class="card">
      <div class="card-title">💧 飲水登記</div>
      <input type="number" id="waterVal" placeholder="輸入飲水量(ml)">
      <button class="btn green" onclick="addWater()">新增</button>
    </div>
    <div class="card">
      <div class="card-title">今日飲水明細</div>
      <div id="waterList"></div>
    </div>
  </div>

  <!-- 醫療紀錄 -->
  <div class="page" id="pageMedical">
    <div class="card">
      <div class="card-title">💊 新增就醫/用藥</div>
      <input type="date" id="medDate">
      <input type="text" id="medTitle" placeholder="標題(例：尿道復診、消炎藥)">
      <textarea id="medContent" placeholder="症狀、用藥劑量、醫師囑咐、複診時間..."></textarea>
      <button class="btn green" onclick="addMedical()">儲存</button>
    </div>
    <div class="card">
      <div class="card-title">📋 病歷列表</div>
      <div id="medicalList"></div>
    </div>
  </div>
</div>

<!-- 底部導航 -->
<div class="foot-nav">
  <div class="nav-item active" data-page="pageHome">🏠<br>首頁</div>
  <div class="nav-item" data-page="pageWeight">⚖️<br>體重</div>
  <div class="nav-item" data-page="pageWater">💧<br>飲水</div>
  <div class="nav-item" data-page="pageMedical">💊<br>醫療</div>
</div>

<script>
// ========== 密碼 & 記住密碼設定 ==========
const PASSWORD = "000000";
const lockWrap = document.getElementById("lockWrap");
const pwdInput = document.getElementById("pwdInput");
const rememberPwd = document.getElementById("rememberPwd");
const unlockBtn = document.getElementById("unlockBtn");
const errTxt = document.getElementById("errTxt");

// 讀取本地記住密碼
window.onload = function(){
  let savePwd = localStorage.getItem("savePwd");
  let isRem = localStorage.getItem("rememberPwd") === "1";
  if(isRem && savePwd){
    pwdInput.value = savePwd;
    rememberPwd.checked = true;
  }
}

unlockBtn.addEventListener("click",function(){
  errTxt.style.display = "none";
  let val = pwdInput.value.trim();
  if(val === PASSWORD){
    // 儲存記住密碼設定
    if(rememberPwd.checked){
      localStorage.setItem("rememberPwd","1");
      localStorage.setItem("savePwd",val);
    }else{
      localStorage.removeItem("rememberPwd");
      localStorage.removeItem("savePwd");
    }
    lockWrap.classList.add("hidden");
  }else{
    errTxt.style.display = "block";
  }
})

// ========== 底部分頁切換 ==========
let navItems = document.querySelectorAll(".nav-item");
let pages = document.querySelectorAll(".page");
navItems.forEach(item=>{
  item.onclick = function(){
    let target = this.dataset.page;
    navItems.forEach(n=>n.classList.remove("active"));
    this.classList.add("active");
    pages.forEach(p=>p.classList.remove("active"));
    document.getElementById(target).classList.add("active");
  }
})

// ========== 深色模式 ==========
const darkBtn = document.getElementById("darkBtn");
if(localStorage.getItem("dark")==="1") document.body.classList.add("dark");
darkBtn.onclick = function(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dark",document.body.classList.contains("dark")?"1":"0");
}

// ========== 本地儲存通用 ==========
function getLocal(key){
  let d = localStorage.getItem(key);
  return d ? JSON.parse(d) : [];
}
function setLocal(key,data){
  localStorage.setItem(key,JSON.stringify(data));
}

// ========== 今日備註 ==========
function saveDayNote(){
  let note = document.getElementById("dayNote").value;
  localStorage.setItem("dayNote",note);
  alert("儲存成功");
}
document.getElementById("dayNote").value = localStorage.getItem("dayNote")||"";

// ========== 體重紀錄 ==========
function addWeight(){
  let val = document.getElementById("weightVal").value;
  if(!val)return alert("請輸入體重");
  let list = getLocal("weightList");
  list.unshift({
    t:new Date().toLocaleString("zh-TW"),
    w:val
  });
  setLocal("weightList",list);
  renderWeight();
  document.getElementById("weightVal").value = "";
}
function renderWeight(){
  let list = getLocal("weightList");
  let html = "";
  list.forEach((item,idx)=>{
    html += `<div class="list-item">${item.t}｜${item.w} kg 
    <button class="btn red" style="padding:2px 6px;font-size:12px" onclick="delWeight(${idx})">刪除</button>
    </div>`;
  });
  document.getElementById("weightList").innerHTML = html;
  if(list[0]) document.getElementById("nowWeight").innerText = list[0].w;
}
function delWeight(idx){
  let list = getLocal("weightList");
  list.splice(idx,1);
  setLocal("weightList",list);
  renderWeight();
}
function clearWeightAll(){
  if(confirm("確定清空所有體重紀錄？無法復原")){
    setLocal("weightList",[]);
    renderWeight();
  }
}
// CSV 匯出
function exportWeightCSV(){
  let list = getLocal("weightList");
  let csv = "時間,體重(kg)\n";
  list.forEach(item=>{
    csv += `${item.t},${item.w}\n`;
  });
  let blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
  let url = URL.createObjectURL(blob);
  let a = document.createElement("a");
  a.href = url;
  a.download = "奶波體重紀錄.csv";
  a.click();
}
// CSV 匯入
document.getElementById("weightFile").addEventListener("change",function(e){
  let file = e.target.files[0];
  if(!file)return;
  let reader = new FileReader();
  reader.onload = function(ev){
    let text = ev.target.result;
    let lines = text.split("\n");
    let list = getLocal("weightList");
    for(let i=1;i<lines.length;i++){
      let row = lines[i].split(",");
      if(row.length>=2 && row[1]){
        list.unshift({
          t:row[0],
          w:row[1]
        });
      }
    }
    setLocal("weightList",list);
    renderWeight();
    alert("匯入完成");
  }
  reader.readAsText(file);
})

// ========== 飲水紀錄 ==========
function addWater(){
  let val = document.getElementById("waterVal").value;
  if(!val)return alert("請輸入飲水量");
  let list = getLocal("waterList");
  list.unshift({
    t:new Date().toLocaleTimeString("zh-TW"),
    v:val
  });
  setLocal("waterList",list);
  renderWater();
  document.getElementById("waterVal").value = "";
}
function renderWater(){
  let list = getLocal("waterList");
  let html = "";
  let total = 0;
  list.forEach((item,idx)=>{
    total += Number(item.v);
    html += `<div class="list-item">${item.t}｜${item.v} ml
    <button class="btn red" style="padding:2px 6px;font-size:12px" onclick="delWater(${idx})">刪除</button>
    </div>`;
  });
  document.getElementById("waterList").innerHTML = html;
  document.getElementById("nowWater").innerText = total;
}
function delWater(idx){
  let list = getLocal("waterList");
  list.splice(idx,1);
  setLocal("waterList",list);
  renderWater();
}

// ========== 醫療紀錄 ==========
function addMedical(){
  let date = document.getElementById("medDate").value;
  let title = document.getElementById("medTitle").value;
  let content = document.getElementById("medContent").value;
  if(!date||!title)return alert("請填寫日期與標題");
  let list = getLocal("medicalList");
  list.unshift({date,title,content});
  setLocal("medicalList",list);
  renderMedical();
  document.getElementById("medDate").value = "";
  document.getElementById("medTitle").value = "";
  document.getElementById("medContent").value = "";
}
function renderMedical(){
  let list = getLocal("medicalList");
  let html = "";
  list.forEach((item,idx)=>{
    html += `
    <div class="list-item">
      <div><strong>${item.date} ${item.title}</strong></div>
      <div style="margin-top:4px;color:var(--text-2);white-space:pre-wrap;">${item.content}</div>
      <button class="btn red" style="margin-top:6px;padding:2px 6px;font-size:12px" onclick="delMedical(${idx})">刪除</button>
    </div>
    `;
  });
  document.getElementById("medicalList").innerHTML = html;
}
function delMedical(idx){
  let list = getLocal("medicalList");
  list.splice(idx,1);
  setLocal("medicalList",list);
  renderMedical();
}

// 初始渲染
renderWeight();
renderWater();
renderMedical();
</script>

</body>
</html>
